<script>
const PHASES=[{"id": "reprise", "nom": "Reprise", "c": "#16a34a", "sem": "S24 – S25", "role": "Digérer La Circaète puis relancer en douceur en corrigeant la zone grise."}, {"id": "general", "nom": "Développement général & aérobie", "c": "#0d9488", "sem": "S26 – S31", "role": "Volume, polarisation, côtes en pyramide (force/économie), seuil, et benchmark 10 km pour recaler les allures."}, {"id": "seuil", "nom": "Seuil & spécifique (pré-USA)", "c": "#64748b", "sem": "S32 – S35", "role": "Front-loader le seuil et l'allure marathon avant le voyage."}, {"id": "usa", "nom": "Maintien — Road trip USA", "c": "#94a3b8", "sem": "S36 – S39", "role": "Deload bien placé : courir quand possible, randos = temps de pied."}, {"id": "marathon", "nom": "Bloc spécifique marathon", "c": "#f59e0b", "sem": "S40 – S43", "role": "Ré-entrée progressive, une grosse séance spécifique par semaine, pic à 88 km avec la séance reine."}, {"id": "affutage", "nom": "Affûtage marathon", "c": "#94a3b8", "sem": "S44 – S45", "role": "Décharge progressive (Bosquet) : volume en baisse, intensité courte maintenue, fraîcheur pour le 8 nov."}, {"id": "transition", "nom": "Transition & bascule trail", "c": "#0d9488", "sem": "S46 – S47", "role": "Récup marathon progressive puis réveil des jambes de trail."}, {"id": "saintexpress", "nom": "SaintExpress 45 km", "c": "#ef4444", "sem": "S48", "role": "Objectif B sur les acquis : nocturne, hivernal, au plaisir."}, {"id": "regen", "nom": "Régénération fin de saison", "c": "#94a3b8", "sem": "S49 – S53", "role": "Décompression, course libre, entretien de la base, cap vers 2027."}];
const COUL={"reprise": "#16a34a", "general": "#0d9488", "seuil": "#64748b", "usa": "#94a3b8", "marathon": "#f59e0b", "affutage": "#94a3b8", "transition": "#0d9488", "saintexpress": "#ef4444", "regen": "#94a3b8"};
const SEMAINES=[{"num": 24, "phase": "reprise", "theme": "Récupération", "km": 28, "statut": "ouverte", "charge": "Légère", "repartition": "—", "objectif": "Absorber La Circaète : repos actif, footings très faciles, mobilité du dos."}, {"num": 25, "phase": "reprise", "theme": "Reprise & déblocage", "km": 52, "statut": "ouverte", "charge": "Modérée", "repartition": "≈ 85 % facile · 15 % qualité légère", "objectif": "Relancer une structure : ré-ancrer le vrai easy, vivacité, premier contact allure marathon, longue + carburant.", "revue": "<p>La semaine de reprise que tu devais faire. Pas celle que tu espérais peut-être, mais celle qu'il fallait — et tu l'as exécutée proprement.</p><p><strong>Ce qui ressort avant tout : la gestion de la chaleur.</strong> Quatre séances sur cinq démarrées entre 7h25 et 8h30. L'écart entre la s3 (FC 165/181, subi à midi par 30°C) et les quatre autres (FC 140-151, maîtrisé) dit tout sur l'importance de l'horaire. Ce n'est pas une variable de confort, c'est une variable de performance.</p><p><strong>La progression dans la semaine est nette.</strong> S1/S2 très faciles (FC 140-143, moteur en veille). S3 qualité tenue en conditions difficiles, 6 km à 5:14/km. S4 sortie longue avec <strong>fast finish à 4:58/km sur le dernier kilomètre</strong> — sub-5 min au 4e jour consécutif en canicule. S5 bonus parfait à 7h25 chez les parents, FC 144 en plein cœur de la Z2, rien dépensé.</p><p><strong>Ce que cette semaine confirme pour la Déraille (J-16) :</strong> tu n'es pas en reprise, tu es en forme. La résistance à la fatigue est là. S26 est allégée par conception — laisse-la être légère, la séance clé c'est mercredi.</p>"}, {"num": 26, "phase": "general", "theme": "Allègement + prépa Déraille", "km": 35, "statut": "ouverte", "charge": "Allégée", "repartition": "≈ 78 % facile · 22 % spécifique", "objectif": "Volume réduit, une séance spécifique vallonnée avec répétition nutrition : on prépare la Déraille sans entamer la reprise.", "revue": "La semaine que la canicule a mangée. Quatre nuits à plus de 30°C, journées à 40°C — sur 4 séances prévues, 2 réalisées (21,9 km sur 35). Mais les 2 faites étaient les bonnes : lundi footing + lignes droites à 5:53/km FC 148 (RPE 3), jeudi 10,7 km à 5:47/km avec dérive cardiaque maîtrisée après 2 jours d'arrêt forcé. Mardi-mercredi sautés : pas de la flemme, du jugement — courir par 40°C à J-10 aurait coûté plus que ça n'aurait rapporté. La spécifique trail vallonnée a été sacrifiée à la chaleur — le stimulus manque, la fraîcheur est intacte. À une semaine d'une course Objectif C, c'est le bon arbitrage."}, {"num": 27, "phase": "general", "theme": "Semaine course — Déraille", "km": 45, "statut": "ouverte", "charge": "Course", "repartition": "—", "objectif": "Affûtage court (3 footings) + Trail Déraille au Lac des Sapins le 5 juillet. Objectif C, plaisir & test nutrition. (21 km allégés + 24 km course.)", "revue": "La semaine de course, et elle s'est terminée comme elle devait : par une vraie réussite de gestion. 53 km au total dont la Déraille (23,3 km, D+ 957 m) bouclée en 2:52:48 — 66e sur 180, 11e/18 en M0. La semaine a commencé fort avec 13 km tranquilles avec Edwige lundi (un peu longs pour une semaine de course, mais faits en plaisir), puis un tempo interrompu par un souci gastrique mardi — arrêté au bon moment, sans forcer. Le footing EF de jeudi (10,5 km, FC 148, zéro PR) était la sortie d'affûtage parfaite : le corps en automatique, le système digestif rétabli. Et dimanche, la course : FC moyenne 168 tenue sur 2h52 sans jamais d'effondrement, contrairement à la Circaète. Le mur des 2 derniers km était thermique (FC haute, allure qui chute), pas nutritionnel. Sur ~4h de sommeil et sans prépa trail, c'est une performance de tête autant que de jambes. Objectifs atteints : relancer la machine, tester la nutrition, courir intelligemment. Bilan de semaine : solide."}, {"num": 28, "phase": "general", "theme": "Récupération post-Déraille", "km": 36, "statut": "ouverte", "charge": "Récup", "repartition": "100 % facile · récupération active", "objectif": "Semaine de récupération après le Trail Déraille — footings très faciles, zéro intensité. Le bloc seuil est décalé à S30 pour laisser les jambes assimiler le D+ et la chaleur. La récup n'est pas du temps perdu : c'est là que les adaptations se construisent.", "revue": "<p><strong>Une semaine de « récupération » à 61 km au lieu de 36 — parlons-en franchement.</strong> Sur le papier, c'est un dépassement de 69 % du volume cible, ce qui d'ordinaire mériterait un vrai froncement de sourcils de coach. Dans les faits, c'est l'une des plus belles semaines de ta saison — parce que le volume ne dit pas tout, l'intensité et le contexte disent le reste.</p><p><strong>Le déroulé :</strong> deux récupérations actives propres mardi-mercredi (FC 137-140, discipline parfaite), la sortie longue avancée à jeudi et gérée intelligemment sous la chaleur (18 km, protocole hydratation validé, fast finish maîtrisé), puis <strong>le doublé trail du week-end en montagne</strong> : 10,7 km / D+ 646 m samedi, 11 km / D+ 530 m dimanche au Petit Croisse Baulet, départ 13h en pleine chaleur. 1 176 m de D+ cumulés en deux jours — du jamais vu dans ta saison.</p><p><strong>Pourquoi ça passe :</strong> les FC racontent la vérité. 138 et 129 de moyenne sur les deux trails (67-72 % FCmax) — tu as marché les montées, déroulé les descentes, zéro forcing. C'est du temps de pied et du dénivelé en mode plaisir, pas de la charge d'entraînement au sens dur. La forme finit la semaine à 90/100 et l'ACWR à 1,10 : le corps a encaissé, et il a même apprécié.</p><p><strong>Ce que la semaine t'apporte :</strong> de la force spécifique (une montée à 24 % !), du travail excentrique en descente, 2h30+ d'effort continu deux jours de suite, et surtout du plaisir entre copains — le carburant mental d'une prépa de 30 semaines. C'est exactement le genre de « récupération active » qui ne s'écrit pas dans les plans mais qui construit un coureur.</p><p><strong>Le point de vigilance pour S29 :</strong> deux grosses descentes consécutives, ça laisse des traces dans les quadriceps et ça sollicite le dos (ta vigilance connue). La S29 « Seuil découverte » démarre par du facile — respecte ce démarrage doux, et si les jambes parlent encore mardi, décale le premier bloc seuil d'un jour sans culpabiliser. <strong>Bilan : 5/6 · 60,96 km · une semaine de récup qui n'en avait que le nom, et c'est très bien comme ça.</strong> 👏</p>"}, {"num": 29, "phase": "general", "theme": "Seuil découverte", "km": 62, "statut": "ouverte", "charge": "Soutenue", "repartition": "≈ 80 % facile · 20 % qualité", "objectif": "Reprise progressive après la semaine de récup : premier vrai contact avec le seuil (2 blocs courts) + longue qui reprend du volume avec finish AM."}, {"num": 30, "phase": "general", "theme": "Seuil + pyramide", "km": 72, "statut": "ouverte", "charge": "Soutenue", "repartition": "≈ 80 % facile · 20 % qualité", "objectif": "Seuil 3 blocs, rappel pyramide, longue 24 km dont 6 AM."}, {"num": 31, "phase": "general", "theme": "Test 10 km + recalibrage", "km": 70, "statut": "ouverte", "charge": "Soutenue", "repartition": "≈ 82 % facile · test", "objectif": "Benchmark 10 km pour recaler les allures avant le bloc spécifique."}, {"num": 32, "phase": "seuil", "theme": "Seuil long", "km": 78, "statut": "ouverte", "charge": "Élevée", "repartition": "≈ 80 % facile · 20 % qualité", "objectif": "Seuil long (2×15 min) + longue 26 km dont 8 AM. 2ᵉ mobilité ajoutée."}, {"num": 33, "phase": "seuil", "theme": "Allègement", "km": 64, "statut": "ouverte", "charge": "Légère", "repartition": "≈ 85 % facile · 15 % qualité", "objectif": "Récupération avant le pic pré-USA."}, {"num": 34, "phase": "seuil", "theme": "Pic pré-USA", "km": 82, "statut": "ouverte", "charge": "Élevée", "repartition": "≈ 78 % facile · 22 % qualité", "objectif": "Plus gros bloc avant le voyage : seuil + longue 28 km dont 12 AM (gate de la reine)."}, {"num": 35, "phase": " const S24R={"km": 36.4, "runs": [{"iso": "2026-06-09", "date": "Mar. 9", "titre": "Footing 16 km — finish progressif", "desc": "1h26 · 5:22/km · FC 153 (max 171) · charge 164 · Novablast 5", "tag": "Endurance", "pr": 2, "ach": 11, "pr_detail": ["Meilleur effort 2 km", "Meilleur effort 1 mile"], "metriques": {"Distance": "16,0 km", "Temps": "1h26", "Allure": "5:22/km", "FC moy / max": "153 / 171", "D+": "54 m", "Charge": "164", "Cadence": "173 ppm", "Calories": "1 205"}, "chaussure": "ASICS Novablast 5", "splits": [[353, 138], [351, 142], [347, 147], [324, 153], [331, 150], [327, 151], [315, 153], [326, 154], [331, 151], [318, 154], [319, 159], [332, 155], [287, 158], [302, 160], [295, 163], [290, 164]], "lecture": "Les kilomètres racontent tout : départ à 5:53/km (FC 138, Z2 propre), puis une accélération continue jusqu'à <strong>4:50/km sur le dernier km, FC 164</strong> — la frontière Z3/Z4. Ce n'était pas un footing « un peu vif » : c'était un progressif qui finit au tempo, avec 11 records de segments au passage. La montée de FC est un choix d'allure, pas une dérive cardiaque.", "revue": "Belle séance… qui n'avait rien à faire là. À J+3 de la Circaète (1662 m de D+, effondrement électrolytique), finir 4 km entre 4:47 et 5:02/km, c'est de la qualité déguisée en endurance — le réflexe zone grise dans sa forme la plus pure : pas un footing trop rapide, mais un footing qui <em>devient</em> une séance. La bonne nouvelle : tenir ces allures à J+3 avec cette aisance confirme une récupération express et un moteur en forme. La consigne pour la suite : un footing a une allure de début ET une allure de fin — et c'est la même."}, {"iso": "2026-06-10", "date": "Mer. 10", "titre": "Footing de récupération 10 km", "desc": "1h03 · 6:06/km · FC 137 (max 155) · charge 47 · Clifton 10", "tag": "Récupération", "metriques": {"Distance": "10,3 km", "Temps": "1h03", "Allure": "6:06/km", "FC moy / max": "137 / 155", "D+": "45 m", "Charge": "47", "Cadence": "172 ppm", "Calories": "767"}, "chaussure": "HOKA Clifton 10", "splits": [[374, 136], [348, 135], [376, 138], [370, 136], [373, 141], [374, 134], [371, 136], [376, 134], [360, 136], [342, 143]], "lecture": "Le contre-exemple parfait de la veille : 10 km entre 6:00 et 6:16/km, et surtout une <strong>FC clouée à 134-138 du premier au dernier kilomètre</strong> — zéro dérive sur une heure. C'est la signature d'une vraie récupération : l'effort ne s'accumule pas, il s'évacue.", "revue": "Rien à redire — c'est le modèle du genre, à encadrer. Quand tu te demanderas à quoi ressemble un footing de récup réussi pendant la prépa, reviens regarder cette sortie : allure stable, FC plate, charge 47. Exactement ce qu'on veut 4 jours après une course. Seule micro-remarque : le dernier km à 5:42 — l'envie d'accélérer en fin de sortie est ton tic, surveille-le."}, {"iso": "2026-06-12", "date": "Ven. 12", "titre": "Footing de récupération 10 km — coupé volontairement", "desc": "58:53 · 5:52/km · FC 137 (max 155) · charge 44 · Novablast 5", "tag": "Récupération", "metriques": {"Distance": "10,0 km", "Temps": "58:53", "Allure": "5:52/km", "FC moy / max": "137 / 155", "D+": "37 m", "Charge": "44", "Cadence": "172 ppm", "Calories": "755"}, "chaussure": "ASICS Novablast 5", "splits": [[362, 130], [351, 133], [357, 139], [359, 135], [362, 135], [349, 136], [346, 138], [335, 140], [350, 141], [343, 141]], "lecture": "Allure régulière entre 5:35 et 6:02/km, FC qui glisse doucement de 130 à 141 — une dérive de +11 bpm sur une heure, parfaitement normale et même basse. Cadence stable à 172 ppm du début à la fin. Le 8e km à 5:35 est le seul moment où ça frémit.", "revue": "La séance compte moins que la décision : parti pour 13-15 km en se sentant très bien, tu as coupé à 10. <strong>S'arrêter parce que ça va bien, c'est la compétence n°1 du coureur qui dure</strong> — et celle qui te manquait mardi. Allure au bord intérieur de la cible (5:52 pour un plancher à 5:55), mais la FC à 137 valide l'effort. Trois jours, trois enseignements : mardi le piège, mercredi le modèle, vendredi la maturité."}], "revue": "<strong>Semaine de récup exemplaire : 3 sorties, 36,4 km, tout à plat, zéro intensité structurée.</strong> Mardi, le 16 km a fini en progressif jusqu'à 4:50/km (FC 164) — le réflexe zone grise dans sa version la plus sournoise : la séance qui dérive. Mercredi et vendredi : deux 10 km modèles (FC plate à 137). Le signal fort de la semaine, c'est vendredi : parti pour 13-15 km en se sentant très bien, tu as coupé à 10. <strong>S'arrêter parce qu'on se sent bien, c'est la maturité d'entraînement qu'on cherche.</strong> Zéro douleur dos, zéro douleur jambes : récupération en avance. Tu abordes la S25 dans des conditions idéales."};

const JOURNAL=[{"sem": "S24", "theme": "Récupération post-Circaète", "texte": "<strong>Semaine de récup exemplaire : 3 sorties, 36,4 km, tout à plat, zéro intensité structurée.</strong> Mardi, le 16 km a fini en progressif jusqu'à 4:50/km (FC 164) — le réflexe zone grise dans sa version la plus sournoise : la séance qui dérive. Mercredi et vendredi : deux 10 km modèles (FC plate à 137). Le signal fort de la semaine, c'est vendredi : parti pour 13-15 km en se sentant très bien, tu as coupé à 10. <strong>S'arrêter parce qu'on se sent bien, c'est la maturité d'entraînement qu'on cherche.</strong> Zéro douleur dos, zéro douleur jambes : récupération en avance. Tu abordes la S25 dans des conditions idéales."}, {"sem": "S25", "theme": "Reprise & déblocage", "texte": "<p>La semaine de reprise que tu devais faire. Pas celle que tu espérais peut-être, mais celle qu'il fallait — et tu l'as exécutée proprement.</p><p><strong>Ce qui ressort avant tout : la gestion de la chaleur.</strong> Quatre séances sur cinq démarrées entre 7h25 et 8h30. L'écart entre la s3 (FC 165/181, subi à midi) et les quatre autres (FC 140-151, maîtrisé) dit tout. Ce n'est pas une variable de confort, c'est une variable de performance.</p><p><strong>La progression dans la semaine est nette.</strong> S1/S2 très faciles (FC 140-143). S3 qualité en milieu de semaine, 6 km à 5:14/km tenus. S4 sortie longue avec fast finish à <strong>4:58/km sur le dernier kilomètre</strong> — sub-5 min au 4e jour consécutif en canicule. S5 bonus parfait, FC 144 en plein cœur de la Z2, rien dépensé.</p><p><strong>Ce que cette semaine confirme pour la Déraille (J-16) :</strong> tu n'es pas en reprise, tu es en forme. La Z2 pace à 5:56/km avec FC 140-144, c'est ton moteur aérobie qui tourne. Le fast finish montre que la résistance à la fatigue est là. S26 allégée par conception — laisse-la être légère.</p>"}, {"sem": "S26", "theme": "Allègement + prépa Déraille", "texte": "La semaine que la canicule a mangée. Quatre nuits à plus de 30°C, journées à 40°C — sur 4 séances prévues, 2 réalisées (21,9 km sur 35). Mais les 2 faites étaient les bonnes : lundi footing + lignes droites à 5:53/km FC 148 (RPE 3), jeudi 10,7 km à 5:47/km avec dérive cardiaque maîtrisée après 2 jours d'arrêt forcé. Mardi-mercredi sautés : pas de la flemme, du jugement — courir par 40°C à J-10 aurait coûté plus que ça n'aurait rapporté. La spécifique trail vallonnée a été sacrifiée à la chaleur — le stimulus manque, la fraîcheur est intacte. À une semaine d'une course Objectif C, c'est le bon arbitrage."}, {"sem": "S27", "theme": "Semaine course — Trail Déraille", "texte": "La semaine de course, et elle s'est terminée comme elle devait : par une vraie réussite de gestion. 53 km au total dont la Déraille (23,3 km, D+ 957 m) bouclée en 2:52:48 — 66e sur 180, 11e/18 en M0. La semaine a commencé fort avec 13 km tranquilles avec Edwige lundi (un peu longs pour une semaine de course, mais faits en plaisir), puis un tempo interrompu par un souci gastrique mardi — arrêté au bon moment, sans forcer. Le footing EF de jeudi (10,5 km, FC 148, zéro PR) était la sortie d'affûtage parfaite : le corps en automatique, le système digestif rétabli. Et dimanche, la course : FC moyenne 168 tenue sur 2h52 sans jamais d'effondrement, contrairement à la Circaète. Le mur des 2 derniers km était thermique (FC haute, allure qui chute), pas nutritionnel. Sur ~4h de sommeil et sans prépa trail, c'est une performance de tête autant que de jambes. Objectifs atteints : relancer la machine, tester la nutrition, courir intelligemment. Bilan de semaine : solide."}];

mentaire": "Footing facile 10 km en 1h + 6 lignes droites de 100 m (km 9-10 plus rapides).", "pr": 0, "ach": 2, "pr_detail": ["Segment Pont de la Guillotière", "Segment Antonin Poncet & Pont de la Gui"], "revue": "<strong>Reprise sans faute.</strong> Les 8 premiers km tenus à 6:02/km de moyenne, FC moyenne à 142 (le plafond EF de 144 respecté) : exactement la discipline qu'on visait après La Circaète. FC qui monte doucement de 133 à 144 sur l'heure — du cardiac drift normal, aucune dérive parasite. <strong>Tu n'as pas couru en zone grise : c'est ça, la vraie victoire de la séance.</strong> Les 6 lignes droites ressortent sur les km 9-10 (FC jusqu'à 173, ~90 % FCmax, 2 records de segment au passage), foulée restée propre (cadence 171, pas de sur-foulée). Avec ~30 s de récup entre chaque ligne, l'exécution était bonne : la FC moyenne élevée sur ces km (~160) n'est pas un excès, juste l'<em>inertie cardiaque</em> normale entre des efforts courts et rapprochés. Si un jour tu veux les rendre encore plus purement neuromusculaires, tu peux étirer la récup à 45-60 s — c'est une option, pas une correction. <strong>Dos et jambes ont parfaitement encaissé : reprise modèle.</strong> 👏"}, "chaussure": "HOKA Clifton 10", "nutrition": null, "date": "2026-06-15", "fit": "fit/S25-1-footing-lignes.fit"}, {"titre": "Footing facile", "type": "EF aérobie", "sport": "Course à pied", "opt": false, "accent": "#16a34a", "fill": 28, "sous": "Volume aérobie pur, plat, facile.", "metriques": {"Distance": "~9 km", "Durée": "~55 min", "Allure": "5:50-6:25/km", "FC": "135-150", "RPE": "3", "Type": "EF"}, "objectif": "Du volume aérobie facile sur le plat — le socle polarisé qui rend la qualité efficace.", "struct": [{"nom": "Échauffement", "txt": "10 min de montée d'allure douce."}, {"nom": "Corps", "txt": "Footing continu facile et régulier, terrain plat, allure de conversation."}, {"nom": "Retour", "txt": "Fin naturellement relâchée + étirements doux."}], "benefices": "Capillarisation, base aérobie, durabilité.", "vigilance": "Garde-la facile même en pleine forme — c'est là qu'on tue la zone grise.", "legende": [{"c": "#16a34a", "l": "Facile / EF — RPE 3"}], "coach": [{"titre": "Discipline de l'easy", "texte": "Le facile te permet de pousser fort les jours de qualité. Lève le pied volontairement."}], "num": 2, "id": 2, "rpe": 3.0, "cat": "classique", "realise": {"statut": "fait", "km": 10.14, "temps": "1h00", "allure": "5:56/km", "fc_moy": 140, "fc_max": 167, "rpe_ressenti": 3, "commentaire": "Footing facile 10,1 km en 1h pile, allure régulière ~5:56/km le long des berges. Effort relatif 58 (plus bas que S25-1) — un vrai easy.", "pr": 0, "ach": 0, "pr_detail": [], "revue": "<strong>Deuxième easy, deuxième sans-faute.</strong> FC moyenne à 140 sur l'heure (plafond EF de 144 respecté, encore mieux que les 143 de mardi), allure métronomique entre 5:48 et 6:06/km : tu es exactement où tu dois être. Le détail qui me plaît, c'est la stabilité — la FC démarre à 132 sur les 2 premiers km, touche 144 au km 3, puis se cale autour de 138-142 jusqu'au bout sans jamais déraper. <strong>Aucune dérive cardiaque parasite sur 1 h : le moteur aérobie encaisse proprement.</strong> Le seul pic à 167 est sur les 142 derniers mètres (petite bosse à 3 %), c'est anecdotique et ça ne compte pas comme un excès. Cadence à 173, régulière et propre, foulée économique. L'effort relatif à 58 contre 69 mardi confirme que celui-ci était plus facile — la fraîcheur revient. <strong>Deux footings d'affilée tenus dans la zone juste : la discipline anti-zone-grise qui te plombait est en train de devenir un automatisme.</strong> C'est précisément le socle qu'il faut poser avant d'attaquer l'allure marathon en séance 3. Rien à corriger — continue comme ça. 👏"}, "chaussure": "ASICS Novablast 5", "nutrition": null, "date": "2026-06-16", "fit": "fit/S25-2-footing-facile.fit"}, {"titre": "Allure marathon 1×6 km", "type": "Spécifique marathon", "sport": "Course à pied", "opt": false, "accent": "#0d9488", "fill": 78, "sous": "Premier contact sérieux avec l'allure marathon — 6 km à tenir proprement.", "metriques": {"Distance": "~12 km", "Durée": "~72 min", "Allure": "≈5:15/km", "FC": "152-163", "RPE": "6-7", "Type": "Allure marathon"}, "objectif": "Ancrer l'allure marathon cible (~5:15/km) jusqu'à ce qu'elle devienne automatique et économique.", "struct": [{"nom": "Échauffement", "txt": "15 min facile + 2 lignes droites."}, {"nom": "Corps", "txt": "1 × 6 km à allure marathon (≈5:15/km), récup 3 min footing. Allure « juste », fluide."}, {"nom": "Retour", "txt": "25 min souple + recharge hydrique."}], "benefices": "Automatisation de l'allure cible, efficacité à cette vitesse, confiance pour le jour J.", "vigilance": "L'allure marathon doit sembler confortable. Si elle est dure aujourd'hui, c'est un signal — on en parle.", "legende": [{"c": "#16a34a", "l": "Facile / récup"}, {"c": "#0d9488", "l": "Allure marathon — RPE 6-7"}], "coach": [{"titre": "Le bon ressenti", "texte": "À l'allure marathon tu dois pouvoir dire 3-4 mots. Plus aisé = trop lent, essoufflé = trop vite."}], "segments": [{"nom": "Échauffement", "role": "15 min facile.", "duree": 900, "couleur": "vert", "bloc": "—", "hauteur": 34, "debut": 0, "fin": 900}, {"nom": "Bloc AM 1/1", "role": "6 km à allure marathon (≈5:15/km).", "duree": 1890, "couleur": "bleu", "bloc": "×1", "hauteur": 80, "debut": 900, "fin": 2790}, {"nom": "Retour au calme", "role": "25 min souple.", "duree": 1500, "couleur": "vert", "bloc": "—", "hauteur": 28, "debut": 2790, "fin": 4290}], "num": 3, "id": 3, "rpe": 6.5, "cat": "specifique", "realise": {"statut": "fait", "km": 10.14, "temps": "54:10", "allure": "5:14/km (bloc AM)", "fc_moy": 165, "fc_max": 181, "rpe_ressenti": 7, "commentaire": "6 km AM à 5:14/km de moyenne. Conditions extrêmes : midi, 30°C, gueule de bois. Séance écourtée à 10 km (vs 12 prévus) — décision sage. 4 PRs de segment au passage.", "pr": 4, "ach": 4, "pr_detail": ["Pont Raymond Barre", "Quai Rambaud S-N", "darse Confluence", "Dernier km Marathon de Lyon"], "revue": "<strong>La séance la plus honnête de la semaine — et probablement la plus révélatrice.</strong> Commence par les faits : 5:14/km de moyenne sur 6 km en bloc continu, à midi, 30°C, avec une gueule de bois. Km par km : 5:10 / 5:13 / 5:14 / 5:19 (pause eau) / 5:13 / 5:14. <strong>Aucun décrochage, aucune fuite en avant.</strong> C'est ça, le vrai signal de cette séance — tu as tenu l'allure cible de bout en bout dans des conditions qui auraient fait marcher beaucoup de gens.<br><br>La FC, maintenant — et là il faut être honnête. FC moy 165 sur la séance, 169-174 sur le bloc AM, max à 181 en fin de récup. <strong>C'est 20-25 bpm au-dessus de ce que produirait la même allure dans des conditions normales.</strong> La combinaison alcool la veille + déshydratation + chaleur de midi décale la FC vers le haut de façon prévisible et documentée : la chaleur augmente la demande cardiaque pour réguler la température, la déshydratation réduit le volume sanguin (le cœur doit battre plus vite pour compenser). <strong>Ce n'est pas un test de tes capacités aérobies, c'est un test de ta solidité mentale et de ton ancrage moteur à l'allure.</strong><br><br>La décision d'arrêter à 10 km était la bonne : l'essentiel était fait. Une note franche quand même : la FC à 181 (94 % de ta FCmax) sur ce qui devrait être une récupération, c'est le signe que le corps était sous forte contrainte. Ce n'est pas une leçon de morale — c'est un repère physiologique : dans ces conditions, un report ou une sortie EF lente était une meilleure option. Mais tu l'as géré, et ça donne une information précieuse : <strong>ton allure marathon est bien ancrée même quand tout va de travers. C'est rassurant pour Nice.</strong> 👏"}, "chaussure": "ASICS Magic Speed 4", "nutrition": null, "date": "2026-06-17", "fit": "fit/S25-3-allure-marathon.fit"}, {"titre": "Sortie longue endurance", "type": "Sortie longue", "sport": "Course à pied", "opt": false, "accent": "#f r la fiche.<br><br><strong>Point canicule pour les 10 prochains jours :</strong> avec les températures annoncées, chaque séance se fait entre 6h et 9h, sans exception. L'allure cible baisse de 10-15 s/km automatiquement pour maintenir la même FC. Ce n'est pas un recul — c'est de la gestion intelligente. Ton moteur aérobie s'adapte à la chaleur en 7-10 jours (acclimatation thermique), et ces sorties matinales contribuent à ce processus. 💪"}, "chaussure": "ASICS Novablast 5", "nutrition": {"titre": "Sortie longue — les bonnes habitudes", "items": [["💧 Hydratation", "emporter de l'eau (flasque ou ceinture), boire régulièrement"], ["🧂 Électrolytes", "utile si chaleur ou si tu transpires beaucoup"], ["⚡ Gels", "1 gel vers 50-60 min suffit à ce format"], ["🎯 Cible", "30-45 g de glucides/h — on construit l'habitude, pas la performance"]]}, "date": "2026-06-18", "fit": "fit/S25-4-sortie-longue.fit"}, {"titre": "Footing facile", "type": "EF aérobie", "sport": "Course à pied", "opt": true, "accent": "#16a34a", "fill": 28, "sous": "Volume aérobie pur, plat, facile.", "metriques": {"Distance": "~10 km", "Durée": "~65 min", "Allure": "5:50-6:25/km", "FC": "135-150", "RPE": "3", "Type": "EF"}, "objectif": "Du volume aérobie facile sur le plat — le socle polarisé qui rend la qualité efficace.", "struct": [{"nom": "Échauffement", "txt": "10 min de montée d'allure douce."}, {"nom": "Corps", "txt": "Footing continu facile et régulier, terrain plat, allure de conversation."}, {"nom": "Retour", "txt": "Fin naturellement relâchée + étirements doux."}], "benefices": "Capillarisation, base aérobie, durabilité.", "vigilance": "Garde-la facile même en pleine forme — c'est là qu'on tue la zone grise.", "legende": [{"c": "#16a34a", "l": "Facile / EF — RPE 3"}], "coach": [{"titre": "Discipline de l'easy", "texte": "Le facile te permet de pousser fort les jours de qualité. Lève le pied volontairement."}], "num": 5, "id": 5, "rpe": 3.0, "cat": "classique", "realise": {"statut": "fait", "km": 10. e. <strong>Cascadia 19 pour la Déraille.</strong><br><br><strong>La suite :</strong> repos vendredi-samedi, hydratation, glucides simples, sommeil maximal. Tu es prêt."}, "chaussure": "Clifton 10", "nutrition": null, "date": "2026-07-02"}, {"titre": "TRAIL DÉRAILLE — LAC DES SAPINS", "type": "Trail — Objectif C", "sport": "Trail", "opt": false, "accent": "#0d9488", "fill": 100, "sous": "24 km · ~900 m D+ · vallonné, roulant · course plaisir & test nutrition.", "metriques": {"Distance": "24,05 km", "D+": "~900 m", "Allure": "à l'effort", "FC": "gérée", "RPE": "6-7", "Type": "Trail vallonné"}, "objectif": "Course <strong>plaisir</strong> et laboratoire nutrition grandeur nature. Aucun enjeu chrono : on teste le protocole carburant/électrolytes sur 2h15-2h30 en conditions chaudes — la leçon de La Circaète appliquée.", "struct": [{"nom": "Gestion", "txt": "Pars dans ta zone de confort : sur 900 m D+ roulant, c'est l'effort qui se gère, pas l'allure. Marche les raidillons s'il y en a, relâche en descente. FC sous 160-165 sur les 5 premiers km, ne te fais pas emporter par le départ de masse."}, {"nom": "Carburant — LE point", "txt": "Électrolytes dès le km 5 (pas km 15 comme à La Circaète), 1 gel toutes les 40-45 min dès la 40ᵉ minute. Bois à chaque ravito. En juillet, le froid ne masquera pas la soif : c'est la chaleur qui te piège, anticipe."}, {"nom": "Plaisir", "txt": "C'est une course « pour voir » : beaujolais vert, sentiers techniques, bonne ambiance. Savoure, observe ton corps, ramène des données propres pour Nice."}], "benefices": "Un vrai test de ta gestion nutrition/électrolytes en course, sans l'enjeu d'un objectif — exactement le rodage qui manquait après La Circaète.", "vigilance": "Ton côté compétiteur va te chatouiller sur les sentiers : tiens la consigne « plaisir + test ». Une Déraille bien gérée nourrit Nice ; un forcing inutile entame ta reprise.", "legende": [{"c": "#16a34a", "l": "Gestion / facile"}, {"c": "#0d9488", "l": "Course trail — effort"}], "coach": [{"titre": "La course est un entraînement déguisé", "texte": "Tu n'es pas là pour un chrono mais pour valider ton estomac sous contrainte. Si tu finis sans coup de moins-bien électrolytique, c'est une victoire qui vaut de l'or pour Nice."}, {"titre": "Électrolytes : la leçon retenue", "texte": "La Circaète est tombée là-dessus. Aujourd'hui tu prouves que le correctif fonctionne — dès le km 5, en continu, sans attendre la sensation."}], "num": 4, "id": 4, "rpe": 6.5, "cat": "specifique", "realise": {"statut": "fait", "km": 23.3, "temps": "2:52:48", "allure": "7:12/km", "fc_moy": 168, "fc_max": 181, "rpe_ressenti": 8, "commentaire": "TRAIL DÉRAILLE · 23,3 km · D+ 957 m · 66e/gen · 11e/18 M0 · FC 168/181 (88% FCmax) · 2388 kcal · Cascadia 19 · chaleur intense · ~4h sommeil · 3 gels + 3L (1L électrolytes). Course de gestion réussie.", "pr": 0, "ach": 1, "pr_detail": [], "revue": "<strong>Course de gestion réussie dans des conditions extrêmes.</strong> ~4h de sommeil, zéro prépa trail depuis la Circaète, forte chaleur — et tu finis 66e en courant, sans effondrement. FC moyenne 168 (88% FCmax) tenue sur 2h52 : la stratégie de gestion a parfaitement fonctionné.<br><br><strong>Le mur final était thermique, pas nutritionnel.</strong> Sur les 2 derniers km, ta FC reste à 170 pendant que l'allure s'effondre — signature déshydratation + chaleur, pas de panne de sucre. Ta descente reste une arme (km 18 à 4:46/km !). <strong>Voir le détail complet dans le Palmarès.</strong>"}, "chaussure": "Cascadia 19", "nutrition": {"titre": "Protocole course Déraille — LE test grandeur nature", "items": [["💧 Hydratation", "flasques pleines au départ, recharge à chaque ravito — ne jamais attendre la soif"], ["🧂 Électrolytes", "dès le km 5 et en continu — c'est précisément ce qu'on corrige après La Circaète"], ["⚡ Gels", "1 gel toutes les 40-45 min dès la 40ᵉ min, aux produits déjà testés (mêmes marques que Nice)"], ["🎯 Cible", "50-70 g de glucides/h sur 2h15-2h30 — note tout, on en tire le protocole définitif de Nice"]]}, "date": "2026-07-05"}], "28": [{"titre": "Footing de récupération", "type": "Récupération active", "sport": "Course à pied", "opt": false, "accent": "#16a34a", "fill": 22, "sous": "Très facile, circulation, on efface la fatigue.", "metriques": {"Distance": "~6 km", "Durée": "~38 min", "Allure": "6:15-6:45/km", "FC": "<140", "RPE": "2-3", "Type": "Récup"}, "objectif": "Footing très facile pour récupérer activement, sans aucun objectif de performance.", "struct": [{"nom": "Corps", "txt": "Footing lent et relâché, plat. Tu finis avec l'impression d'en avoir gardé largement sous le pied."}, {"nom": "Retour", "txt": "Étirements doux, mobilité légère."}], "benefices": "Circulation, récupération, sans ajout de fatigue.", "vigilance": "Vraiment lent. Si tu n'as pas envie, marche ou repos : c'est la séance la plus sacrifiable.", "legende": [{"c": "#16a34a", "l": "Récupération — RPE 2-3"}], "coach": [{"titre": "Lent = utile", "texte": "Une récup réussie est une récup qui ne ressemble pas à un entraînement."}], "num": 1, "id": 1, "rpe": 2.5, "cat": "classique", "realise": {"statut": "fait", "km": 11.03, "temps": "1h07", "allure": "6:02/km", "fc_moy": 148, "fc_max": 192, "rpe_ressenti": 4, "commentaire": "11,03 km en 1h07 · matin 9h07 · FC 148/192 · cadence 85 · D+ 39 m · RE 106 · 880 kcal · Novablast 5 J · 6 PRs · avec Anis (Yannis). Km 1-9 calés sur lui (~6:20-6:30, FC 138-153, récup pure), puis gros dernier km solo à 4:14/km avec FC 184 (max 192 = FCmax). J+2 Déraille, aucune douleur, jambes légères.", "pr": 6, "ach": 6, "pr_detail": ["Finish km 11 à 4:14/km"], "revue": "<strong>Le bon usage d'une récup active — avec un finish qui en dit long sur ton état.</strong> Km 1 à 9 calés sur Anis à 6:20-6:30/km, FC 138-153 : c'est <em>encore plus lent</em> que la prescription récup, et c'est exactement ce qu'il fallait à J+2 du trail. Circulation, zéro charge, plaisir partagé. Le manuel du coach.<br><br><strong>Puis le dernier km à 4:14/km, FC 184, max 192.</strong> Ta FCmax exacte atteinte, 2 jours après 957 m de D+, sans jambes lourdes et sans douleur. Ce finish me dit une chose claire : <strong>ton système neuromusculaire est complètement récupéré du trail.</strong> L'énergie est là, le trail est digéré.<br><br><strong>Le bémol honnête :</strong> sur une séance étiquetée récup, ce dernier km à FCmax n'était pas obligatoire, tu le dis toi-même. Une vraie récup reste sous 75% FCmax. Mais ici ça ne compromet rien : c'était court (1 km), le reste était vraiment très facile, et ton corps encaisse bien. À ne pas répéter à chaque footing — mais ponctuellement, sur des jambes qui en réclament, aucun problème.<br><br><strong>L'enseignement :</strong> tu es en avance sur ta récup. On garde S28 en récup comme prévu (pas de bêtise), mais on abordera le seuil de S29 avec sérénité — ton corps répond mieux que le plan ne le supposait."}, "chaussure": "Novablast 5 J", "nutrition": null, "date": "2026-07-07"}, {"titre": "Footing de récupération", "type": "Récupération active", "sport": "Course à pied", "opt": false, "accent": "#16a34a", "fill": 22, "sous": "Très facile, circulation, on efface la fatigue.", "metriques": {"Distance": "~8 km", "Durée": "~50 min", "Allure": "6:15-6:45/km", "FC": "<140", "RPE": "2-3", "Type": "Récup"}, "objectif": "Footing très facile pour récupérer activement, sans aucun objectif de performance.", "struct": [{"nom": "Corps", "txt": "Footing lent et relâché, plat. Tu finis avec l'impression d'en avoir gardé largement sous le pied."}, {"nom": "Retour", "txt": "Étirements doux, mobilité légère."}], "benefices": "Circulation, récupération, sans ajout de fatigue.", "vigilance": "Vraiment lent. Si tu n'as pas envie, marche ou repos : c'est la séance la plus sacrifiable.", "legende": [{"c": "#16a34a", "l": "Récupération — RPE 2-3"}], "coach": [{"titre": "Lent = utile", "texte": "Une récup réussie est une récup qui ne ressemble pas à un entraînement."}], "num": 2, "id": 2, "rpe": 2.5, "cat": "classique", "realise": {"statut": "fait", "km": 10.03, "temps": "1h02", "allure": "6:12/km", "fc_moy": 140, "fc_max": 163, "rpe_ressenti": 3, "commentaire": "10,03 km en 1h02 (temps de mouvement) · matin 9h16 · FC 140/163 · cadence 87 · D+ 22 m · RE 60 · 775 kcal · Clifton 10 · 4 PRs · avec Yannis · forte chaleur (canicule persistante). Pause d'environ 18 min au km 5 (discussion), FC qui dérive légèrement en fin de sortie (153→163) par la chaleur, allure stable.", "pr": 4, "ach": 4, "pr_detail": [], "revue": "<strong>Vrai footing de récup, partagé et bien géré malgré la chaleur.</strong> FC moyenne 140 (73% FCmax) sur 10 km à 6:12/km — exactement le registre attendu après la semaine de récup post-Déraille. La pause d'une vingtaine de minutes au km 5 (visiblement une pause discussion avec Yannis) n'a rien d'un problème : courir accompagné avec des arrêts naturels, c'est aussi ça la récup active, et c'est bon pour le mental autant que pour les jambes.<br><br><strong>La dérive de FC en fin de sortie (137 en milieu de course → 154 puis 163 sur le dernier km) alors que l'allure reste stable</strong> est la signature classique de la chaleur qui s'accumule, pas d'un manque de forme — le même mécanisme que sur la Déraille, mais ici sans enjeu puisque c'est un footing tranquille. Rien d'inquiétant, juste le rappel que l'été lyonnais tape fort en ce moment.<br><br><strong>Bilan :</strong> semaine de récup qui se déroule comme prévu, deuxième sortie facile encaissée sans accroc après le gros footing de mardi. Cap sur la suite de S28."}, "chaussure": "Clifton 10", "nutrition": null, "date": "2026-07-08"}, {"titre": "Footing facile", "type": "EF aérobie", "sport": "Course à pied", "opt": false, "accent": "#16a34a", "fill": 28, "sous": "Volume aérobie pur, plat, facile.", "metriques": {"Distance": "~10 km", "Durée": "~60 min", "Allure": "5:50-6:25/km", "FC": "135-150", "RPE": "3", "Type": "EF"}, "objectif": "Du volume aérobie facile sur le plat — le socle polarisé qui rend la qualité e xt": "15 min très souples."}, {"nom": "Corps", "txt": "12 km à allure facile régulière, plat à légèrement vallonné. Nutrition : boire toutes les 15-20 min, électrolytes dès le départ, 1 gel/30-40 min au-delà d'1h30."}, {"nom": "Retour", "txt": "Marche 5 min + étirements, recharge hydrique/électrolytes."}], "benefices": "Endurance, oxydation des graisses, résistance à la fatigue — et rodage du carburant.", "vigilance": "Pars volontairement lent : la longue se court sur la retenue. Fatigue marquée → réduis la distance mais ne supprime pas la séance. Été : par forte chaleur, cours à la FC/sensation (pas au chrono) et renforce l'hydratation/électrolytes.", "legende": [{"c": "#16a34a", "l": "Facile / EF"}], "coach": [{"titre": "Le carburant, ta priorité", "texte": "La longue est ton labo nutrition. Note ce que tu absorbes et ton ressenti — on cale la stratégie marathon dessus."}], "segments": [{"nom": "Échauffement", "role": "15 min très souple — inclus dans le kilométrage total.", "duree": 900, "couleur": "vert", "bloc": "—", "hauteur": 30, "debut": 0, "fin": 900}, {"nom": "Corps", "role": "EF régulière.", "duree": 2820, "couleur": "vert", "bloc": "—", "hauteur": 44, "debut": 900, "fin": 3720}, {"nom": "Retour au calme", "role": "Marche + recharge.", "duree": 300, "couleur": "vert", "bloc": "—", "hauteur": 28, "debut": 3720, "fin": 4020}], "num": 4, "id": 4, "rpe": 4.5, "cat": "classique", "realise": {"statut": "fait", "km": 18.16, "temps": "1h46", "allure": "5:50/km", "fc_moy": 148, "fc_max": 165, "rpe_ressenti": 6, "commentaire": "18,16 km en 1h46 (temps de mouvement) · matin 8h53 · FC 148/165 · cadence 88 · D+ 67 m · RE 171 · 1410 kcal · Novablast 5 J · 5 PRs · avec Edwige. Sortie longue avancée au jeudi (au lieu de vendredi) car départ 4 jours en montagne (rando probable) dès demain. Allure très homogène (5:19 à 6:12/km selon les km), FC qui monte en fin de sortie (146→160) sur les 2 derniers km à allure inchangée. Hydratation : 1 flasque 500ml boisson d'effort électrolytes zéro calorie en démarrage, puis 2 flasques 500ml (1,5L total, ~850 ml/h) + 1 gel. Stratégie ressentie comme très efficace par forte chaleur.", "pr": 5, "ach": 5, "pr_detail": [], "revue": "<strong>Belle sortie longue, et une réorganisation intelligente.</strong> Avancer la longue au jeudi pour libérer les 4 jours de montagne à venir, c'est exactement le bon réflexe : ne jamais sacrifier la séance la plus structurante de la semaine pour un impératif d'agenda — on la déplace, on ne l'annule pas.<br><br><strong>Exécution solide :</strong> 18 km à 5:50/km de moyenne, allure remarquablement stable du début à la fin (5:19 à 6:12/km selon les segments, sans vraie chute). FC moyenne 148 (77% FCmax) — un effort maîtrisé, ni trop mou ni poussé.<br><br><strong>La dérive de FC des 2 derniers kilomètres</strong> (146 → 152 → 160, max 165) alors que l'allure ne bouge quasiment pas est la même signature que sur tes sorties précédentes cette semaine : la chaleur qui s'accumule sur la durée, pas un signe de fatigue ou de mauvaise gestion. À 1h46 d'effort avec cette canicule persistante, c'est attendu et sans gravité.<br><br><strong>La stratégie d'hydratation était la bonne, et à retenir.</strong> 1,5L sur la sortie (~850 ml/h) en commençant par une boisson d'effort électrolytes zéro calorie plutôt que d'attendre la soif : c'est exactement ce qui traite la cause de cette dérive de FC en fin de sortie — pertes hydro-électrolytiques qui s'accumulent avec la chaleur. Complété par 1 gel pour le carburant, dosage cohérent pour 1h46 d'effort modéré. <strong>Garde ce protocole tant que la canicule dure</strong> — attaquer avec les électrolytes puis boire en continu, c'est la bonne discipline. Seule nuance si tu montes en durée (2h30-3h type finish AM) : il faudra alors combiner électrolytes et apport glucidique dans la boisson, les électrolytes seuls ne suffisant plus sur des efforts plus longs.<br><br><strong>Avant de partir :</strong> pense à ton dos sur les 4 jours de rando — sac à dos bien réglé (poids proche du corps, bretelles serrées), surtout en descente où les lombaires encaissent. La rando en montagne est une vraie charge physique, pas du repos passif : ce sera bénéfique pour l'endurance générale, à condition de rester attentif à l'hydratation et à ne pas forcer sur les descentes chargé si le dos tire. Bon voyage — on recalibre S28 et la reprise à ton retour."}, "chaussure": "Novablast 5 J", "nutrition": null, "date": "2026-07-09", "fit": "fit/S28-4-sortie-longue.fit"}, {"titre": "Trail montagne avec les copains", "type": "Trail montagne — sortie plaisir", "sport": "Trail", "opt": true, "accent": "#94a3b8", "fill": 40, "sous": "Format court, gros dénivelé · montée marchée, descente engagée", "metriques": {"Distance": "10,7 km", "D+": "646 m", "Durée": "2h07", "Type": "Trail montagne"}, "objectif": "Sortie trail plaisir entre copains en montagne. Aucun objectif de performance : on monte tranquille en marchant, on lâche les jambes en descente, on profite du terrain et du dénivelé. Le genre de sortie qui construit l'endurance générale et le mental sans peser sur la charge structurée du plan.", "struct": [{"nom": "Montée", "txt": "~2 km à pied, pente +13 à +16%. Marche efficace, on économise."}, {"nom": "Traversée", "txt": "Terrain ondulant, allure libre selon le groupe."}, {"nom": "Descente", "txt": "Fin de sortie engagée, pente jusqu'à -20%. Vivacité de pied, on lâche les jambes."}], "benefices": "Moteur aérobie (2h d'effort continu), force spécifique via le dénivelé, travail excentrique des quadriceps en descente, proprioception et vivacité de pied. Et surtout : plaisir et mental, le carburant d'une prépa longue.", "vigilance": "Après une descente chargée en dénivelé, surveille ton dos (ta vigilance connue) et tes quadriceps qui encaissent l'excentrique. Rien d'alarmant ici, mais reste à l'écoute les 48h suivantes.", "legende": [{"c": "#16a34a", "l": "Montée marchée / échauffement"}, {"c": "#94a3b8", "l": "Descente active"}], "coach": [{"titre": "En montée", "texte": "Marcher sur les fortes pentes n'est pas un aveu de faiblesse — c'est souvent plus efficace et moins coûteux que courir. Les meilleurs traileurs le font."}, {"titre": "En descente", "texte": "La descente technique est un vrai travail : elle muscle l'excentrique et affûte la proprioception, des qualités qu'un plan route ne développe jamais."}], "num": 5, "id": 5, "rpe": 4, "cat": "trail", "realise": {"statut": "fait", "km": 10.7, "temps": "2h07", "allure": "11:53/km", "fc_moy": 138, "fc_max": 179, "rpe_ressenti": 4, "commentaire": "10,70 km en 2h07 (temps de mouvement) · matin 9h28 · D+ 646 m · FC 138/179 · cadence 65 · RE 118 · 1245 kcal · Cascadia 19 · avec les copains. Vrai profil trail montagne : montée raide marchée sur les 2 premiers km (pente +13 puis +16%, FC 134-150, cadence 54-56), terrain ondulant au milieu, puis descente active et engagée sur la fin (pente jusqu'à -20%, cadence qui monte à 82-84, vitesse jusqu'à ~3:00/km, FC 165-179 sur les segments roulants). Sortie plaisir, très bonnes sensations.", "pr": 0, "ach": 1, "pr_detail": [], "revue": "<strong>La sortie qui fait du bien — et qui compte plus qu'elle n'en a l'air.</strong> 646 m de D+ sur 10,7 km, c'est un vrai profil de montagne : un ratio dénivelé/distance qui met les jambes et le cardio au travail bien au-delà de ce que la distance suggère. Le découper en « montée marchée / descente active » était exactement la bonne façon de l'aborder en sortie plaisir.<br><br><strong>La montée</strong> (km 1-2, pente +13 à +16%, FC 134-150, cadence 54-56) : marchée intelligemment. Sur ces pentes, marcher est souvent plus efficace et moins coûteux que courir — les meilleurs traileurs le font. Zéro gâchis d'énergie, FC maîtrisée.<br><br><strong>La descente</strong> (fin de sortie, pente jusqu'à -20%, cadence 82-84, FC 165-179) : c'est là que tu es allé chercher de l'intensité, et c'est parfait ainsi. La descente technique travaille l'excentrique (les quadriceps encaissent), la proprioception et la vivacité de pied — des qualités qu'un plan route ne développe jamais. FC moyenne 138 (72% FCmax) sur 2h : effort aérobie modéré, parfaitement dans le registre « sortie plaisir ».<br><br><strong>Ce que ça apporte à ta prépa Nice :</strong> même si Nice est une route, cette sortie construit du moteur aérobie (2h d'effort continu), de la force spécifique (le dénivelé), et surtout du plaisir et du mental — le carburant qui te fait tenir 30 semaines de prépa. Elle tombe en semaine de récup post-Déraille, donc j'aurais un léger bémol si tu avais cherché la performance ; mais là, c'était marché en montée et joué en descente, sans forcer — le corps encaisse très bien.<br><br><strong>Un point matériel :</strong> Cascadia 19 à présent ~230 km, elle est parfaite pour ce terrain. Et pense à ton dos après les descentes chargées — rien à signaler ici visiblement, mais c'est ta vigilance connue. <strong>Belle sortie, exactement le genre à s'autoriser.</strong>"}, "chaussure": "Cascadia 19", "nutrition": null, "date": "2026-07-11"}, {"id": 6, "num": 28, "type": "Trail montagne — sortie plaisir", "cat": "trail", "sport": "Trail", "titre": "Petit Croisse Baulet avec les copains", "sous": "Trail montagne sous la chaleur · grosse montée marchée, longue descente engagée", "date": "2026-07-12", "chaussure": "Cascadia 19", "rpe": 4, "accent": "#0d9488", "opt": false, "fill": true, "metriques": {"Distance": "11,0 km", "D+": "530 m", "Durée": "2h35", "Type": "Trail montagne"}, "objectif": "Deuxième sortie trail plaisir du week-end, cette fois au Petit Croisse Baulet et en pleine chaleur de l'après-midi. Toujours le même esprit : on grimpe tranquille, on profite, on lâche les jambes en descente. Une belle manière de boucler la semaine de récup avec du dénivelé et du plaisir.", "struct": [{"nom": "Approche", "txt": "Terrain roulant et légère descente pour se mettre en jambes (km 1-4)."}, {"nom": "La grosse montée", "txt": "Montée du Petit Croisse Baulet : 257 m D+ sur ~
