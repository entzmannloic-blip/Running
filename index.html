const DOSSIERS={"nice": {"nom": "Marathon des Alpes-Maritimes Nice-Cannes", "soustitre": "Promenade des Anglais, Nice → Boulevard de la Croisette, Cannes", "date": "Dimanche 8 novembre 2026", "depart": "Départ 8 h 00 · Promenade des Anglais (Nice) · Sas 3h45 disponible", "format": "42,195 km · Point-à-point · Label FFA & World Athletics · ~15 000 coureurs", "accent": "#f59e0b", "stats": [["42,195", "km"], ["+70", "D+ (m)"], ["35", "alt. max (m)"], ["3 h 45", "objectif"], ["5:20/km", "allure cible"]], "intro": "Le 2ᵉ plus grand marathon de France après Paris. <strong>42,195 km quasi plats le long de la Méditerranée</strong>, de la Promenade des Anglais à la Croisette — vue mer permanente, palmiers, soleil de novembre. Route intégralement bitumée, D+ de seulement ~70 m : pas de dénivelé à gérer, pas de marche prévue. Tout l'enjeu est <strong>la gestion d'allure sur la durée</strong>. C'est ton Objectif A de la saison.", "phrase": "3 h 45, soit <strong>5 min 20 / km</strong> du départ à l'arrivée. Le lièvre 3h45 est disponible — accroche-toi à lui jusqu'au km 30, puis gère selon tes jambes. Le seul piège : partir trop vite dans l'euphorie du départ.", "profil": "Profil réel GPX officiel (marathon06.com). Course quasi plate au niveau de la mer. Deux légères ondulations : une petite bosse vers le km 15-18 (Cagnes / Villeneuve-Loubet, ~12 m) et <strong>la seule vraie bosse du parcours vers le km 25-28 (Antibes, ~35 m)</strong>. Cette montée est modeste mais peut surprendre à mi-course si tu n'es pas calé à l'effort. Retour au niveau de la mer à partir de Juan-les-Pins.", "profil_dist": 42.195, "profil_pts": [11, 8, 9, 10, 14, 8, 9, 9, 9, 5, 6, 11, 11, 9, 5, 4, 4, 6, 7, 7, 3, 2, 5, 5, 4, 5, 4, 6, 12, 12, 10, 7, 4, 10, 7, 10, 11, 6, 4, 5, 3, 4, 3, 3, 4, 6, 3, 5, 5, 4, 3, 8, 15, 13, 7, 12, 6, 6, 6, 7, 7, 9, 9, 16, 7, 10, 7, 28, 33, 28, 19, 11, 6, 5, 4, 4, 5, 5, 5, 12, 8, 8, 10, 5, 2, 3, 4, 5, 3, 13, 16, 15, 22, 17, 19, 15, 14, 6, 5, 5, 8, 7, 3, 7, 4, 10, 7, 6, 4], "segments": [{"t": "1 · Nice — Saint-Laurent", "km": "km 0 → 8", "faire": "Départ Promenade des Anglais. Jambes fraîches, foule, adrénaline : <strong>le piège du marathon</strong>. Cible : 5:25/km au moins sur les 5 premiers km. Le lièvre 3h45 sera là — laisse-le légèrement partir devant si tu pars trop vite."}, {"t": "2 · Cagnes — Villeneuve-Loubet", "km": "km 8 → 18", "faire": "La Marina Baie des Anges vers le km 15. Légère ondulation, rien de méchant. <strong>Mi-course approche : gère à l'effort</strong>, pas au chrono. Si tu passes la demi à moins de 1h52, tu risques de payer après le km 30."}, {"t": "3 · Antibes — Juan-les-Pins", "km": "km 20 → 30", "faire": "La seule vraie bosse (km 25-28, ~35 m) — prends-la sans accélérer. Autour du km 20-21 tu franchis la demi-distance : moment de recalibrer. <strong>Le seuil critique du « mur » est entre le km 30 et 35</strong> — si tu arrives là fatigué, c'est que tu es parti trop vite."}, {"t": "4 · Golfe-Juan → Cannes", "km": "km 30 → 42", "faire": "C'est ici que la course se joue. Si tu as géré avant : tiens le 5:20/km et double les gens qui ont cramé. Si tu souffres : raccourcis légèrement la foulée, cadence haute, gel, et accroche-toi. La Croisette arrive — les marches rouges du Festival, c'est l'arrivée."}], "plan": [{"n": "1", "tag": "CONSERVATEUR", "c": "#f59e0b", "titre": "Sortie de Nice — freiner l'ego", "txt": "8h00 sur la Promenade des Anglais avec 15 000 coureurs. Les km 1-5 sont les plus dangereux du marathon : jambes fraîches, euphorie, public, faux-plats. Cible <strong>5:25 / km</strong> minimum sur les 5 premiers. Si tu passes le km 5 sous 26:30, tu es trop rapide.", "fuel": "Gel dès 40 min de course (km 8 environ) sans attendre la faim. Ravito km 5 : eau."}, {"n": "2", "tag": "GÉRER", "c": "#ea580c", "titre": "La longue ligne droite côtière", "txt": "Km 8 à 20 : tenir le 5:20/km sans forcer. La côte Méditerranée est magnifique, ça peut aller vite — surveille ton allure. Passage de la demi vers 1h52 à 1h53 : si tu es en avance, lève le pied. Marathon = compétition contre soi-même, pas contre les coureurs autour.", "fuel": "Gel km 16 environ. Ravitos km 10, 15, 20 : eau + boisson sucrée si dispo. Commence l'électrolyte."}, {"n": "3", "tag": "VIGILANCE", "c": "#dc2626", "titre": "Antibes & le mur (km 25-35)", "txt": "<strong>La section décisive.</strong> La bosse d'Antibes (km 25-28, max 35 m) peut faire accélérer le cœur si tu n'es pas attentif — régule. Puis km 30 : c'est là que les glucides s'épuisent et que les jambes commencent à parler. Ton mental et ton carburant doivent tenir. Cadence haute, foulée courte.", "fuel": "Gel km 24 et gel km 32 — <strong>celui du km 32 est le plus important du marathon</strong>. Le caféiné ici si tu en as un."}, {"n": "4", "tag": "POUSSER", "c": "#f59e0b", "titre": "La Croisette — vider le réservoir", "txt": "Km 35-42 : si tu as bien géré, tu doubles du monde sur les derniers km. La Croisette de Cannes approche avec les marches rouges du Festival et le public. Laisse parler les émotions, accélère si tes jambes suivent. <strong>3h45 c'est à ta portée : ne lâche rien.</strong>", "fuel": "Dernier gel km 37-38 si tu en as encore. Sinon eau seule pour les 5 derniers km."}], "nutrition": {"avant": "<strong>J-3 à J-1 :</strong> ↑ glucides légèrement (+ 20-30 %), 1 comprimé TA dans 500 ml d'eau/jour. <strong>Veille :</strong> dîner pâtes/riz, coucher tôt. <strong>Matin de course</strong> (réveil ~5h, départ 8h) : 2 comprimés TA dans 500 ml d'eau dès le lever — priorité absolue. Petit-dej 3h avant : flocons d'avoine + banane + miel + café. <strong>15-20 min avant le départ :</strong> 1 gel non-caféiné (amorce le moteur glycolytique).", "intro": "Marathon = moteur glycolytique sur 3h45. L'apport glucidique doit être continu et anticipé — sans gel régulier, le mur du km 30 est inévitable. Les <strong>comprimés TA</strong> (350 mg Na/cpr) couvrent les électrolytes en pré-course, des <strong>gels non-caféinés</strong> assurent le débit de base (3 à acheter, ex. Aptonia Decathlon ~1 €/pièce), les <strong>Nduranz caféinés</strong> interviennent uniquement sur les deux moments critiques. <strong>Pas de BCAA dans ce plan.</strong>", "items": [["TA Energy Electrolytes Tropical", "350 mg Na · 80 mg K · 52 mg Mg / cpr", "PRÉ-COURSE — 2 cpr dans 500 ml dès le réveil. 1 cpr en poche → à dissoudre dans un gobelet ravito km 20-25."], ["Gel non-caféiné (Aptonia ou équiv.)", "~25-45 g glucides · 0 mg caféine", "BASE — km 8, km 16, km 24 : débit régulier anti-mur (+ 1 avant le départ)"], ["Nduranz NRGY 45 — Cherry", "45 g glucides · 65 mg caféine", "ARME 1 — km 32 : le gel le plus important du marathon (anti-mur, pic caféine en 35 min)"], ["Nduranz NRGY 45 — Coffee Amarena", "45 g glucides · 130 mg caféine", "ARME 2 — km 38 : finale Croisette, vide le réservoir"]], "note": "Cible : <strong>50-60 g glucides/h</strong>. La boisson STC Nutrition des ravitos (~30-40 g glucides/500 ml) complète les gels — bois systématiquement à chaque table. Caféine total en course : 195 mg — raisonnable sur 3h45. Ne jamais forcer un gel si l'estomac est tendu : eau seule et reprendre au prochain ravito.", "apres": "<strong>Dans les 15 min :</strong> 1 comprimé TA dans 500 ml d'eau (priorité). <strong>Dans l'heure :</strong> repas protéiné complet (protéines + glucides). <strong>Le soir :</strong> vigilance crampes nocturnes → 1 dernier comprimé TA dans l'eau au coucher. Le dossard TER est valable toute la journée pour rentrer à Nice depuis Cannes."}, "hydra": "<strong>Électrolytes pré-course :</strong> 2 comprimés TA dans 500 ml dès le réveil (5h). La course est en novembre (~12-16°C) : la soif est modérée mais les ravitos tous les 5 km sont obligatoires — ne saute aucune table. Tu peux glisser 1 comprimé TA dans ta poche et le dissoudre dans un gobelet d'eau à un ravito (km 20-25). Post-course : 1 comprimé TA dans 500 ml immédiatement à l'arrivée.", "zones": [["Zone marathon", "134 – 152", "L'allure 3h45 doit tenir dans cette plage. Si FC &gt; 155 dans les 15 premiers km : tu pars trop vite."], ["Dérive normale", "152 – 162", "Km 25-35 : la FC monte naturellement même à allure constante. Normal — maintiens l'effort, pas la FC."], ["Danger", "&gt; 162", "Si FC &gt; 162 avant le km 20 : freine. Au-delà du km 35 avec mur enclenché : encaisse et maintiens."]], "terrain": "Route bitumée 100%, large et sécurisée, traversant 7 communes. <strong>Chaussures :</strong> tes chaussures de route avec amorti — les Clifton 10 sont parfaites pour 42 km sur route. Oublie les Cascadia : route uniquement. <strong>Tenue :</strong> novembre en Côte d'Azur, départ 8h00 → 10-14°C. Bras longs au départ (ou brassière + bras jetables), tu enlèveras au km 5-10. <strong>Vent :</strong> côtier donc potentiellement présent. Si vent de face, colle à un groupe.", "pratique": [["🚉 Logistique retour", "Ton dossard = billet TER Nice-Cannes valable le jour J. Prévois où tu récupères tes affaires (service transfert de sacs disponible)."], ["👟 Lièvre 3h45", "Cherche le groupe 3h45 dans ton sas. Reste avec eux jusqu'au km 30 au moins — c'est ton GPS vivant."], ["🏅 Dossard", "Retrait au Running Expo, Nice, les jours précédant la course. Aucun dossard le matin du départ."], ["🌡️ Météo novembre", "Typiquement 10-16°C en matinée sur Nice. Conditions idéales pour un marathon — profite-en."], ["📸 Photos", "Service photo officiel sur le parcours. Souris au km 25 — tu seras encore frais."]], "erreurs": ["Partir trop vite — c'est l'erreur n°1 sur ce parcours. Tout le monde part trop vite sur les 5 premiers km.", "Passer la demi sous 1h50 : si tu es à 1h48 à mi-course, tu vas payer cher entre le km 30 et 35.", "Sauter des gels ou des ravitos en se sentant bien — c'est justement quand tu te sens bien qu'il faut manger.", "Courir vite sur la bosse d'Antibes (km 25-28) : c'est une montée douce, pas une occasion de déborder.", "Attendre la sensation de soif pour boire : bois à chaque ravito, même une gorgée.", "Trop se fier à la FC en début de course : l'adrénaline du départ fait monter la FC même au repos. Pilote à l'allure."], "sources": "Profil GPX officiel MAM 2026 (marathon06.com/2026/dl/MAM2026_parcours.gpx). D+ officiel ~70 m. Infos ravitaillements et lièvres : marathon06.com, finishers.com. Zones FC basées sur FCmax ~192 et objectif 3h45 (≈74 % FCmax en allure marathon). Météo : moyennes historiques Nice novembre (Météo-France)."}, "saintexpress": {"nom": "SaintExpress 45 km", "soustitre": "Sainte-Catherine (757 m) → Lyon · Halle Tony Garnier · Monts du Lyonnais", "date": "Samedi 28 novembre 2026 — départ 23 h 00", "depart": "Départ nocturne 23 h 00 · Sainte-Catherine (757 m) · 4 000 coureurs", "format": "45 km · 900 m D+ · 1 400 m D− · SaintéLyon depuis 2010 · maratrail nocturne", "accent": "#0d9488", "stats": [["45", "km"], ["+900", "D+ (m)"], ["−1 400", "D− (m)"], ["757", "alt. départ (m)"], ["6 h 00–7 h", "cible réaliste"]], "intro": "Course emblématique de la SaintéLyon, depuis 2010. <strong>45 km de nuit complète</strong> dans les Monts du Lyonnais, de Sainte-Catherine à la Halle Tony Garnier de Lyon. Ce qui définit la SaintExpress : plus de descentes que de montées (1 400 m de D− pour 900 m de D+), un terrain <strong>60 % chemins / 40 % bitume</strong>, et une nuit de fin novembre. <strong>Bonne nouvelle : tu connais déjà les 18 derniers km.</strong> Ton relais SaintéLyon (Soucieu → Lyon) te donne une base de terrain réelle sur la seconde moitié — les aqueducs, les faubourgs, la Halle Tony Garnier. L'inconnu se concentre sur les <strong>27 premiers km</strong> (Sainte-Catherine → Soucieu), qui sont aussi les plus techniques.", "phrase": "<strong>Course plaisir, objectif B — cible 6h00 à 7h00.</strong> Référence terrain réelle : ton relais Soucieu → Lyon en 2h27 (6:28/km, 22 km, 459 m D+). Sur la SaintExpress complète, après 27 km inconnus de nuit, compte 7:30-8:00/km sur cette même section. Pas de chrono à aller chercher — tu arrives 20 jours après Nice. L'objectif : finir debout, bien équipé.", "profil": "Surprenant : le D+ ne tombe pas que dans la première moitié. Ton relais Soucieu → Lyon avait déjà <strong>459 m de D+</strong> sur 22 km — les aqueducs et le terrain roulant de Chaponost y contribuent largement. Les 900 m de D+ de la SaintExpress se répartissent donc presque équitablement entre les deux sections. La première section (Sainte-Catherine → Soucieu, ~km 0-27) est <strong>la plus technique</strong> : pistes forestières pentues, monotraces, descentes raides. Après Soucieu, tu bascules sur terrain connu mais avec déjà 27 km dans les jambes.", "profil_dist": 45.0, "profil_pts": [757, 783, 810, 824, 802, 778, 748, 720, 695, 718, 742, 724, 698, 720, 695, 670, 688, 712, 685, 660, 678, 695, 670, 648, 625, 640, 658, 635, 610, 628, 614, 598, 575, 590, 610, 598, 575, 558, 542, 560, 578, 555, 535, 518, 498, 480, 462, 478, 492, 470, 452, 435, 420, 408, 392, 375, 362, 378, 365, 350, 362, 348, 335, 320, 308, 322, 335, 318, 302, 288, 275, 262, 250, 238, 248, 260, 270, 255, 240, 228, 215, 205, 215, 228, 242, 258, 272, 280, 268, 252, 235, 218, 200, 188, 180, 175], "segments": [{"t": "1 · Sainte-Catherine → Saint-Genou", "km": "km 0 → 14", "faire": "<strong>Terrain inconnu</strong> — la section la plus technique et accidentée du parcours. Départ nocturne sur pistes forestières pentues, monotraces. Ne jamais forcer : gérer la frontale, les appuis, la descente de nuit. FC ≤ 160 sur les montées. Ton seul repère ici, c'est l'effort."}, {"t": "2 · Saint-Genou → Soucieu-en-Jarrest", "km": "km 14 → 27", "faire": "<strong>Terrain inconnu</strong> — section intermédiaire encore technique, descentes importantes. Les quads accumulent. Foulée courte, cadence haute. À l'arrivée à Soucieu : <strong>tu entres en terrain connu.</strong> Mentalement, c'est un point de bascule fort."}, {"t": "3 · Soucieu → Chaponost", "km": "km 27 → 38", "faire": "<strong>Terrain connu</strong> — tu es déjà passé par là sur ton relais. Le profil devient plus roulant. Tu sais ce qui t'attend, tu peux gérer à l'effort plutôt qu'à la découverte. Creux circadien probable vers 2h du matin : caféine Cherry ici."}, {"t": "4 · Aqueducs → Lyon", "km": "km 38 → 45", "faire": "<strong>Terrain connu</strong> — tu connais la montée des aqueducs de Beaunant, tu sais qu'elle est dure sur jambes fatiguées. Marche-la franchement. Ensuite la descente finale, les faubourgs, la Halle Tony Garnier : c'est ton terrain, tu rentres à la maison. Vide le réservoir."}], "plan": [{"n": "1", "tag": "TERRAIN INCONNU", "c": "#0d9488", "titre": "km 0-27 — découverte et prudence", "txt": "Les 27 premiers km sont du terrain inédit pour toi. Pas de repère, pas d'anticipation possible — tu gères à l'effort, à la sensation et à la frontale. <strong>Plus conservateur que d'habitude</strong>, surtout sur les descentes techniques de nuit. L'objectif est d'arriver à Soucieu avec des jambes.", "fuel": "Gel non-caféiné à 20 min avant départ. Flasques TA. Gel km 7 et km 14 (ravito Saint-Genou)."}, {"n": "2", "tag": "TERRAIN CONNU", "c": "#16a34a", "titre": "km 27-45 — tu rentres à la maison", "txt": "À Soucieu, tu bascules sur ton terrain de relais. <strong>Tu sais ce qui t'attend</strong> : le rythme, les aqueducs, les faubourgs. C'est un avantage mental énorme à 2h du matin. Pas d'accélération brutale, mais tu peux relâcher l'hyper-vigilance et gérer à l'instinct.", "fuel": "Nduranz Cherry (65 mg) au départ de Soucieu (~km 27). Coffee Amarena (130 mg) avant les aqueducs (~km 38)."}, {"n": "3", "tag": "QUADS FIRST", "c": "#dc2626", "titre": "Préserver les quads — 1400 m de D−", "txt": "Course de descente avant tout. <strong>1400 m de descente sur terrain technique de nuit</strong> : foulée courte, appuis rapides, regard 3-4 m devant la frontale. La différence entre bien et mal gérer les descentes, c'est 1h sur le chrono final.", "fuel": "Hydratation régulière. Ne jamais attendre la soif dans le froid."}, {"n": "4", "tag": "VIGILANCE NUIT", "c": "#ea580c", "titre": "Creux circadien 1h-3h du matin", "txt": "Entre 1h et 3h du matin, même toi qui as déjà couru de nuit, la vigilance baisse. <strong>C'est là que les chutes arrivent.</strong> La caféine Cherry à Soucieu (~km 27, vers 1h30-2h du matin selon ton allure) est calculée pour couvrir exactement ce creux.", "fuel": "Nduranz Cherry (65 mg) à Soucieu → pic en 30-35 min = plein creux nocturne couvert."}], "nutrition": {"avant": "<strong>Après-midi (15h-16h) :</strong> repas glucidique léger (pâtes, riz, facile à digérer). Nap de 1h-2h si possible — c'est du capital pour la nuit. <strong>Dîner/pre-race (19h30-20h) :</strong> repas normal mais pas lourd — 3h avant le départ, c'est le timing parfait. 1 comprimé TA dans 500 ml d'eau. <strong>22h00-22h30 :</strong> encas léger (banane, barre de céréales, tartine) + café si tu tolères. Gilet HDV5 : 2 comprimés TA dans les flasques (~600 ml). <strong>22h40 :</strong> 1 gel non-caféiné (amorce).", "intro": "Même architecture qu'à la Déraille — TA pour les électrolytes, gels non-caféinés pour le débit de base, Nduranz caféinés pour les moments critiques — mais sur <strong>5h30-7h de nuit</strong>, la caféine joue un rôle supplémentaire : la <strong>vigilance nocturne</strong>. C'est elle qui t'empêche de trébucher sur les appuis de 2h du matin.", "items": [["TA Energy Electrolytes Tropical", "350 mg Na · 80 mg K · 52 mg Mg / cpr", "ÉLECTROLYTES — 2 cpr dans les flasques départ + 1 cpr à chaque ravito (TA est partenaire de la SaintéLyon !)"], ["Gel non-caféiné (Aptonia ou équiv.)", "~25-45 g glucides · 0 mg caféine", "BASE — 1 avant le départ + 1 tous les 60-70 min en première moitié (km 7, km 14, km 21)"], ["Nduranz NRGY 45 — Cherry", "45 g glucides · 65 mg caféine", "VEILLE NOCTURNE — vers 1h du matin (creux circadien, km ~30)"], ["Nduranz NRGY 45 — Coffee Amarena", "45 g glucides · 130 mg caféine", "FINALE — km 38-40 (avant les aqueducs) · arrivée à Lyon"]], "note": "Cible : <strong>40-50 g glucides/h</strong> (intensité moindre que la Déraille). Sur 5h30-7h, tu consommes 5-7 gels. <strong>Checkpoint critique :</strong> les ravitos TA (Saint-Genou ~km 14, Soucieu ~km 27) servent aussi de la boisson chaude — prends-en systématiquement, c'est chaud et ça recharge l'élan mental. Le gel Coffee Amarena avant les aqueducs (km 38) = pic caféine en pleine montée finale.", "apres": "<strong>À l'arrivée Lyon (entre 4h30 et 6h du matin) :</strong> 1 comprimé TA dans 500 ml d'eau. Repas d'arrivée proposé par l'organisation (soupe, sandwiches). <strong>Le lendemain :</strong> récupération prioritaire — tu arrives 20 jours après Nice, les jambes auront encaissé deux gros efforts en moins d'un mois. 48-72h de repos complet, pas de footing récup avant 4-5 jours."}, "hydra": "<strong>Froid de novembre</strong> : la sensation de soif sera atténuée par le froid — c'est un piège. Boire à chaque ravito même sans soif. 2 comprimés TA dans les flasques au départ (~600 ml). Recharger systématiquement à chaque ravito avec 1 comprimé TA supplémentaire. Attention au gel des flasques si T° < 2°C — garde-les sous ta veste ou dans les poches internes du gilet. TA Energy est partenaire officiel de la SaintéLyon : leurs boissons seront probablement proposées aux ravitos.", "zones": [["Confort nocturne", "130 – 152", "L'allure de référence pour la majeure partie du parcours. Sur terrain technique de nuit, cette zone est ta zone de survie."], ["Montées", "152 – 162", "FC plafond 160 sur les montées — si tu dépasses, marche. La fatigue nocturne augmente la FC à intensité équivalente."], ["Danger", "&gt; 162", "Avant km 30 de nuit = risque d'explosion. Passé les aqueducs sur les derniers km, tu peux déborder si les jambes suivent."]], "terrain": "<strong>60 % chemins, 40 % bitume</strong> — le mix change plusieurs fois dans la course. Les premiers 27 km sont les plus techniques : single trails forestiers, descentes raides, possibles racines et cailloux glissants. Après Soucieu : plus de routes et chemins larges. <strong>Chaussures :</strong> une paire polyvalente trail-route est recommandée (ni trop trail pur ni route pur). Tes Cascadia 19 peuvent convenir mais s'useront vite sur le bitume — à toi de voir. <strong>Verglas :</strong> si T° < 0°C, des microspikes légers peuvent être utiles sur la première section.", "pratique": [["🚌 Navette", "Navettes officielles organisées vers Sainte-Catherine (depuis Lyon). Retrait des dossards : Halle Tony Garnier, vendredi 27/samedi 28 novembre."], ["🔦 Frontale", "Obligatoire. Prévoir <strong>batterie pleine + batteries de rechange</strong> (ou deuxième frontale). La nuit commence à 23h et tu arrives au lever du jour."], ["🧥 Froid", "Gants obligatoires, base-layer thermique, softshell ou coupe-vent. En novembre dans les Monts du Lyonnais, vise 0-8°C. Couverture de survie obligatoire."], ["🎒 Matériel obligatoire", "Frontale, couverture de survie, sifflet, réserve alimentaire, téléphone. Vérifie le règlement officiel."], ["🏁 Arrivée", "Halle Tony Garnier, Lyon. Repas d'arrivée pour tous les finishers. Prévoir quelqu'un pour t'attendre ou de quoi rentrer entre 4h et 6h du matin."]], "erreurs": ["Partir trop vite dans l'euphorie du départ — l'énergie du soir est trompeuse, et les 27 premiers km sont inconnus.", "Sous-estimer les descentes de nuit sur terrain inconnu (km 0-27) : même avec une bonne frontale, les appuis sont moins sûrs qu'en terrain connu.", "Surestimer ses jambes à Soucieu parce qu'on est en terrain connu — 27 km de descente nocturne t'auront quand même bien entamé les quads.", "Vouloir performer 20 jours après Nice — cette course se court en plaisir, pas en chrono.", "Sauter les ravitos sans boire parce qu'on n'a pas soif : le froid masque la soif, la déshydratation arrive quand même.", "Sous-estimer le froid : même à 5°C en novembre, 6h de course de nuit en sueur ça refroidit vite à chaque arrêt."], "sources": "Données : saintelyon.com (45 km, D+ 900 m, D- 1400 m, départ 23h00 Sainte-Catherine). Profil représentatif construit d'après l'architecture connue du tracé (GPX 2026 à venir sur le site officiel). Description du terrain : pacing-trail.fr, thepostrace.com. TA Energy est partenaire officiel de la SaintéLyon — leur boisson sera disponible aux ravitos."}, "deraille": {"nom": "Le Trail qui Déraille", "soustitre": "Lac des Sapins — Cublize (69), Beaujolais Vert", "date": "Dimanche 5 juillet 2026", "depart": "Départ ≈ 8 h 30 – 9 h 00 · Salle des sports de Cublize", "format": "24 km solo · 5ᵉ manche du Trail Tour Beaujolais · organisé par Y’A.C.A. Courir", "accent": "#0d9488", "stats": [["24,06", "km"], ["+901", "D+ (m)"], ["−901", "D− (m)"], ["897", "sommet (m)"], ["2 h 30–3 h", "cible plaisir"]], "intro": "Boucle dans le Beaujolais Vert autour du Lac des Sapins. Sur le papier « roulant », mais le profil est plus sérieux qu'il n'y paraît : <strong>901 m de D+ concentrés en deux montées</strong>, départ et arrivée au lac (447 m), point culminant à 897 m. Single en forêt, quelques passages techniques (cailloux, racines) entre sapins et genêts. Rien d'alpin comme La Circaète, mais une vraie gestion d'effort à tenir.", "phrase": "Course <strong>plaisir</strong>, et surtout ton laboratoire nutrition. Le seul vrai objectif : <strong>électrolytes dès le départ</strong> et zéro trou de carburant sur 2 h 30. La leçon de La Circaète, appliquée — pas un chrono à aller chercher.", "profil": "Tout le D+ tombe en deux temps. <strong>Montée 1 (km 2 → 8)</strong> : la grosse ascension d'entrée, +~360 m jusqu'à ~810 m. <strong>Plateau ondulé (km 8 → 12)</strong> avec un creux net vers le km 11-12. <strong>Montée 2 (km 12 → 16)</strong> : remontée jusqu'au sommet à 897 m — le crux, sur jambes déjà entamées. Puis <strong>longue descente finale (km 16 → 22)</strong>, ~−415 m roulante, et retour au lac. La faute classique : cramer la Montée 1 et exploser sur la remontée du km 13.", "profil_dist": 24.06, "profil_pts": [447, 449, 449, 449, 499, 519, 534, 544, 506, 530, 566, 595, 617, 614, 660, 688, 713, 740, 765, 758, 734, 727, 747, 772, 789, 837, 836, 786, 777, 777, 796, 798, 797, 841, 819, 802, 776, 772, 776, 777, 723, 697, 772, 818, 833, 864, 893, 878, 845, 843, 843, 870, 865, 861, 834, 780, 725, 716, 725, 696, 663, 637, 613, 584, 578, 556, 562, 544, 525, 523, 507, 474, 461, 441, 446, 449, 450, 448, 440, 442, 447, 447], "segments": [{"t": "1 · Départ &amp; Montée 1", "km": "km 0 → 8", "faire": "Faux-plat de départ au lac (km 0-2), puis LA grosse montée : ~+360 m jusqu'au km 8. Marche active sur les raidillons, FC ≤ 160. Tu dois te sentir trop sage — personne ne gagne sa course ici."}, {"t": "2 · Plateau ondulé", "km": "km 8 → 12", "faire": "Replat d'altitude vallonné (~800 m) avec un creux net vers le km 11-12. Relâche, roule, et surtout mange/bois : c'est le moment de faire le plein avant la remontée."}, {"t": "3 · Montée 2 — le crux", "km": "km 12 → 16", "faire": "Remontée jusqu'au sommet 897 m sur jambes déjà entamées. Le juge de paix. Marche assumée, petits pas, accepte la lenteur. Caféine juste avant."}, {"t": "4 · Descente finale", "km": "km 16 → 22", "faire": "Longue descente roulante, ~−415 m. Contrôlé en haut (jambes cuites), puis plein gaz sur le roulant : ton feu vert pour te faire plaisir et doubler du monde."}, {"t": "5 · Retour au lac", "km": "km 22 → 24", "faire": "Faux-plat final le long du lac. Vide le réservoir sur les derniers hectomètres, savoure l'arrivée."}], "plan": [{"n": "1", "tag": "CONSERVATEUR", "c": "#16a34a", "titre": "Montée 1 — freiner l'ego", "txt": "La grosse montée d'entrée (km 2-8, +360 m), jambes fraîches : le piège classique. Marche active aux raidillons, FC plafond 160. Tu dois te sentir presque trop sage. Tout se joue ici en négatif : trop vite = explosion au km 13.", "fuel": "Électrolytes dès le km 5 — pas au km 15 comme à La Circaète."}, {"n": "2", "tag": "FAIRE LE PLEIN", "c": "#ea580c", "titre": "Plateau — manger &amp; rouler", "txt": "Replat ondulé d'altitude (km 8-12) avec un creux vers le km 11. Relâche, foulée courte cadence haute, profite de cette accalmie pour t'alimenter avant la remontée. Vitesse gratuite, pas forcée.", "fuel": "1 gel ici, et recharge l'eau à fond au ravito du plateau."}, {"n": "3", "tag": "VIGILANCE", "c": "#dc2626", "titre": "Crux — survivre, marcher, manger", "txt": "Remontée au sommet 897 m (km 12-16) sur jambes entamées. C'est ici que les gens explosent — à cause de la Montée 1 surcuite. Marche assumée, petits pas, on survit, on ne brille pas.", "fuel": "Gel caféiné Nduranz juste avant : la caféine culmine en plein crux."}, {"n": "4", "tag": "POUSSER", "c": "#0d9488", "titre": "Descente finale — lâcher les chevaux", "txt": "Longue descente roulante (km 16-22, −415 m). Contrôlé en haut le temps de te remettre en jambes, puis plein gaz sur le roulant et le retour au lac. Si tu as été discipliné avant, tu doubles du monde et tu finis en plaisir.", "fuel": "Dernier gel si besoin pour la relance."}], "nutrition": {"avant": "<strong>Veille :</strong> dîner riche en glucides (pâtes, riz), bonne hydratation, 1 comprimé TA dans 500 ml d'eau. <strong>Matin de course :</strong> petit-dej 2h30 avant le départ (flocons d'avoine + banane + miel + café). <strong>1h avant :</strong> 1 comprimé TA dans 500 ml eau — gourde du matin. Gilet HDV5 : dissoudre <strong>2 comprimés TA dans tes flasques</strong> (~600 ml totaux) avant de partir.", "intro": "Stratégie à 2 couches : les <strong>comprimés TA Electrolytes</strong> (350 mg sodium/comprimé) couvrent l'hydratation en continu dans ton gilet, les <strong>Nduranz</strong> apportent glucides et caféine aux moments clés. Des <strong>gels non-caféinés</strong> (2 à acheter, ex. Aptonia Decathlon ~1 €/pièce) assurent le débit glucidique de base. <strong>Pas de BCAA dans ce plan.</strong>", "items": [["TA Energy Electrolytes Tropical", "350 mg Na · 80 mg K · 52 mg Mg / cpr", "ÉLECTROLYTES — 2 cpr dans les flasques au départ + 1 cpr rechargé au ravito intermédiaire"], ["Gel non-caféiné (Aptonia ou équiv.)", "~25-45 g glucides · 0 mg caféine", "BASE — 1 gel à 20 min avant le départ, 1 gel km 8-10 (premier tiers)"], ["Nduranz NRGY 45 — Cherry", "45 g glucides · 65 mg caféine", "ARME 1 — km 13-14 (entrée du crux, montée 2 km 12-16) · pic caféine en plein crux"], ["Nduranz NRGY 45 — Coffee Amarena", "45 g glucides · 130 mg caféine", "ARME 2 — km 20-21 (descente finale) · relance et arrivée"]], "note": "Cible : <strong>~50 g glucides/h</strong> sur 2h15-2h45. <strong>Timing caféine :</strong> Cherry (65 mg, pic ~35 min) au km 13 = en plein crux km 15-16. Coffee Amarena (130 mg) au km 20 couvre la descente finale et l'arrivée. Caféine totale en course : 195 mg (hors café du matin). Chaque gel avec quelques gorgées d'eau des flasques TA.", "apres": "<strong>Dans les 15 min :</strong> 1 comprimé TA dans 500 ml d'eau — priorité absolue (lien direct avec l'incident Circaète). <strong>Dans l'heure :</strong> repas protéiné (œufs, charcuterie, fromage, riz). Éviter l'alcool les 2h suivant la course."}, "hydra": "<strong>3 ravitaillements</strong> sur le parcours (solide : fruits, fruits secs, gâteaux ; liquide : eau, jus, soda). Juillet = chaleur garantie : vise <strong>400-500 ml/h</strong> depuis les flasques TA + recharge à chaque ravito. Dissoudre 1 comprimé TA supplémentaire dans la flasque rechargée. <strong>Règle absolue :</strong> électrolytes dès le km 5, ne jamais attendre la soif — c'est la leçon de La Circaète appliquée.", "zones": [["Endurance fond.", "134 – 154", "Croisière : faux-plats, descentes courues, plat roulant"], ["Tempo / bascule", "154 – 167", "Montées : plafond 160. Au-delà → marche active, laisse la FC redescendre"], ["Seuil +", "&gt; 167", "Réservé à la relance finale, jamais avant"]], "terrain": "Single en forêt (terre, herbe, racines), roulant par endroits, avec des passages plus techniques sur cailloux et sentes étroites — pieds légers, regard devant. Rien d'alpin : on reste dans les collines boisées du Beaujolais Vert. <strong>Chaussures :</strong> tes Cascadia 19, bonne accroche pour le terrain sec et caillouteux de juillet.", "pratique": [["🅿️ Départ / arrivée", "Salle des sports de Cublize — parking, vestiaires, douches sur place"], ["🥾 Bâtons", "Autorisés. Utiles sur les raidillons, mais optionnels vu le D+ modéré"], ["🏊 Après la course", "Lac des Sapins : baignade possible — récup' active idéale par temps chaud"], ["🎒 Matériel", "Gilet HDV5 + flasques, électrolytes, 5-6 gels, casquette/visière (chaleur), crème anti-frottements"]], "erreurs": ["Partir trop vite sur l'enthousiasme du départ de masse — le relief te le fera payer plus tard.", "Attendre d'avoir soif pour boire : en juillet, c'est déjà trop tard.", "Oublier les électrolytes dès le départ — l'erreur exacte de La Circaète.", "Vouloir performer : c'est une course plaisir et un test, pas un objectif chrono.", "Courir tous les raidillons : la marche active est plus économique et te garde des jambes.", "Zapper un ravito : recharge l'eau systématiquement, même si tu te sens bien."], "sources": "Données : trace GPX officielle du 24 km (tracedetrail.fr/trace/327465) — 24,06 km, sommet 897 m, départ/arrivée 447 m. D+ officiel 901 m (le GPS lit souvent ~1040 m, normal). Trail Tour Beaujolais, organisateur Y’A.C.A. Courir. Zones FC basées sur tes repères (FCmax ~192, bascule marche ~160) — ne remplacent pas un avis médical."}};
const PALMARES=[{"nom": "Trail Déraille — Lac des Sapins", "alias": "Déraille", "date": "2026-07-05", "lieu": "Lac des Sapins · France", "type": "trail", "distance": 23.3, "dplus": 957, "dminus": 957, "temps": "2:52:48", "allure": "7:12", "classement_gen": 66, "classement_cat": 11, "total_finishers": 180, "cat": "M0", "fc_moy": 168, "fc_max": 181, "cal": 2388, "chaussures": "Cascadia 19", "meteo": "Chaleur intense · exposition forte", "statut": "termine", "strava_id": "19186067917", "accent": "#0d9488", "bilan": "<strong>Course de gestion réussie dans des conditions extrêmes.</strong> Réalisée sur ~4h de sommeil (nuit blanche jusqu'à 2h après le match de l'équipe de France), sans aucune préparation trail depuis la Circaète (zéro côte, zéro dénivelé), par forte chaleur. 66e au général sur 180 engagés (top 37%), 11e/18 en catégorie M0.<br><br><strong>La stratégie était la bonne — les données le prouvent :</strong> FC moyenne 168 (88% FCmax) tenue sur 2h52 sans jamais d'explosion. Contrairement à la Circaète, aucun effondrement. Gestion parfaite en montée (marche active sur la Montée des Stèles : +158m à 15,7% de pente au km 13). <strong>Descente exceptionnelle</strong> — km 18 à 4:46/km, vraie signature de force.<br><br><strong>Le mur des 2 derniers km était thermique, pas nutritionnel :</strong> la FC reste haute (170-171) alors que l'allure s'effondre — signature déshydratation + surchauffe, pas de panne de sucre. Nutrition correcte (3 gels + 3L dont 1L électrolytes) mais insuffisante face à la chaleur. Alternance marche/course sur la fin, perte de ~2 min sur le partenaire.<br><br><strong>Objectifs atteints :</strong> relancer la machine, tester la nutrition, courir intelligemment. Zéro séquelle physique ou mentale. <strong>Enseignements pour Nice :</strong> la tête est le meilleur atout, la descente est une arme, la gestion thermique et l'endurance spécifique trail restent à travailler."}, {"nom": "Trail - Circaète (Gypaète)", "alias": "Circaète", "date": "2026-06-06", "lieu": "Ardèche · France", "type": "trail", "distance": 29.8, "dplus": 1661, "dminus": 1661, "temps": "4:57:38", "allure": "9:36", "classement_gen": 182, "classement_cat": null, "total_finishers": null, "cat": "M0", "fc_moy": 152, "fc_max": 178, "cal": 3191, "chaussures": "Cascadia 19", "meteo": "26-31°C · canicule sèche", "statut": "termine", "strava_id": "18810734775", "accent": "#0d9488", "bilan": "Première grande épreuve trail de la saison. Crise électrolytique progressive à partir du km 20 — déshydratation sévère en chaleur extrême. Course terminée en 4:57:38 malgré l'effondrement. <strong>Leçon fondatrice :</strong> intégration systématique de TA Electrolytes dans toutes les sorties et courses depuis. #182 au général."}, {"nom": "Run In Lyon 10km", "alias": "Run In Lyon 10k", "date": "2022-10-02", "lieu": "Lyon · France", "type": "route", "distance": 10, "dplus": null, "dminus": null, "temps": "53:58", "allure": "5:24", "classement_gen": 4900, "classement_cat": null, "total_finishers": null, "cat": null, "fc_moy": null, "fc_max": null, "cal": null, "chaussures": null, "meteo": null, "statut": "termine", "strava_id": null, "accent": "#f59e0b", "bilan": "10km sur les berges de Lyon en 53:58 · allure 5:24/km. #4900 au général sur une très grande course de masse. <strong>Référence pour calibrer la progression :</strong> objectif sub-50 min en 2026-2027."}, {"nom": "SaintéLyon — Relais Équipe", "alias": "SaintéLyon relay", "date": "2022-12-03", "lieu": "Yssingeaux → Lyon", "type": "trail_nuit", "distance": 22.77, "dplus": 459, "dminus": 900, "temps": "2:27:00", "allure": "6:28", "classement_gen": null, "classement_cat": null, "total_finishers": null, "cat": null, "fc_moy": null, "fc_max": null, "cal": null, "chaussures": null, "meteo": "Nuit · ~4°C · hiver", "statut": "termine", "strava_id": null, "accent": "#0d9488", "bilan": "Relais #4 de l'équipe SaintéLyon. <strong>Référence directe pour la préparation SaintExpress 2026 :</strong> segment km 27-45 du parc /* ===== helpers ===== */
function rpeColor(r){return r<=3?'#16a34a':r<=5?'#0d9488':r<=6.9?'#f59e0b':r<=8?'#f59e0b':'#ef4444';}
function rpeScale(r){let h='';for(let i=1;i<=10;i++){const on=i<=Math.round(r);h+=`<div class="rpe-seg" style="background:${on?rpeColor(r):''}"></div>`;}return h;}
function catBadge(c){return c==='specifique'?'<span class="cat-badge cat-specifique">Spécifique</span>':'<span class="cat-badge cat-classique">Classique</span>';}
function stChip(st){const m={a_faire:['st-afaire','À faire'],fait:['st-fait','Fait ✓'],partiel:['st-partiel','Partiel'],manque:['st-manque','Manqué'],skipped:['st-manque','Sautée']};const x=m[st]||m.a_faire;return `<span class="st-chip ${x[0]}">${x[1]}</span>`;}
function prCelebration(o){if(!o)return'';const pr=o.pr||0,ach=o.ach||0;if(pr+ach<=0)return'';
  const parts=[];if(pr>0)parts.push(`<span class="prc-stat"><span class="prc-n">${pr}</span> record${pr>1?'s':''} perso</span>`);
  if(ach>0)parts.push(`<span class="prc-stat"><span class="prc-n">${ach}</span> trophée${ach>1?'s':''} de segment</span>`);
  const detail=(o.pr_detail&&o.pr_detail.length)?`<div class="prc-detail">${o.pr_detail.map(d=>`<span class="prc-chip">🥇 ${d}</span>`).join('')}</div>`:'';
  return `<div class="prc"><div class="prc-burst">🎉</div><div class="prc-body"><div class="prc-titre">Records tombés !</div><div class="prc-row">${parts.join('<span class="prc-sep">·</span>')}</div>${detail}</div></div>`;}
function fmt(s){const m=Math.floor(s/60),x=s%60;return x?`${m} min ${String(x).padStart(2,'0')}`:`${m} min`;}
function paceFmt(s){const m=Math.floor(s/60),x=Math.round(s%60);return `${m}:${String(x).padStart(2,'0')}`;}
function isoWeek(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-ys)/86400000)+1)/7);}

/* ===== graphes SVG ===== */
function chartLine(vals,o){o=o||{};const color=o.color||'#0d9488',h=o.h||150,fmtY=o.fmtY||(v=>v),baseline=o.baseline,todayIdx=o.todayIdx,labels=o.labels;
  const W=720,pad=30,padB=22,padT=12;const idx=vals.map((v,i)=>[i,v]).filter(p=>p[1]!=null);if(!idx.length)return'';
  const ys=idx.map(p=>p[1]);let max=Math.max(...ys),min=Math.min(...ys);if(baseline!=null){max=Math.max(max,baseline);min=Math.min(min,baseline);}
  const rng=(max-min)||1;max+=rng*0.12;min-=rng*0.12;if(min<0&&Math.min(...ys)>=0)min=0;max=Math.ceil(max);min=Math.floor(min);const n=vals.length;
  const X=i=>pad+(W-pad-12)*i/(n-1);const Y=v=>padT+(h-padT-padB)*(1-(v-min)/(max-min));
  let line='',area='',lastX=0;idx.forEach((p,k)=>{const cx=X(p[0]),cy=Y(p[1]);if(k===0){line=`M ${cx.toFixed(1)} ${cy.toFixed(1)}`;area=`M ${cx.toFixed(1)} ${(h-padB).toFixed(1)} L ${cx.toFixed(1)} ${cy.toFixed(1)}`;}else{line+=` L ${cx.toFixed(1)} ${cy.toFixed(1)}`;area+=` L ${cx.toFixed(1)} ${cy.toFixed(1)}`;}lastX=cx;});
  area+=` L ${lastX.toFixed(1)} ${(h-padB).toFixed(1)} Z`;
  let bl='';if(baseline!=null){const by=Y(baseline);bl=`<line x1="${pad}" y1="${by.toFixed(1)}" x2="${W-12}" y2="${by.toFixed(1)}" stroke="#ef4444" stroke-dasharray="4 4" stroke-width="1.2"/><text x="${W-14}" y="${(by-4).toFixed(1)}" font-size="9" fill="#ef4444" text-anchor="end">seuil 1.5</text>`;}
  let td='';if(todayIdx!=null){const tx=X(todayIdx);td=`<line x1="${tx.toFixed(1)}" y1="${padT}" x2="${tx.toFixed(1)}" y2="${h-padB}" stroke="#94a3b8" stroke-dasharray="3 3"/><text x="${tx.toFixed(1)}" y="9" font-size="8.5" fill="#94a3b8" text-anchor="middle">aujourd'hui</text>`;}
  const gid='g'+color.replace('#','');
  const yl=`<text x="2" y="${(Y(max)+8).toFixed(1)}" font-size="9" fill="#94a3b8">${fmtY(max)}</text><text x="2" y="${(Y(min)+2).toFixed(1)}" font-size="9" fill="#94a3b8">${fmtY(min)}</text>`;
  let xl='';if(labels){xl=idx.filter((_,k)=>k%Math.ceil(idx.length/6)===0).map(p=>`<text x="${X(p[0]).toFixed(1)}" y="${h-6}" font-size="8" fill="#94a3b8" text-anchor="middle">${labels[p[0]]||''}</text>`).join('');}
  let ann='';if(o.annotate){const pp=[];for(let i=0;i<vals.length;i++){if(vals[i]==null)continue;const a=(i>0?vals[i-1]:null),b=(i<vals.length-1?vals[i+1]:null);let lab=false,up=true;if(a==null||b==null){lab=true;up=(b!=null?vals[i]>=b:(a!=null?vals[i]>=a:true));}else if(vals[i]>a&&vals[i]>=b){lab=true;up=true;}else if(vals[i]<a&&vals[i]<=b){lab=true;up=false;}if(lab)pp.push({i,up});}ann=pp.map(p=>`<text x="${X(p.i).toFixed(1)}" y="${(p.up?Y(vals[p.i])-6:Y(vals[p.i])+13).toFixed(1)}" font-size="9" font-weight="700" fill="#94a3b8" text-anchor="middle">${fmtY(vals[p.i])}</text>`).join('');}

/* ACWR dynamique — méthode EMA (même que PMC) recalculé à chaque ouverture */

/* ===== Recalcul dynamique des KPI depuis les séances réelles (à chaque chargement) ===== */
function _weekNumFromKey(k){var m=String(k).match(/(\d+)/);return m?+m[1]:0;}
function _reFromSeance(s){
  // 1) RE réel parsé du commentaire ("RE 106")
  if(s.realise&&s.realise.commentaire){var m=s.realise.commentaire.match(/RE\s+(\d+)/);if(m)return +m[1];}
  // 2) sinon estimation depuis km + type
  if(!s.realise||!s.realise.km)return 0;
  var km=s.realise.km,t=(s.type||'').toLowerCase();
  var coef=8;
  if(/trail/.test(t))coef=25;
  else if(/seuil|tempo|specifique|spécifique|marathon/.test(t))coef=13;
  else if(/longue|long/.test(t))coef=10;
  else if(/récup|recup|recovery/.test(t))coef=6;
  else if(/ef|footing|aérobie|aerobie|technique/.test(t))coef=8;
  return Math.round(km*coef);
}
function _curWeek(){
  // Semaine du plan basée sur la date réelle. Ancre : 9 mars 2026 = lundi = S11.
  var now=new Date();
  var monday=new Date(now);var day=now.getDay()||7;monday.setDate(now.getDate()-(day-1));
  monday.setHours(0,0,0,0);
  var anchor=new Date(2026,2,9);anchor.setHours(0,0,0,0); // 9 mars 2026
  var weeks=Math.round((monday-anchor)/(7*86400000));
  var wk=11+weeks;
  return (wk>=1&&wk<=53)?wk:26; // garde-fou : plage plausible sinon fallback
}

function _ckRebuild(){
  if(typeof SEANCES_BY_WEEK==='undefined'||typeof _CK==='undefined')return;
  // Snapshot one-shot des séries d'allure par type (ef/am/se) issues des données statiques,
  // pour ne pas les perdre quand le moteur reconstruit _CK.PACE (le moteur ne les recalcule pas).
  if(_CK.PACE&&!_CK._PACE_ORIG){try{_CK._PACE_ORIG=JSON.parse(JSON.stringify(_CK.PACE));}catch(e){_CK._PACE_ORIG=null;}}
  // Collecter les semaines avec des séances réalisées
  var weeks=Object.keys(SEANCES_BY_WEEK).map(_weekNumFromKey).filter(function(n){return n>0;}).sort(function(a,b){return a-b;});
  // Agréger km / RE / D+ / allure / FC / cadence réels par semaine
  var agg={};
  weeks.forEach(function(wn){
    var arr=SEANCES_BY_WEEK[String(wn)]||SEANCES_BY_WEEK[wn]||[];
    var km=0,re=0,dplus=0,fcSum=0,fcN=0,cadSum=0,cadN=0,paceSum=0,paceN=0,hasReal=false;
    arr.forEach(function(s){
      var r=s.realise;
      if(r&&(r.statut==='fait'||r.statut==='partiel')&&r.km){
        hasReal=true;km+=r.km;re+=_reFromSeance(s);
        var dm=r.commentaire&&r.commentaire.match(/D\+\s*(\d+)/);if(dm)dplus+=+dm[1];
        if(r.fc_moy){fcSum+=r.fc_moy;fcN++;}
        var cm=r.commentaire&&r.commentaire.match(/cadence\s+(\d+)/);if(cm){var _cv=+cm[1];if(_cv<120)_cv*=2;cadSum+=_cv;cadN++;}
        if(r.allure){var pm=r.allure.match(/(\d+):(\d+)/);if(pm){paceSum+=(+pm[1])*60+(+pm[2]);paceN++;}}
      }
    });
    if(hasReal)agg[wn]={km:+km.toFixed(1),re:re,dplus:dplus,fc:fcN?Math.round(fcSum/fcN):null,cad:cadN?Math.round(cadSum/cadN):null,pace:paceN?Math.round(paceSum/paceN):null};
  });
  var realWeeks=Object.keys(agg).map(Number).sort(function(a,b){return a-b;});
  if(realWeeks.length<2)return; // pas assez de données, on garde _CK figé
  // ACWR EMA (CTL 42j / ATL 7j) sur la série RE complète
  var reSeries=realWeeks.map(function(w){return agg[w].re;});
  var aC=1-Math.exp(-7/42),aA=1-Math.exp(-7/7);
  var acwrByWeek={},ctl=reSeries[0],atl=reSeries[0];
  realWeeks.forEach(function(w,i){
    var v=agg[w].re;
    if(i>0){ctl=(1-aC)*ctl+aC*v;atl=(1-aA)*atl+aA*v;}
    acwrByWeek[w]=ctl>0?+((atl/ctl).toFixed(2)):1.0;
  });
  // Reconstruire les fenêtres 2/4/8/12 de _CK
  function lastN(n){return realWeeks.slice(-n);}
  function wlabels(ws){return ws.map(function(w){return 'S'+w;});}
  [2,4,8,12].forEach(function(N){
    var ws=lastN(N);var lbl=wlabels(ws);
    if(_CK.VOL)_CK.VOL[N]={w:lbl,p:ws.map(function(){return null;}),a:ws.map(function(w){return agg[w].km;})};
    if(_CK.RE)_CK.RE[N]={w:lbl,v:ws.map(function(w){return agg[w].re;})};
    if(_CK.ACWR)_CK.ACWR[N]={w:lbl,v:ws.map(function(w){return acwrByWeek[w];})};
    if(_CK.DPLUS)_CK.DPLUS[N]={w:lbl,v:ws.map(function(w){return agg[w].dplus;})};
    if(_CK.FCZ&&agg[ws[ws.length-1]].fc){/* FCZ gardé tel quel, structure complexe */}
    if(_CK.CAD)_CK.CAD[N]={w:lbl,v:ws.map(function(w){return agg[w].cad;})};
    if(_CK.PACE){var _pp=(_CK._PACE_ORIG&&_CK._PACE_ORIG[N])||{};var _L=lbl.length;var _tail=function(a){return Array.isArray(a)?a.slice(-_L):a;};_CK.PACE[N]={w:lbl,v:ws.map(function(w){return agg[w].pace;}),ef:_tail(_pp.ef),am:_tail(_pp.am),se:_tail(_pp.se)};}
  });
  // Mettre à jour ACWR_DATA (valeur de secours) avec la dernière valeur réelle
  if(typeof ACWR_DATA!=='undefined'){
    var lastW=realWeeks[realWeeks.length-1];
    ACWR_DATA.acwr=acwrByWeek[lastW];
    ACWR_DATA.charge7j=agg[lastW].re;
    var s28=realWeeks.slice(-4);ACWR_DATA.charge28j=s28.reduce(function(a,w){return a+agg[w].re;},0);
  }
}

function _dynamicACWR(){
  const today=new Date();today.setHours(0,0,0,0);
  const curWk=isoWeek(today);
  const ckRe=typeof _CK!=='undefined'&&_CK.RE?_CK.RE[12]:null;
  if(!ckRe||!ckRe.v||ckRe.v.length<2){
    return typeof ACWR_DATA!=='undefined'?ACWR_DATA.acwr||1.0:1.0;
  }
  // RE estimé depuis séances loggées semaine courante
  const RC={EF:7,AM:16,LONG:10,SEUIL:13,TRAIL:22,RENFO:4,default:8};
  let curRE=0;
  (SEANCES_BY_WEEK[curWk]||[]).forEach(s=>{
    if(s.realise&&s.realise.statut==='fait'&&s.realise.km)curRE+=s.realise.km*(RC[s.cat]||RC.default);
  });
  const series=[...ckRe.v];
  const lastW=ckRe.w[ckRe.w.length-1];
  if(curWk>lastW&&curRE>0)series.push(curRE);
  else if(curWk===lastW&&curRE>series[series.length-1])series[series.length-1]=curRE;
  // EMA CTL (42j) + ATL (7j) → ACWR = ATL/CTL
  const aC=1-Math.exp(-7/42),aA=1-Math.exp(-7/7);
  let ctl=series[0],atl=series[0];
  series.forEach((v,i)=>{if(i>0){ctl=(1-aC)*ctl+aC*v;atl=(1-aA)*atl+aA*v;}});
  return ctl>0?+((atl/ctl).toFixed(2)):1.0;
}

/* ===== Score de forme composite (Sprint A Roadmap) ===== */
function _estimVO2(){
  // Estimation VDOT (Jack Daniels) multi-records : pondère les 3 distances,
  // affiche une valeur centrale + une fourchette de confiance + un profil.
  try{
    if(typeof RECORDS_PERF==='undefined'||!RECORDS_PERF.length)return null;
    function toMin(t){
      t=String(t).trim();let h=0,m=0,s=0;
      if(t.includes('h')){const p=t.split('h');h=+p[0];const r=p[1].split(':');m=+r[0];s=+(r[1]||0);}
      else{const r=t.split(':');m=+r[0];s=+(r[1]||0);}
      return h*60+m+s/60;
    }
    // poids : le 10 km est l'effort de référence le plus fiable ; le semi (souvent plus ancien/moins optimal) pèse moins
    const cfg={'5 km':{d:5000,w:1.0},'10 km':{d:10000,w:1.2},'Semi 21,1':{d:21097,w:0.7}};
    const per=[];let acc=0,wsum=0;
    RECORDS_PERF.forEach(r=>{
      const c=cfg[r.dist];if(!c)return;
      const tm=toMin(r.temps_rec||r.record);if(!tm||tm<=0)return;
      const v=c.d/tm;
      const vo2=-4.60+0.182258*v+0.000104*v*v;
      const pct=0.8+0.1894393*Math.exp(-0.012778*tm)+0.2989558*Math.exp(-0.1932605*tm);
      const vdot=vo2/pct;
      per.push({dist:r.dist,temps:r.temps_rec||r.record,vdot:vdot,w:c.w});
      acc+=vdot*c.w;wsum+=c.w;
    });
    if(!per.length)return null;
    const central=acc/wsum;
    const vals=per.map(p=>p.vdot);
    const lo=Math.min(...vals),hi=Math.max(...vals);
    // profil : si la VDOT sur courtes distances >> longues => plutôt "vitesse", sinon "endurant"
    const court=per.find(p=>p.dist==='5 km'),longg=per.find(p=>/Semi/.test(p.dist));
    let profil='équilibré';
    if(court&&longg){const ecart=court.vdot-longg.vdot;if(ecart>3)profil='plutôt vitesse';else if(ecart<-1)profil='plutôt endurance';}
    return {vo2:Math.round(central),lo:Math.round(lo),hi:Math.round(hi),profil:profil,details:per.map(p=>({dist:p.dist,temps:p.temps,vdot:Math.round(p.vdot)}))};
  }catch(e){return null;}
}
function computeFormeScore(){
  const today=new Date();today.setHours(0,0,0,0);
  const curWk=isoWeek(today);
  // 1. ACWR (30%) — dynamique depuis _CK.RE + logs
  let acwrScore=70,acwrVal=1.0,acwrLabel='—';
  acwrVal=_dynamicACWR();
  if(acwrVal>=0.8&&acwrVal<=1.3){acwrScore=100;acwrLabel='Zone optimale ('+acwrVal+')';}
  else if(acwrVal>1.3&&acwrVal<=1.5){acwrScore=58;acwrLabel='⚠ Charge élevée ('+acwrVal+')';}
  else if(acwrVal>1.5){acwrScore=22;acwrLabel='🔴 Surcharge ('+acwrVal+')';}
  else if(acwrVal>=0.7){acwrScore=72;acwrLabel='Légère sous-charge ('+acwrVal+')';}
  else{acwrScore=44;acwrLabel='Sous-charge ('+acwrVal+')';}
  // 2. Adhérence 2 sem (25%)
  let totalP=0,totalF=0;
  for(let w=curWk-1;w<=curWk;w++){const ss=SEANCES_BY_WEEK[w]||[];totalP+=ss.filter(s=>!s.opt).length;totalF+=ss.filter(s=>s.realise&&s.realise.statut==='fait').length;}
  const adherScore=totalP>0?Math.min(100,Math.round(totalF/totalP*108)):75;
  // 3. Z2 pace trend (25%)
  const efSess=[];
  Object.entries(SEANCES_BY_WEEK).forEach(([wk,ss])=>ss.forEach(s=>{
    if(s.realise&&s.realise.allure&&(s.cat==='EF'||(s.type||'').includes('EF'))){
      const p=s.realise.allure.replace('/km','').split(':');
      if(p.length===2)efSess.push({wk:+wk,pace:+p[0]*60+(+p[1]||0)});
    }
  }));
  let z2Score=72,z2Label='—';
  const rEf=efSess.filter(x=>x.wk>=curWk-1).map(x=>x.pace);
  const oEf=efSess.filter(x=>x.wk<curWk-1&&x.wk>=curWk-5).map(x=>x.pace);
  if(rEf.length&&oEf.length){
    const d=(oEf.reduce((a,b)=>a+b)/oEf.length)-(rEf.reduce((a,b)=>a+b)/rEf.length);
    if(d>15){z2Score=100;z2Label='+'+Math.round(d)+'s/km ↑↑';}
    else if(d>5){z2Score=88;z2Label='+'+Math.round(d)+'s/km ↑';}
    else if(d>-5){z2Score=75;z2Label='Stable';}
    else if(d>-15){z2Score=52;z2Label=Math.round(d)+'s/km ↓';}
    else{z2Score=32;z2Label=Math.round(d)+'s/km ↓↓';}
  }
  // 4. Fraîcheur (20%)
  let freshScore=75,freshLabel='—';
  const doneSess=Object.values(SEANCES_BY_WEEK).flat().filter(s=>s.realise&&s.realise.statut==='fait'&&s.date).sort((a,b)=>b.date.localeCompare(a.date));
  if(doneSess.length){
    const days=Math.round((today-new Date(doneSess[0].date+'T00:00:00'))/86400000);
    if(days===0){freshScore=68;freshLabel='Couru aujourd\'hui';}
    else if(days===1){freshScore=85;freshLabel='1 jour de repos';}
    else if(days===2){freshScore=95;freshLabel='2 jours · frais';}
    else if(days===3){freshScore=85;freshLabel='3 jours · prêt';}
    else{freshScore=58;freshLabel=days+' jours sans courir';}
  }
  const score=Math.round(acwrScore*.30+adherScore*.25+z2Score*.25+freshScore*.20);
  const color=score>=82?'#0d9488':score>=68?'#16a34a':score>=52?'#f59e0b':'#ef4444';
  const trend=acwrVal<=1.3&&adherScore>=90?'↑':acwrVal>1.4?'↓':'→';
  let signal='';
  if(acwrVal>1.4)signal='⚠️ Charge élevée · éviter les intensités';
  else if(adherScore>=98)signal='Adhérence parfaite · plan bien tenu';
  else if(z2Score>=88)signal='Z2 en progression · forme aérobie solide';
  else if(freshScore>=90)signal='Bien reposé · prêt pour une qualité';
  else if(score>=82)signal='Forme au top · continue sur cette lancée';
  else signal='Paramètres équilibrés · maintenir le rythme';
  return{score,trend,color,signal,components:[
    {label:'ACWR',score:acwrScore,detail:acwrLabel},
    {label:'Adhérence',score:adherScore,detail:totalF+'/'+totalP+' séances (2 sem.)'},
    {label:'Z2 pace',score:z2Score,detail:z2Label},
    {label:'Fraîcheur',score:freshScore,detail:freshLabel}
  ]};
}

function _coachNudge(){
  // Copilote : suggestion proactive contextuelle. Retourne null si rien de pertinent (jamais intrusif).
  try{
    const cur=isoWeek(new Date());
    const acwr=(typeof _dynamicACWR==='function')?_dynamicACWR():1.0;
    const forme=(typeof computeFormeScore==='function')?computeFormeScore():{score:75};
    // Toutes les séances réellement loggées, triées par date
    const done=[];
    Object.entries(SEANCES_BY_WEEK).forEach(([wk,ss])=>ss.forEach(s=>{
      if(s.realise&&s.realise.statut==='fait'&&s.date)done.push({date:s.date,type:(s.type||'')});
    }));
    done.sort((a,b)=>b.date.localeCompare(a.date));
    const today=new Date();today.setHours(0,0,0,0);
    // Jours depuis la dernière séance qualité (seuil / tempo / VMA / fractionné / côtes)
    const isQuality=t=>/seuil|tempo|vma|fraction|c[ôo]tes?|intervalle|allure/i.test(t);
    let lastQ=null;
    for(const d of done){if(isQuality(d.type)){lastQ=d.date;break;}}
    const daysSinceQ=lastQ?Math.floor((today-new Date(lastQ+'T12:00:00'))/86400000):999;
    const daysSinceAny=done.length?Math.floor((today-new Date(done[0].date+'T12:00:00'))/86400000):999;
    // Semaine de course : le nudge devient un message de course, jamais un rappel d'inactivité.
    if(typeof RACES!=='undefined'&&RACES.length){
      for(const rc of RACES){
        const jr=Math.round((new Date(rc.date+'T00:00:00')-today)/86400000);
        if(jr===0)return {tone:'ok',icon:'\u{1F3C1}',txt:'Jour de course : '+rc.nom+' ! Confiance dans ta pr\u00e9pa \u2014 pars prudent, finis fort.'};
        if(jr>0&&jr<=7)return {tone:'ok',icon:'\u{1F3C1}',txt:rc.nom+' dans '+jr+' jour'+(jr>1?'s':'')+' \u2014 priorit\u00e9 fra\u00eecheur : sorties courtes et faciles, sommeil, glucides.'};
      }
    }
    // Priorité aux signaux de risque, puis de relance
    if(acwr>1.5)
      return {tone:'warn',icon:'\u{1F534}',txt:'Ton ACWR est \u00e0 '+acwr.toFixed(2)+' \u2014 charge aigu\u00eb \u00e9lev\u00e9e. Priorise la r\u00e9cup ces prochains jours.'};
    // Phase "Maintien — Road trip USA" (S36-39) : le plan prévoit peu de course, on n'alarme pas sur l'inactivité.
    const _inUSA=cur>=36&&cur<=39;
    if(_inUSA&&daysSinceAny>=4&&daysSinceAny<900)
      return {tone:'info',icon:'\u{1F30E}',txt:'Phase maintien (road trip) \u2014 randos et temps de pied comptent. Cours quand c\u2019est possible, sans pression.'};
    if(daysSinceAny>=5&&daysSinceAny<900&&!_inUSA)
      return {tone:'info',icon:'\u{1F440}',txt:daysSinceAny+' jours sans sortie logg\u00e9e. Tout va bien ? Une sortie facile relancerait la machine.'};
    if(acwr<0.7&&daysSinceAny<5)
      return {tone:'info',icon:'\u{1F4C8}',txt:'Charge basse (ACWR '+acwr.toFixed(2)+') \u2014 de la marge pour ajouter du volume si la forme suit.'};
    if(daysSinceQ>=10&&daysSinceQ<900)
      return {tone:'info',icon:'\u26a1',txt:daysSinceQ+' jours sans s\u00e9ance qualit\u00e9. Un seuil ou un tempo ferait progresser ton chrono.'};
    if(forme.score>=85)
      return {tone:'ok',icon:'\u{1F7E2}',txt:'Forme \u00e0 '+forme.score+'/100 \u2014 excellent moment pour une s\u00e9ance qualit\u00e9 si le plan s\u2019y pr\u00eate.'};
    return null;
  }catch(e){return null;}
}
function _computeStreak(){
  // Signature : nombre de semaines consécutives (jusqu'à la semaine en cours) avec au moins une séance faite.
  try{
    const cur=isoWeek(new Date());
    let streak=0;
    for(let w=cur;w>0;w--){
      const ss=SEANCES_BY_WEEK[w];
      if(!ss)break;
      const done=ss.some(s=>s.realise&&(s.realise.statut==='fait'||s.realise.statut==='partiel'));
      if(done)streak++;
      else if(w<cur)break; // la semaine en cours peut être encore vide sans casser la série
    }
    return streak;
  }catch(e){return 0;}
}
function _whatsNew(){
  // Détecte ce qui a changé depuis la dernière visite (nouvelle séance, PR, forme, streak).
  // Ephémère : ne se montre qu'une fois par changement (signature sauvegardée immédiatement).
  try{
    const done=[];
    Object.entries(SEANCES_BY_WEEK).forEach(([wk,ss])=>ss.forEach(s=>{
      if(s.realise&&s.realise.statut==='fait'&&s.date)done.push({date:s.date,km:s.realise.km||0,pr:(parseInt(s.realise.pr,10)||0)+(parseInt(s.realise.ach,10)||0)});
    }));
    done.sort((a,b)=>b.date.localeCompare(a.date));
    const lastDate=done.length?done[0].date:'';
    const lastPr=done.length?done[0].pr:0;
    const lastKm=done.length?done[0].km:0;
    const forme=(typeof computeFormeScore==='function')?computeFormeScore().score:null;
    const streak=(typeof _computeStreak==='function')?_computeStreak():0;
    const cur={lastDate,forme,streak};
    let prev=null;try{prev=JSON.parse(localStorage.getItem('wn_seen')||'null');}catch(e){}
    // Ne consommer le snapshot que si l'Accueil est réellement visible (sinon un render
    // en arrière-plan — ex. après un log depuis l'onglet Séances — mangerait le diff sans que
    // l'utilisateur ait vu la carte).
    const _vAcc=document.getElementById('vue-accueil');
    if(_vAcc&&_vAcc.style.display==='none')return null;
    localStorage.setItem('wn_seen',JSON.stringify(cur));
    if(!prev)return null; // première visite : rien à comparer
    let msg=null;
    if(lastDate&&lastDate>prev.lastDate){
      if(lastPr>0)msg={icon:'\u{1F3C5}',txt:lastPr+' record'+(lastPr>1?'s':'')+' battu'+(lastPr>1?'s':'')+' depuis ta derni\u00e8re visite !'};
      else msg={icon:'\u2705',txt:'Nouvelle s\u00e9ance logg\u00e9e : '+String(lastKm).replace('.',',')+' km'};
    }else if(streak>(prev.streak||0)&&streak>=2){
      msg={icon:'\u{1F525}',txt:streak+' semaines d\u2019affil\u00e9e maintenant !'};
    }else if(forme!==null&&prev.forme!==null&&Math.abs(forme-prev.forme)>=8){
      msg=forme>prev.forme?{icon:'\u{1F4C8}',txt:'Ta forme a progress\u00e9 : '+prev.forme+' \u2192 '+forme}:null;
    }
    return msg;
  }catch(e){return null;}
}
function _timelineHTML(){
  // Frise "trajectoire vers l'objectif" : suit la prochaine course à venir, disparaît après la saison.
  try{
    if(typeof PHASES==='undefined'||!PHASES.length||typeof RACES==='undefined')return '';
    const _today=new Date();_today.setHours(0,0,0,0);
    const nice=RACES.filter(r=>new Date(r.date+'T23:59:00')>=_today).sort((a,b)=>a.date.localeCompare(b.date))[0];
    if(!nice)return ''; // saison terminée : plus de frise
    const niceWeek=(new Date(nice.date)).toLocaleDateString?(function(){const d=new Date(nice.date);const dd=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dd.getUTCDay()||7;dd.setUTCDate(dd.getUTCDate()+4-day);const ys=new Date(Date.UTC(dd.getUTCFullYear(),0,1));return Math.ceil((((dd-ys)/86400000)+1)/7);})():45;
    // Parser les phases, ne garder que celles jusqu'à (et incluant) la semaine du marathon
    const parsed=PHASES.map(p=>{const m=(p.sem||'').match(/S(\d+)\s*[–-]\s*S?(\d+)?/);return {nom:p.nom,start:m?+m[1]:0,end:m?(+m[2]||+m[1]):0};}).filter(p=>p.start>0);
    const relevant=parsed.filter(p=>p.start<=niceWeek);
    if(!relevant.length)return '';
    const startWk=relevant[0].start;
    const curWk=isoWeek(new Date());
    const totalSpan=Math.max(1,niceWeek-startWk);
    const prog=Math.max(0,Math.min(100,Math.round((curWk-startWk)/totalSpan*100)));
    const curPhase=relevant.find(p=>curWk>=p.start&&curWk<=p.end)||relevant[relevant.length-1];
    const jRace=Math.max(0,Math.ceil((new Date(nice.date)-new Date())/86400000));
    const cible=/nice/i.test(nice.nom)?((typeof PROFIL!=='undefined'&&PROFIL.cible_marathon)?PROFIL.cible_marathon:'3h45'):'finisher';
    const raceName=/nice/i.test(nice.nom)?'Nice':nice.nom;
    const segs=relevant.map(p=>{
      const w=((p.end-p.start+1)/totalSpan*100).toFixed(2);
      const isCur=p===curPhase;
      return `<div class="tl-seg${isCur?' tl-cur':''}" style="width:${w}%" title="${p.nom}"></div>`;
    }).join('');
    return `<div class="timeline-wrap" onclick="showTab('plan')">
      <div class="tl-head"><span class="tl-phase">${curPhase.nom}</span><span class="tl-week">S${curWk}</span></div>
      <div class="tl-track">${segs}<div class="tl-fill" style="width:${prog}%"></div><div class="tl-you" style="left:${prog}%"></div></div>
      <div class="tl-foot"><span>Début S${startWk}</span><span class="tl-goal">🏁 ${raceName} · J-${jRace} · ${cible}</span></div>
    </div>`;
  }catch(e){return '';}
}

async function renderMeteo(){
  let cached=null;

    const tomorrowStr=new Date(Date.now()+86400000).toISOString().slice(0,10);
    let rain=0;const hToday=[],hTomorrow=[];
    if(j.hourly&&j.hourly.time){
      const curH=j.current.time?j.current.time.slice(0,13):'';
      j.hourly.time.forEach((tt,i)=>{
        if(tt.slice(0,13)===curH)rain=j.hourly.precipitation_probability[i]||0;
        const h=parseInt(tt.slice(11,13)),ds=tt.slice(0,10);
        if(h>=5&&h<=22){const tp=Math.round(j.hourly.temperature_2m[i]);
          if(ds===todayStr)hToday.push([h,tp]);
          if(ds===tomorrowStr)hTomorrow.push([h,tp]);}
      });
    }
    const tMax=hTomorrow.length?Math.max(...hTomorrow.map(x=>x[1])):undefined;
    let caniculeDays=0;
    if(j.daily&&j.daily.temperature_2m_max){j.daily.temperature_2m_max.forEach(t=>{if(t>28)caniculeDays++;});}
    const d={ts:Date.now(),temp:j.current.temperature_2m,app:j.current.apparent_temperature,wind:j.current.wind_speed_10m,code:j.current.weather_code,precip:j.current.precipitation||0,rain,tomorrow_max:tMax,hourly_today:hToday,hourly_tomorrow:hTomorrow,canicule_days:caniculeDays};
    localStorage.setItem('meteo_cache',JSON.stringify(d));
    _meteoPaint(d);
  }catch(e){
    if(!cached){const el=document.getElementById('meteo-widget');if(el)el.innerHTML='<button onclick="renderMeteo()" style="width:100%;text-align:left;background:none;border:none;font-size:.75rem;color:var(--texte-trois);cursor:pointer;padding:0" aria-label="Réessayer de charger la météo">🌡️ Météo indisponible · <span style="color:var(--primary);font-weight:700">réessayer</span></button>';}
  }
}

function hmIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function heatColor(km){if(!km)return 'h0';if(km<6)return 'h1';if(km<12)return 'h2';if(km<20)return 'h3';return 'h4';}
function hmStats(){
  const days=Object.keys(HEATMAP).sort();
  let best=0,cur=0,prev=null;
  days.forEach(iso=>{const d=new Date(iso+'T00:00:00');if(prev&&Math.round((d-prev)/86400000)===1)cur++;else cur=1;if(cur>best)best=cur;prev=d;});
  const totalKm=Object.values(HEATMAP).reduce((a,b)=>a+b,0);
  return '🔥 Plus longue série : <strong>'+best+' jours</strong> · <strong>'+days.length+'</strong> jours courus · <strong>'+Math.round(totalKm)+' km</strong> en 2026';
}
function renderHeatmap(){
  const year=2026, jan1=new Date(year,0,1);
  const start=new Date(jan1); start.setDate(start.getDate()-((start.getDay()+6)%7));
  const todayISO=hmIso(new Date());
  const M=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
  let grid='',months='',lastM=-1;
  for(let w=0;w<53;w++){
    const monday=new Date(start);monday.setDate(start.getDate()+w*7);
    let ml='';
    if(monday.getFullYear()===year && monday.getMonth()!==lastM){ml=M[monday.getMonth()];lastM=monday.getMonth();}
    months+='<div class="hm-mlabel">'+ml+'</div>';
    let col='';
    for(let d=0;d<7;d++){
      const c=new Date(start);c.setDate(start.getDate()+w*7+d);
      if(c.getFullYear()!==year){col+='<div class="hm-cell hm-out"></div>';continue;}

    }

/* ===== Item 4 — Projection marathon « boule de cristal » ===== */
function _pace2s(p){if(p==null)return null;const m=String(p).match(/(\d+):(\d+)/);return m?(+m[1]*60+ +m[2]):null;}
function _s2hm(s){s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h+'h'+String(m).padStart(2,'0');}
function _s2hms(s){s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h+'h'+String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
function _riegel(km,t){return t*Math.pow(42.195/km,1.07);}
function marathonEquiv(se){
  const r=se.realise;if(!r||(r.statut!=='fait'&&r.statut!=='partiel'))return null;
  const t=se.type,sub=(se.metriques||{}).Type||'',pace=_pace2s(r.allure);
  if(t==='Test / recalibrage'){
    const km=parseFloat(String(r.km).replace(',','.'))||10;let tot=null;
    if(r.temps&&/^\d{1,3}:\d{2}$/.test(String(r.temps).trim()))tot=_pace2s(r.temps);else if(pace)tot=pace*km;
    if(!tot)return null;return{sec:_riegel(km,tot),w:3,label:`Test ${km} km`,sub:r.allure||r.temps};
  }
  if(!pace)return null;
  if(t==='Spécifique marathon')return{sec:pace*1.015*42.195,w:2,label:'Allure marathon',sub:r.allure};
  if(t==='Seuil (puissance aérobie)'){const f=sub==='Seuil 60'?1.06:1.12;return{sec:pace*f*42.195,w:1.5,label:sub||'Seuil',sub:r.allure};}
  return null;
}
function marathonProjection(){
  const q=[];Object.values(SEANCES_BY_WEEK).flat().forEach(se=>{const e=marathonEquiv(se);if(e){e.date=se.date;q.push(e);}});
  q.sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  let num=PROJ.base,den=1;const trend=[PROJ.base];
  q.forEach((e,i)=>{const w=e.w*(1+i*0.4);num+=e.sec*w;den+=w;trend.push(num/den);});
  return{sec:num/den,n:q.length,sources:q,trend:trend};
}

  return `<div class="kpi cb">

  // Graphe mensuel (barres SVG)

function s24Chart(splits){const n=splits.length,W=720,h=190,padL=8,padR=8,padT=26,padB=30;
  const paces=splits.map(s=>s[0]),hrs=splits.map(s=>s[1]);
  const spd=paces.map(p=>1000/p);const sMin=Math.min(...spd)*0.94,sMax=Math.max(...spd)*1.03;
  const hMin=Math.min(...hrs)-6,hMax=Math.max(...hrs)+8;
  const bw=(W-padL-padR)/n;
  const bars=splits.map((s,i)=>{const sp=1000/s[0];const bh=(sp-sMin)/(sMax-sMin)*(h-padT-padB);const x=padL+i*bw,y=h-padB-bh;
    const pm=Math.floor(s[0]/60),ps=Math.round(s[0]%60);
    return `<rect x="${(x+2).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-4).toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="#0d9488" opacity=".55"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${(h-padB+11).toFixed(1)}" font-size="7.6" fill="#94a3b8" text-anchor="middle">${pm}:${String(ps).padStart(2,'0')}</text>
      <text x="${(x+bw/2).toFixed(1)}" y="${(h-padB+21).toFixed(1)}" font-size="6.8" fill="#cbd5e1" text-anchor="middle">km${i+1}</text>`;}).join('');
  const HY=v=>padT+(h-padT-padB)*(1-(v-hMin)/(hMax-hMin));
  const line='M '+hrs.map((v,i)=>`${(padL+i*bw+bw/2).toFixed(1)} ${HY(v).toFixed(1)}`).join(' L ');
  const hrlab=hrs.map((v,i)=>{if(i===0||i===n-1||v===Math.max(...hrs))return `<text x="${(padL+i*bw+bw/2).toFixed(1)}" y="${(HY(v)-6).toFixed(1)}" font-size="8" font-weight="700" fill="#ef4444" text-anchor="middle">${v}</text>`;return '';}).join('');
  return `<svg viewBox="0 0 ${W} ${h}" class="chart-svg">${bars}<path d="${line}" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>${hrlab}
    <text x="${padL}" y="11" font-size="8.5" fill="#0d9488" font-weight="700">▮ Allure /km</text><text x="${padL+74}" y="11" font-size="8.5" fill="#ef4444" font-weight="700">— FC moyenne /km</text></svg>`;
}

    <div class="rw-kicker">${s.kicker}</div><div class="rw-big">${s.big}</div><div class="rw-txt">${s.txt}</div>

function rwOpen(id){rwCur=REWINDS.find(x=>x.id===id);if(!rwCur)return;rwIdx=0;document.getElementById('rwoverlay').classList.add('on');document.body.style.overflow='hidden';rwRender();
  try{localStorage.setItem('rw_seen',id);}catch(e){}}
function rwNext(){if(!rwCur)return;if(rwIdx<rwCur.slides.length-1){rwIdx++;rwRender();}else rwClose();}
function rwClose(){const o=document.getElementById('rwoverlay');if(o)o.classList.remove('on');document.body.style.overflow='';rwCur=null;}
function rwAuto(){const last=REWINDS[REWINDS.length-1];if(!last)return;const d=new Date();if(d.getDay()!==1)return;/* 1 = lundi */const wk=isoWeek(d)+'-'+d.getFullYear();try{if(localStorage.getItem('rw_mon')===wk)return;localStorage.setItem('rw_mon',wk);}catch(e){}setTimeout(()=>rwOpen(last.id),900);}

function dosProfilSVG(D,ac){
  const pts=D.profil_pts; if(!pts||!pts.length)return '';
  const n=pts.length,dist=D.profil_dist||24.06;
  const W=620,H=172,padL=32,padR=10,padT=18,padB=20;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const mn=Math.min(...pts),mx=Math.max(...pts);
  const lo=Math.floor((mn-15)/100)*100,hi=Math.ceil((mx+15)/100)*100;
  const X=i=>padL+i/(n-1)*plotW, Y=v=>padT+plotH-(v-lo)/(hi-lo)*plotH;
  let d=`M ${X(0).toFixed(1)} ${Y(pts[0]).toFixed(1)}`;
  for(let i=1;i<n;i++)d+=` L ${X(i).toFixed(1)} ${Y(pts[i]).toFixed(1)}`;
  const area=d+` L ${X(n-1).toFixed(1)} ${(padT+plotH).toFixed(1)} L ${X(0).toFixed(1)} ${(padT+plotH).toFixed(1)} Z`;
  const yl=[lo,hi].map(v=>`<line x1="${padL}" y1="${Y(v).toFixed(1)}" x2="${W-padR}" y2="${Y(v).toFixed(1)}" class="dp-grid"/><text x="${padL-5}" y="${(Y(v)+3).toFixed(1)}" class="dp-ax" text-anchor="end">${v}</text>`).join('');
  const xl=[0,8,16,24].map(km=>{const xx=padL+Math.min(km,dist)/dist*plotW;return `<text x="${xx.toFixed(1)}" y="${H-5}" class="dp-ax" text-anchor="middle">${km}</text>`;}).join('');
  let mi=0;for(let i=0;i<n;i++)if(pts[i]>pts[mi])mi=i;
  const sx=X(mi),sy=Y(pts[mi]);
  const sum=`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="3.4" fill="${ac}"/><text x="${sx.toFixed(1)}" y="${(sy-7).toFixed(1)}" class="dp-mk" text-anchor="middle">${pts[mi]} m</text>`;
  return `<svg class="dos-prof" viewBox="0 0 ${W} ${H}" role="img" aria-label="Profil réel du parcours"><style>.dp-ax{font:600 9px system-ui;fill:#94a3b8}.dp-grid{stroke:#e2e8f0;stroke-width:1}.dp-mk{font:700 9.5px system-ui;fill:${ac}}</style>${yl}<path d="${area}" fill="${ac}" opacity="0.13"/><path d="${d}" fill="none" stroke="${ac}" stroke-width="2.4" stroke-linejoin="round"/>${sum}${xl}</svg><div class="dos-prof-cap">Profil réel (trace GPX officielle) · altitude (m) en ordonnée, distance (km) en abscisse · sommet 897 m vers le km 15</div>`;
}

function _ckLoad(r){try{return JSON.parse(localStorage.getItem('ck_'+r)||'{}')}catch(e){return{};}}
function _ckSave(r,s){localStorage.setItem('ck_'+r,JSON.stringify(s));}
function ckToggle(race,id){const s=_ckLoad(race);s[id]=!s[id];_ckSave(race,s);_ckRender(race);}
function ckToggleSec(race,id){const s=_ckLoad(race);s['_o_'+id]=s['_o_'+id]===false?true:false;_ckSave(race,s);_ckRender(race);}
function ckReset(race){if(confirm('Réinitialiser la checklist ?')){_ckSave(race,{});_ckRender(race);}}
function _ckRender(race){
  const secs=CK_SECS[race];if(!secs)return;
  const st=_ckLoad(race);
  const total=secs.reduce((a,s)=>a+s.items.length,0);
  const done=secs.reduce((a,s)=>a+s.items.filter(it=>st[it.id]).length,0);
  const pb=document.getElementById('ck-pb');if(pb)pb.style.width=(done/total*100)+'%';
  const pc=document.getElementById('ck-pc');if(pc)pc.textContent=done+'/'+total;
  const ps=document.getElementById('ck-ps');if(ps)ps.textContent=done===total?'Tout est prêt ✓':(total-done)+' item'+(total-done>1?'s':'')+' restant'+(total-done>1?'s':'');
  const ad=document.getElementById('ck-ad');if(ad)ad.style.display=done===total?'block':'none';
  const el=document.getElementById('ck-secs');if(!el)return;
  el.innerHTML=secs.map(sec=>{
    const sd=sec.items.filter(it=>st[it.id]).length,all=sd===sec.items.length,open=st['_o_'+sec.id]!==false;
    return`<div class="ck-sc"><div class="ck-sh" onclick="ckToggleSec('${race}','${sec.id}')">
      <span class="ck-si">${sec.ico}</span><span class="ck-st">${sec.title}</span>
      <span class="ck-sb ${all?'ck-sbd':''}">${sd}/${sec.items.length}</span>
      <span class="ck-sa ${open?'ck-sao':''}">›</span></div>
    ${open?`<div class="ck-is">${sec.items.map(it=>`<div class="ck-item" onclick="ckToggle('${race}','${it.id}')">
      <div class="ck-chk ${st[it.id]?'ck-on':''}">${st[it.id]?'✓':''}</div>
      <div class="ck-itx"><div class="ck-il ${st[it.id]?'ck-ild':''}">${it.label}</div>
      ${it.note?`<div class="ck-in">${it.note}</div>`:''}</div></div>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}
function renderChecklistHTML(race){
  if(!CK_SECS[race])return'';
  const total=CK_SECS[race].reduce((a,s)=>a+s.items.length,0);
  return`<h3 class="dos-h3">✅ Checklist J-7</h3>
    <div class="ck-prog"><div class="ck-ph"><span class="ck-ptit">Préparation course</span><span class="ck-pc" id="ck-pc">0/${total}</span></div>
      <div class="ck-pbw"><div class="ck-pb" id="ck-pb" style="width:0%"></div></div>
      <div class="ck-ps" id="ck-ps">${total} items à valider</div></div>
    <div class="ck-done" id="ck-ad" style="display:none">✅&nbsp;&nbsp;<strong>Tout est prêt !</strong> Bonne course 💪</div>
    <div id="ck-secs"></div>
    <button class="ck-rst" onclick="ckReset('${race}')">↺ Réinitialiser</button>`;
}

function _wxStatus(t){
  if(t<22)return{cls:'wx-ideal',lbl:'🟢 Idéal',c:'#16a34a'};
  if(t<27)return{cls:'wx-ok',lbl:'🟡 OK',c:'#f59e0b'};
  if(t<32)return{cls:'wx-dur',lbl:'🟠 Difficile',c:'#f59e0b'};
  return{cls:'wx-evit',lbl:'🔴 Éviter',c:'#ef4444'};
}
function _wxReco(hrs){
  const ideal=hrs.filter(([h,t])=>t<22);
  const ok=hrs.filter(([h,t])=>t>=22&&t<27);
  const mx=Math.max(...hrs.map(x=>x[1]));
  const peak=(hrs.find(([h,t])=>t===mx)||[null])[0];
  if(ideal.length)return`<strong>Fenêtre idéale :</strong> ${ideal[0][0]}h–${ideal[ideal.length-1][0]+1}h (< 22°C). Pic à ${mx}° vers ${peak}h — éviter impérativement.`;
  if(ok.length)return`<strong>Acceptable :</strong> ${ok[0][0]}h–${ok[ok.length-1][0]+1}h avec hydratation renforcée. Pic à ${mx}° vers ${peak}h.`;
  return`<strong>Journée très difficile.</strong> Pic à ${mx}°. Réduire ou reporter la séance au lendemain matin.`;
}
function _wxRenderTab(k){
  const hrs=k==='today'?(window._wxHourly&&window._wxHourly.today):( window._wxHourly&&window._wxHourly.tomorrow);
  if(!hrs||!hrs.length)return;
  const mx=Math.max(...hrs.map(x=>x[1])),mn=Math.min(...hrs.map(x=>x[1]));
  document.getElementById('wx-reco').innerHTML=_wxReco(hrs);
  document.getElementById('wx-strip').innerHTML=hrs.map(([h,t])=>`<div class="wx-strip-seg" style="background:${_wxStatus(t).c}"></div>`).join('');
  document.getElementById('wx-hours').innerHTML=hrs.map(([h,t])=>{
    const s=_wxStatus(t);const p=mx===mn?50:((t-mn)/(mx-mn)*100).toFixed(0);const hi=s.cls==='wx-ideal'?' wx-hr-hi':'';
    return`<div class="wx-hr${hi}"><span class="wx-hr-t">${h}h</span><div class="wx-hr-bw"><div class="wx-hr-b" style="width:${p}%;background:${s.c}"></div></div><span class="wx-hr-temp">${t}°</span><span class="wx-hr-tag ${s.cls}">${s.lbl}</span></div>`;
  }).join('');
}

function _parseTime(t){if(!t)return null;const p=String(t).trim().split(':').map(x=>parseInt(x,10));if(!p.length||p.some(isNaN))return null;if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];if(p.length===1)return p[0]*60;return null;}
function computeAllure(km,temps){const s=_parseTime(temps);if(!s||!km)return '';const sk=s/km;const m=Math.floor(sk/60),x=Math.round(sk%60);return (x===60?(m+1)+':00':m+':'+String(x).padStart(2,'0'))+'/km';}

  const realise={statut:_pendingStatut,km:km,temps:temps,allure:allure,

let _replayRAF=null;
function _replayRun(key){
  const d=_REPLAY_DATA[key];if(!d)return;
  const ov=document.getElementById('replay-ov');if(!ov)return;
  const N=d.alt.length;
  const W=340,H=150,PAD=8;
  const amin=Math.min(...d.alt),amax=Math.max(...d.alt),dmax=d.dist_km[N-1];
  const x=i=>PAD+(d.dist_km[i]/dmax)*(W-2*PAD);
  const y=a=>H-PAD-((a-amin)/(amax-amin||1))*(H-2*PAD);
  const trace=ov.querySelector('#rp-trace'),dot=ov.querySelector('#rp-dot');
  const len=trace.getTotalLength();
  const altEl=ov.querySelector('#rp-alt'),hrEl=ov.querySelector('#rp-hr'),distEl=ov.querySelector('#rp-dist'),phaseEl=ov.querySelector('#rp-phase'),btn=ov.querySelector('#rp-btn');
  if(_replayRAF)cancelAnimationFrame(_replayRAF);
  btn.style.opacity='.4';btn.style.pointerEvents='none';
  const reduce=(typeof _reduceMotion==='function')&&_reduceMotion();
  const DUR=reduce?300:7000;
  const t0=performance.now();
  function frame(now){
    let p=Math.min(1,(now-t0)/DUR);
    const fi=p*(N-1);const i=Math.floor(fi),f=fi-i;
    const cur=Math.min(N-1,i+1);
    // interpolation
    const alt=Math.round(d.alt[i]+(d.alt[cur]-d.alt[i])*f);
    const hr=Math.round(d.hr[i]+(d.hr[cur]-d.hr[i])*f);
    const dk=(d.dist_km[i]+(d.dist_km[cur]-d.dist_km[i])*f);
    trace.style.strokeDashoffset=len*(1-p);
    dot.setAttribute('cx',x(i)+(x(cur)-x(i))*f);
    dot.setAttribute('cy',y(d.alt[i])+(y(d.alt[cur])-y(d.alt[i]))*f);
    altEl.textContent=alt+' m';hrEl.textContent=hr;distEl.textContent=dk.toFixed(1);
    // phase narrative
    const slope=cur>i?(d.alt[cur]-d.alt[i]):0;
    if(alt>=1980)phaseEl.textContent='\u{1F3D4}\uFE0F Sommet du Croisse Baulet \u2014 2000 m !';
    else if(slope>8)phaseEl.textContent='\u26F0\uFE0F \u00c7a grimpe fort \u2014 marche efficace';
    else if(slope<-8)phaseEl.textContent='\u{1F3C3} Descente engag\u00e9e \u2014 on d\u00e9roule';
    else phaseEl.textContent='\u{1F33F} Terrain roulant';
    // couleur FC selon zone
    hrEl.style.color=hr>165?'#dc2626':hr>145?'#f59e0b':'#16a34a';
    if(p<1)_replayRAF=requestAnimationFrame(frame);
    else{phaseEl.textContent='\u{1F3C1} Sortie termin\u00e9e \u2014 belle grimpette !';btn.style.opacity='1';btn.style.pointerEvents='auto';if(navigator.vibrate&&!reduce)try{navigator.vibrate([10,30,10])}catch(e){}}
  }
  _replayRAF=requestAnimationFrame(frame);
}
