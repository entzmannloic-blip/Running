<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate"><meta http-equiv="Pragma" content="no-cache">
<title>Plan d'entraînement — Loïc · Saison 2026</title>
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plan">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{
  /* ===== PRIMAIRE — teal, unique ===== */
  --primary:#0d9488;--primary-deux:#0f766e;--primary-clair:#99f6e4;--primary-fond:#f0fdfa;
  /* ===== ÉTATS sémantiques (un sens chacun) ===== */
  --ok:#16a34a;--ok-deux:#15803d;--ok-clair:#bbf7d0;--ok-fond:#dcfce7;
  --warn:#f59e0b;--warn-deux:#b45309;--warn-clair:#fde68a;--warn-fond:#fef3c7;
  --danger:#ef4444;--danger-deux:#b91c1c;--danger-clair:#fecaca;--danger-fond:#fee2e2;
  /* ===== NEUTRES — slate (conservés) ===== */
  --gris:#94a3b8;--gris-clair:#e2e8f0;--gris-fond:#f8fafc;
  --texte:#1e293b;--texte-deux:#475569;--texte-trois:#64748b;--blanc:#fff;
  /* ===== ÉCHELLE TYPO — 7 niveaux ===== */
  --t-display:2rem;--t-title:1.375rem;--t-headline:1.0625rem;--t-body:1rem;--t-callout:.875rem;--t-caption:.8125rem;--t-data:.75rem;
  --fw-reg:400;--fw-med:500;--fw-semi:600;--fw-bold:700;--fw-black:800;
  /* ===== RAYONS / PROFONDEUR iOS 27 ===== */
  --rayon:12px;--rayon-lg:18px;
  --ombre:0 1px 2px rgba(15,23,42,.06),0 4px 12px -6px rgba(15,23,42,.10);
  --ombre-lg:0 2px 6px rgba(15,23,42,.07),0 18px 36px -14px rgba(15,23,42,.22);
  /* ===== ALIAS rétro-compat → mappés sur le système (migration douce) ===== */
  --vert:var(--ok);--vert-clair:var(--ok-clair);--vert-fond:var(--ok-fond);
  --orange:var(--warn);--orange-clair:var(--warn-clair);--orange-fond:var(--warn-fond);
  --jaune:var(--warn);--jaune-clair:var(--warn-clair);--jaune-fond:var(--warn-fond);
  --bleu:var(--primary);--bleu-clair:var(--primary-clair);--bleu-fond:var(--primary-fond);
  --violet:var(--primary);--violet-clair:var(--primary-clair);--violet-fond:var(--primary-fond);
  --teal:var(--primary);--teal-clair:var(--primary-clair);--teal-fond:var(--primary-fond);
  --rouge:var(--danger);--rouge-clair:var(--danger-clair);--rouge-fond:var(--danger-fond);
  /* Échelle d'espacement — base 4px (Sprint 1 design system) */
  --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--sp-10:40px;--sp-12:48px;
  /* Rayons complémentaires */
  --rayon-sm:8px;--rayon-pill:99px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--gris-fond);color:var(--texte);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ACCUEIL */
.accueil{max-width:1000px;margin:0 auto;padding:var(--sp-10) var(--sp-4) 90px}
.accueil-header{text-align:center;margin-bottom:30px}
.accueil-tag{display:inline-block;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--bleu);background:var(--bleu-fond);border:1px solid var(--bleu-clair);padding:4px 12px;border-radius:99px;margin-bottom:16px}
.accueil-titre{font-family:Georgia,'Times New Roman',serif;font-size:clamp(1.8rem,5vw,2.7rem);font-weight:700;letter-spacing:-.02em;line-height:1.12;margin-bottom:10px}
.accueil-sous-titre{font-size:1rem;color:var(--texte-trois);max-width:520px;margin:0 auto}

/* PANNEAU STATUT */
.statut{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:30px 0 38px}
.statut-carte{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon-lg);padding:18px 20px;position:relative;overflow:hidden}
.statut-carte::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.statut-carte.c1::before{background:var(--vert)}.statut-carte.c2::before{background:var(--orange)}.statut-carte.c3::before{background:var(--bleu)}
.statut-label{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:8px}
.statut-val{font-family:Georgia,serif;font-size:1.18rem;font-weight:700;color:var(--texte);line-height:1.2}
.statut-sub{font-size:.75rem;color:var(--texte-trois);margin-top:4px}

/* PHASES */
.phase-bloc{margin-bottom:var(--sp-8)}
.phase-entete{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--gris-clair)}
.phase-puce{width:13px;height:13px;border-radius:4px;flex-shrink:0}
.phase-nom{font-family:Georgia,serif;font-size:1.12rem;font-weight:700;color:var(--texte)}
.phase-sem{font-size:.72rem;font-weight:700;color:var(--texte-trois);background:var(--gris-fond);border:1px solid var(--gris-clair);padding:2px 8px;border-radius:99px;margin-left:auto;white-space:nowrap}
.phase-role{font-size:.8125rem;color:var(--texte-trois);margin:-6px 0 14px;max-width:760px}
.sem-grille{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:12px}

/* CARTE SEMAINE */
.sem-carte{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:var(--sp-4);position:relative;overflow:hidden;display:flex;flex-direction:column;min-height:128px;transition:box-shadow .2s,transform .2s,border-color .2s}
.sem-carte.cliquable{cursor:pointer}
.sem-carte.cliquable:hover{box-shadow:var(--ombre-lg);transform:translateY(-3px)}
.sem-num{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.sem-theme{font-family:Georgia,serif;font-size:1rem;font-weight:700;color:var(--texte);line-height:1.22;margin-bottom:8px;flex:1}
.sem-km{font-size:.8125rem;font-weight:700;color:var(--texte-deux)}
.sem-km span{font-size:.7rem;font-weight:600;color:var(--texte-trois)}
.sem-statut{position:absolute;top:14px;right:14px;font-size:.58rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:4px 8px;border-radius:99px}
.st-courante{background:var(--vert-clair);color:#15803d}
.st-ouverte{background:var(--bleu-clair);color:#0f766e}
.st-verrouille{background:var(--gris-fond);color:var(--gris);border:1px solid var(--gris-clair)}
.sem-carte.verrouillee{opacity:.72}
.sem-cadenas{font-size:.8125rem}
.sem-barre{height:3px;position:absolute;bottom:0;left:0;right:0;background:var(--gris-clair)}
.sem-barre-fill{height:100%}

/* MODALE */
.modale-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:18px 12px 40px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s}
.modale-overlay.ouverte{opacity:1;pointer-events:all}
.modale-boite{background:var(--gris-fond);border-radius:22px;width:100%;max-width:880px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.22);transform:translateY(24px);transition:transform .3s cubic-bezier(.22,.68,0,1.15);margin:0 auto}
.modale-overlay.ouverte .modale-boite{transform:translateY(0)}
.modale-topbar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;gap:10px;padding:14px 18px 0;background:var(--gris-fond)}
.btn-nav{display:flex;align-items:center;gap:6px;font-size:.74rem;font-weight:700;letter-spacing:.03em;color:var(--texte-deux);background:var(--blanc);border:1px solid var(--gris-clair);border-radius:99px;padding:8px 14px;cursor:pointer;transition:.15s}
.btn-nav:hover{background:var(--texte);color:var(--blanc);border-color:var(--texte)}

/* EN-TÊTE SEMAINE (dans modale) */
.sw-hero{background:var(--blanc);border-bottom:1px solid var(--gris-clair);padding:22px 24px 20px}
.sw-tag{display:inline-block;font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:12px}
.sw-titre{font-family:Georgia,serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;line-height:1.15;margin-bottom:6px}
.sw-sous{font-size:.875rem;color:var(--texte-trois);margin-bottom:16px}
.sw-meta{display:flex;flex-wrap:wrap;gap:8px}
.sw-pill{background:var(--gris-fond);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:8px 14px}
.sw-pill-l{font-size:.58rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:2px}
.sw-pill-v{font-size:1rem;font-weight:800;line-height:1}
.sw-corps{padding:8px 24px 32px}
.sw-section{font-size:.66rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--texte-trois);margin:24px 0 12px}

/* CARTE SÉANCE (liste semaine) */
.seance-liste{display:flex;flex-direction:column;gap:12px}
.seance-carte{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon-lg);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:15px;position:relative;overflow:hidden;transition:.2s}
.seance-carte:hover{box-shadow:var(--ombre-lg);transform:translateY(-2px)}
.seance-bande{position:absolute;left:0;top:0;bottom:0;width:5px}
.seance-idx{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--texte-trois);min-width:62px}
.seance-info{flex:1}
.seance-nom{font-family:Georgia,serif;font-size:1.0625rem;font-weight:700;line-height:1.2;margin-bottom:4px}
.seance-desc{font-size:.75rem;color:var(--texte-trois)}
.seance-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.seance-tag{font-size:.66rem;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--gris-fond);border:1px solid var(--gris-clair);color:var(--texte-deux)}
.tag-opt{background:var(--jaune-fond);border-color:var(--jaune-clair);color:#854d0e}
.seance-fleche{color:var(--gris);font-size:1.0625rem;transition:.2s}
.seance-carte:hover .seance-fleche{transform:translateX(3px)}

/* DÉTAIL SÉANCE */
.sd-hero{background:var(--blanc);border-bottom:1px solid var(--gris-clair);padding:22px 24px 20px}
.sd-badge{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:12px}
.sd-titre{font-family:Georgia,serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:700;line-height:1.15;margin-bottom:4px}
.sd-sous{font-size:.875rem;color:var(--texte-trois);margin-bottom:18px}
.sd-metriques{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px}
.metrique{background:var(--gris-fond);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:8px 12px}
.metrique-l{font-size:.56rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:4px}
.metrique-v{font-size:1rem;font-weight:800;line-height:1.05}
.sd-corps{padding:0 24px 34px}
.sd-section{font-size:.66rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--texte-trois);margin:26px 0 12px}
.callout{border-radius:var(--rayon-lg);padding:15px 18px;font-size:.875rem;color:var(--texte-deux);line-height:1.55}
.callout-obj{background:var(--bleu-fond);border:1px solid var(--bleu-clair)}
.callout-ben{background:var(--vert-fond);border:1px solid var(--vert-clair)}
.callout-vig{background:var(--orange-fond);border:1px solid var(--orange-clair)}
.callout strong{color:var(--texte)}
.struct{display:flex;flex-direction:column;gap:8px}
.struct-ligne{display:flex;align-items:flex-start;gap:12px;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:12px 15px}
.struct-puce{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.struct-nom{font-size:.74rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--texte-trois);min-width:96px;padding-top:1px}
.struct-txt{flex:1;font-size:.875rem;color:var(--texte-deux)}
.legende{display:flex;flex-wrap:wrap;gap:14px}
.legende-item{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--texte-deux)}
.legende-puce{width:10px;height:10px;border-radius:50%}
/* viz */
.viz-wrap{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon-lg);padding:16px}
.viz-entete{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.viz-label{font-size:.75rem;font-weight:700;color:var(--texte-deux)}
.viz-hint{font-size:.68rem;color:var(--texte-trois)}
.barre-scroll{overflow-x:auto;padding-bottom:6px}
.barre-piste{display:flex;align-items:flex-end;gap:2px;height:90px;min-width:100%}
.seg{border-radius:4px 4px 0 0;min-width:5px;cursor:pointer;transition:opacity .15s;align-self:flex-end}
.seg:hover{opacity:.8}.seg.actif{outline:2px solid var(--texte);outline-offset:1px}
.seg-vert{background:#16a34a}.seg-bleu{background:#0d9488}.seg-orange{background:#f59e0b}.seg-violet{background:#64748b}.seg-jaune{background:#94a3b8}
.detail-panneau{margin-top:14px;padding:12px 15px;background:var(--gris-fond);border:1px solid var(--gris-clair);border-radius:var(--rayon);display:none}
.detail-panneau.visible{display:block}
.detail-nom{font-weight:800;font-size:.875rem;margin-bottom:4px}
.detail-role{font-size:.8125rem;color:var(--texte-trois);margin-bottom:10px}
.detail-grille{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.di-label{font-size:.56rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--texte-trois)}
.di-val{font-size:.8125rem;font-weight:700}
/* coach */
.coach-grille{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.coach-carte{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:14px 16px}
.coach-titre{font-size:.8125rem;font-weight:800;margin-bottom:4px}
.coach-texte{font-size:.8125rem;color:var(--texte-deux);line-height:1.5}
/* verrouillée */
.lock-wrap{padding:40px 28px}
.lock-ico{font-size:2rem;text-align:center;margin-bottom:12px}
.lock-txt{text-align:center;font-size:.875rem;color:var(--texte-deux);max-width:460px;margin:0 auto 22px;line-height:1.6}
.lock-grille{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
@media(max-width:560px){.detail-grille{grid-template-columns:repeat(2,1fr)}.struct-nom{min-width:74px}}
.note-foot{margin-top:46px;font-size:.74rem;color:var(--texte-trois);text-align:center;line-height:1.6;max-width:680px;margin-left:auto;margin-right:auto}
/* ===== badges/RPE/réalisé (repris) ===== */
.cat-badge{font-size:.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:99px;white-space:nowrap}
.cat-classique{background:#eef2f7;border:1px solid #d8dee9;color:#475569}
.cat-specifique{background:#f0fdfa;border:1px solid #99f6e4;color:#0f766e}
.rpe-pill{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:700;color:var(--texte-deux);background:var(--gris-fond);border:1px solid var(--gris-clair);padding:2px 8px;border-radius:99px}
.rpe-dot{width:8px;height:8px;border-radius:50%}
.rpe-wrap{display:flex;align-items:center;gap:16px;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:12px 16px}
.rpe-info{display:flex;flex-direction:column;gap:2px;min-width:60px}
.rpe-label{font-size:.55rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--texte-trois)}
.rpe-val{font-size:1.25rem;font-weight:800;line-height:1}
.rpe-scale{display:flex;gap:4px;flex:1}
.rpe-seg{flex:1;height:16px;border-radius:3px;background:var(--gris-clair)}
.hero-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sd-badge{margin-bottom:0!important}
.st-chip{font-size:.58rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:99px;white-space:nowrap}
.st-afaire{background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b}
.st-fait{background:#dcfce7;border:1px solid #bbf7d0;color:#15803d}
.st-partiel{background:#fef3c7;border:1px solid #fde68a;color:#9a3412}
.st-manque{background:#fee2e2;border:1px solid #fecaca;color:#b91c1c}
.realise-empty{background:var(--gris-fond);border:1px dashed #cbd5e1;border-radius:var(--rayon-lg);padding:16px 18px;font-size:.875rem;color:var(--texte-trois);line-height:1.55}
.rvp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.rvp-col{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:12px 14px}
.rvp-col h5{font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:8px}
.rvp-l{display:flex;justify-content:space-between;font-size:.8125rem;padding:4px 0;border-bottom:1px solid var(--gris-clair)}
.rvp-l span:first-child{color:var(--texte-trois)}.rvp-l span:last-child{font-weight:700}
.rev-coach{background:#fef3c7;border:1px solid #fde68a;border-radius:var(--rayon-lg);padding:15px 18px;font-size:.875rem;color:var(--texte-deux);line-height:1.55}
.rev-coach strong{color:var(--texte)}
.comm-user{background:#f0fdfa;border:1px solid #99f6e4;border-radius:var(--rayon-lg);padding:12px 16px;font-size:.875rem;color:var(--texte-deux);font-style:italic;margin-bottom:12px}
/* ===== appbar / dossard / hero ===== */
.appbar{max-width:1000px;margin:0 auto;padding:16px 16px 0;display:flex;flex-direction:column;align-items:stretch;gap:0}
.appbar-brand{font-size:.7rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--texte-trois)}
.theme-btn{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:99px;width:38px;height:38px;font-size:1.0625rem;cursor:pointer;color:var(--texte-deux)}
.dossard{max-width:1000px;margin:14px auto 0;padding:0 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.doss-nom{font-family:Georgia,serif;font-size:1.5rem;font-weight:700}
.doss-chip{display:flex;flex-direction:column;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:var(--rayon);padding:8px 12px}
.doss-l{font-size:.54rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--texte-trois)}
.doss-v{font-size:1rem;font-weight:800}
.vig-row{max-width:1000px;margin:10px auto 0;padding:0 16px;display:flex;flex-wrap:wrap;gap:8px}
.vig{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;background:#fef3c7;border:1px solid #fde68a;color:#9a3412;padding:4px 12px;border-radius:99px}
.hero-sem{max-width:1000px;margin:18px auto 0;padding:0 16px;display:grid;grid-template-columns:2fr 1fr;gap:12px}
.hero-card{border-radius:var(--rayon-lg);padding:18px 20px;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
.hero-card:hover{transform:translateY(-2px);box-shadow:var(--ombre-lg)}
.hero-now{background:linear-gradient(135deg,#1e293b,#334155);color:#fff}
.hero-next{background:var(--blanc);border:1px solid var(--gris-clair)}
.hero-l{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.8;margin-bottom:8px}
.hero-t{font-family:Georgia,serif;font-size:1.3rem;font-weight:700;line-height:1.15;margin-bottom:6px}
.hero-s{font-size:.8125rem;opacity:.85}
.hero-next .hero-l{color:var(--texte-trois);opacity:1}.hero-next .hero-s{color:var(--texte-trois)}
@media(max-width:640px){.hero-sem{grid-template-columns:1fr}}
/* ===== dashboard charts ===== */

/* ===== Item 1 — Records tombés (célébration PR) ===== */
.prc{display:flex;align-items:center;gap:14px;margin-top:14px;padding:14px 16px;border-radius:14px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 45%,#fde68a 100%);border:1px solid #fcd34d}
.prc::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.65) 50%,transparent 70%);
  transform:translateX(-120%);animation:prcShine 2.6s ease-in-out 1}
@keyframes prcShine{to{transform:translateX(120%)}}
.prc-burst{font-size:1.9rem;line-height:1;animation:prcPop .5s cubic-bezier(.2,1.4,.5,1) 1;flex-shrink:0}
@keyframes prcPop{0%{transform:scale(0) rotate(-25deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.prc-body{position:relative;z-index:1;min-width:0}
.prc-titre{font-family:Georgia,serif;font-weight:700;font-size:1rem;color:#92400e;letter-spacing:.01em}

.prc-n{font-weight:800;color:#92400e;font-size:1rem}
.prc-sep{opacity:.5}

/* ===== Item 2 — Navigation dashboard (sous-nav collante + sections repliables) ===== */
.dash-nav{position:sticky;top:var(--appbar-h,84px);z-index:30;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding:10px 2px;margin:0 -2px 14px;background:var(--gris-fond);scrollbar-width:none;
  box-shadow:0 6px 14px -10px rgba(15,23,42,.45)}
.dash-nav::-webkit-scrollbar{display:none}
.dnav-chip{flex:0 0 auto;font-size:.75rem;font-weight:700;color:var(--texte-deux);background:var(--blanc);
  border:1px solid var(--gris-clair);border-radius:99px;padding:8px 12px;cursor:pointer;white-space:nowrap;transition:all .18s}
.dnav-chip:hover{color:var(--texte);border-color:var(--gris)}
.dnav-chip.actif{background:#1e293b;color:#fff;border-color:#1e293b;box-shadow:0 3px 9px rgba(15,23,42,.25)}
body.nuit .dnav-chip.actif{background:#0d9488;border-color:#0d9488}
.dgrp{margin-bottom:12px}
.dgrp-head{width:100%;display:flex;align-items:center;gap:12px;background:var(--blanc);border:1px solid var(--gris-clair);
  border-radius:var(--rayon-lg);padding:15px 18px;cursor:pointer;text-align:left;transition:border-color .18s,box-shadow .18s;color:var(--texte)}
.dgrp-head:hover{border-color:var(--gris)}
.dgrp.open .dgrp-head{border-bottom-left-radius:0;border-bottom-right-radius:0;border-color:var(--gris-clair);box-shadow:0 -1px 0 var(--gris-clair) inset}
.dgrp-ic{font-size:1.15rem;line-height:1}
.dgrp-t{font-family:Georgia,serif;font-size:1.0625rem;font-weight:700;flex:1}
.dgrp-arr{font-size:1rem;color:var(--texte-trois);transition:transform .22s}
.dgrp.open .dgrp-arr{transform:rotate(180deg)}
.dgrp-body{display:none}
.dgrp.open .dgrp-body{display:block;animation:dgrpIn .22s ease}
@keyframes dgrpIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
/* à l'intérieur d'un groupe ouvert : les cartes .kpi s'enchaînent, coins du haut adoucis */
.dgrp.open .dgrp-body>.kpi:first-child{border-top-left-radius:0;border-top-right-radius:0;border-top:none;margin-top:0}
.dgrp.open .dgrp-body{border:1px solid var(--gris-clair);border-top:none;border-radius:0 0 var(--rayon-lg) var(--rayon-lg);padding:12px 12px 2px;background:var(--gris-fond)}
.dgrp.open .dgrp-body>.kpi{margin-bottom:12px}
/* ===== Item 4 — Projection marathon (boule de cristal) ===== */
.cb{background:linear-gradient(135deg,#faf5ff 0%,#f3e8ff 60%,#ccfbf1 100%);border-color:#99f6e4;position:relative;overflow:hidden}
body.nuit .cb{background:linear-gradient(135deg,#1e1b4b 0%,#172033 70%);border-color:#4c1d95}
.cb-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.cb-orb{font-size:1.8rem;line-height:1;filter:drop-shadow(0 0 8px rgba(139,92,246,.5));animation:cbFloat 3.4s ease-in-out infinite}
@keyframes cbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.cb-big{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:14px 0 4px}
.cb-time{font-family:Georgia,serif;font-size:2.6rem;font-weight:700;color:#6d28d9;line-height:1;letter-spacing:-.01em}
body.nuit .cb-time{color:#c4b5fd}
.cb-delta{font-size:.875rem;color:var(--texte-deux)}
.cb-gauge{margin:18px 0 6px}
.cb-bar{position:relative;height:14px;border-radius:99px;background:linear-gradient(90deg,#16a34a 0%,#f59e0b 50%,#ef4444 100%);opacity:.92}
.cb-fill{display:none}
.cb-goal{position:absolute;top:-4px;height:22px;transform:translateX(-50%)}
.cb-goal::before{content:"";position:absolute;left:50%;top:0;width:2px;height:22px;background:#0f172a;transform:translateX(-50%);border-radius:2px}
.cb-goal span{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:.62rem;font-weight:800;color:#0f172a;white-space:nowrap}
body.nuit .cb-goal::before{background:#e8eef7}body.nuit .cb-goal span{color:#e8eef7}
.cb-needle{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#6d28d9;border:3px solid #fff;box-shadow:0 2px 8px rgba(109,40,217,.55);z-index:2}
.cb-needle span{position:absolute;top:22px;left:50%;transform:translateX(-50%);font-size:.66rem;font-weight:800;color:#6d28d9;white-space:nowrap}
body.nuit .cb-needle{border-color:#1e1b4b}body.nuit .cb-needle span{color:#c4b5fd}
.cb-scale{display:flex;justify-content:space-between;margin-top:24px;font-size:.68rem;font-weight:700;color:var(--texte-trois)}
.cb-clarte{font-size:.8125rem;line-height:1.6;color:var(--texte-deux);background:rgba(255,255,255,.55);border:1px solid #99f6e4;border-radius:12px;padding:12px 12px;margin-top:14px}
body.nuit .cb-clarte{background:rgba(0,0,0,.22);border-color:#4c1d95}
.cb-trend{margin-top:14px}
.cb-src{margin-top:14px}
.cb-src-t{font-size:.66rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:8px}
.cb-src-l{display:flex;justify-content:space-between;gap:10px;font-size:.8125rem;padding:8px 0;border-bottom:1px solid var(--gris-clair)}
.cb-src-v{font-weight:800;color:#6d28d9}
body.nuit .cb-src-v{color:#c4b5fd}
.cb-src-base{opacity:.7;font-style:italic}
.cb-method{font-size:.7rem;color:var(--texte-trois);line-height:1.5;margin-top:12px;padding-top:12px;border-top:1px dashed var(--gris-clair)}
/* ===== Refonte navigation — bandeau collant (appbar) ===== */
.appbar{position:sticky;top:0;z-index:50;background:var(--gris-fond);
  padding:10px 0 12px;margin:0 0 4px;
  box-shadow:0 8px 18px -12px rgba(15,23,42,.5)}
.appbar::after{content:"";position:absolute;left:-16px;right:-16px;top:0;bottom:0;background:var(--gris-fond);z-index:-1}
body.nuit .appbar,body.nuit .appbar::after{background:#0b1220}
/* strip countdowns ultra-compact */
.cds{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cds-item{display:inline-flex;align-items:center;gap:6px;background:#fef3c7;border:1px solid #fde68a;border-radius:99px;padding:4px 12px;max-width:48%}
body.nuit .cds-item{background:#7c2d1226;border-color:#7c2d12}
.cds-n{font-family:Georgia,serif;font-weight:800;font-size:.8125rem;color:#c2410c;flex:0 0 auto}
body.nuit .cds-n{color:#f59e0b}
.cds-l{font-size:.72rem;font-weight:700;color:#9a3412;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.nuit .cds-l{color:#fdba74}
/* horodatage en pied de page */
.maj-foot{text-align:center;font-size:.66rem;color:var(--texte-trois);margin:26px 0 4px}
.maj-foot .vdj-maj{color:var(--texte-trois)}
@media(max-width:520px){.cds-item{max-width:none;flex:1 1 0;justify-content:center}}
/* ===== Option 2 — mini-lien "semaine courante" + flash de la cible ===== */
.cw-link{display:flex;align-items:center;gap:8px;width:100%;text-align:left;cursor:pointer;
  background:var(--blanc);border:1px solid var(--gris-clair);border-radius:14px;padding:12px 14px;transition:border-color .18s,transform .15s}
.cw-link:hover{border-color:var(--gris)}
.cw-link:active{transform:scale(.99)}
.cw-pin{font-size:1rem;flex:0 0 auto}
.cw-txt{font-size:.8125rem;color:var(--texte-deux);flex:1;min-width:0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cw-txt strong{color:var(--texte);font-weight:800}
.cw-arr{font-size:.72rem;font-weight:800;color:var(--bleu);flex:0 0 auto;white-space:nowrap}
body.nuit .cw-arr{color:#0d9488}
.wk-flash{animation:wkFlash 1.7s ease}
@keyframes wkFlash{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}18%{box-shadow:0 0 0 3px rgba(59,130,246,.55)}}
/* ===== Lot 1 — Accessibilité ===== */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  .cb-orb{animation:none!important}
}
:focus-visible{outline:2px solid var(--bleu);outline-offset:2px;border-radius:8px}
body.nuit :focus-visible{outline-color:#0d9488}
/* lien d'évitement clavier */
.skip-link{position:absolute;left:-9999px;top:0;z-index:200;background:#1e293b;color:#fff;padding:10px 16px;border-radius:0 0 10px 0;font-weight:700;font-size:.875rem}
.skip-link:focus{left:0}
/* ===== Lot 1 — État vide réutilisable (ton boule de cristal) ===== */
.empty-note{display:flex;gap:10px;align-items:flex-start;font-size:.8125rem;line-height:1.55;color:var(--texte-deux);
  background:var(--gris-fond);border:1px dashed var(--gris-clair);border-radius:12px;padding:12px 12px;margin-top:12px}
.empty-note .en-ic{font-size:1rem;flex:0 0 auto;line-height:1.3}
body.nuit .empty-note{background:#0f172a;border-color:#334155}
/* ===== Lot 2 — Formulaire de logging des séances ===== */
.lf-wrap{margin-top:20px;padding-top:18px;border-top:1px dashed var(--gris-clair)}
.lf-toggle{width:100%;background:transparent;border:1px solid var(--bleu);border-radius:10px;color:var(--bleu);font-weight:700;font-size:.8125rem;padding:10px 14px;cursor:pointer;transition:background .18s,color .18s;text-align:center}
.lf-toggle:hover,.lf-toggle:focus-visible{background:var(--bleu);color:#fff}
body.nuit .lf-toggle{border-color:#0d9488;color:#0d9488}
body.nuit .lf-toggle:hover{background:#0d9488;color:#0b1220}
.logform{margin-top:12px;animation:dgrpIn .2s ease}
.lf-statut{display:flex;gap:6px;margin-bottom:14px}
.lf-st{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--gris-clair);background:var(--blanc);font-size:.75rem;font-weight:700;color:var(--texte-deux);cursor:pointer;transition:all .15s;text-align:center}
.lf-st.actif[data-st="fait"]{background:#dcfce7;border-color:#bbf7d0;color:#15803d}
.lf-st.actif[data-st="partiel"]{background:#fef9c3;border-color:#fde047;color:#a16207}
.lf-st.actif[data-st="manque"]{background:#fee2e2;border-color:#fca5a5;color:#b91c1c}
body.nuit .lf-st{background:#1e293b;border-color:#334155;color:var(--texte-deux)}
body.nuit .lf-st.actif[data-st="fait"]{background:#14532d;border-color:#166534;color:#bbf7d0}
body.nuit .lf-st.actif[data-st="partiel"]{background:#422006;border-color:#a16207;color:#fde047}
body.nuit .lf-st.actif[data-st="manque"]{background:#450a0a;border-color:#b91c1c;color:#fca5a5}
.lf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.lf-f{display:flex;flex-direction:column;gap:4px;font-size:.75rem;font-weight:700;color:var(--texte-deux)}
.lf-f input,.lf-f textarea{padding:8px 12px;border:1px solid var(--gris-clair);border-radius:9px;font-size:.875rem;background:var(--blanc);color:var(--texte);transition:border-color .15s;-webkit-appearance:none}
.lf-f input:focus,.lf-f textarea:focus{border-color:var(--bleu);outline:none}
body.nuit .lf-f input,body.nuit .lf-f textarea{background:#1e293b;border-color:#334155;color:var(--texte)}
.lf-comm{margin-bottom:8px}
.lf-comm textarea{min-height:70px;resize:vertical;font-family:inherit}
.lf-hint{font-size:.7rem;color:var(--texte-trois);line-height:1.5;margin-bottom:12px}
.lf-actions{display:flex;gap:8px}
.lf-save{flex:1;padding:12px;border-radius:11px;background:var(--bleu);color:#fff;font-weight:800;font-size:.875rem;cursor:pointer;border:none;transition:opacity .15s;letter-spacing:.01em}
.lf-save:active{opacity:.85}
.lf-clear{padding:12px 14px;border-radius:11px;background:transparent;border:1px solid var(--gris-clair);color:var(--texte-trois);font-size:.8125rem;cursor:pointer;font-weight:700;transition:border-color .15s}
.lf-clear:hover{border-color:var(--gris)}
/* confirmation flash après save */
@keyframes lfSaved{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{box-shadow:none}}
.lf-saved{animation:lfSaved .7s ease}
/* ===== Coach IA — bloc "Comprendre" + théorie + débrief ===== */
.cc-block{background:linear-gradient(135deg,#f0fdfa 0%,#f0f9ff 100%);border:1px solid #99f6e4;border-radius:14px;padding:16px}
body.nuit .cc-block{background:linear-gradient(135deg,#0f1f3d 0%,#0c1a2e 100%);border-color:#1e3a5f}
.cc-item{margin-bottom:14px}
.cc-h{font-family:Georgia,serif;font-weight:700;font-size:1rem;color:#0f766e;margin-bottom:4px}
body.nuit .cc-h{color:#93c5fd}
.cc-txt{font-size:.875rem;line-height:1.6;color:var(--texte-deux)}
.theo-btn{width:100%;background:#0f766e;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:.8125rem;padding:12px;cursor:pointer;transition:opacity .15s;margin-top:2px}
.theo-btn:active{opacity:.85}
body.nuit .theo-btn{background:#0d9488}
.theo-panel{margin-top:12px;padding:14px 15px;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:11px;animation:dgrpIn .22s ease}
.theo-tag{font-size:.66rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:10px}
.theo-panel p{font-size:.875rem;line-height:1.65;color:var(--texte-deux);margin:0 0 12px}
.theo-panel p:last-child{margin-bottom:0}
.theo-panel strong{color:var(--texte)}
.theo-panel em{color:var(--bleu);font-style:italic}
body.nuit .theo-panel em{color:#0d9488}
/* débrief après séance */
.cd-debrief{background:var(--gris-fond);border:1px solid var(--gris-clair);border-radius:14px;padding:6px 14px 14px}
.cd-line{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--gris-clair);font-size:.875rem;line-height:1.6;color:var(--texte-deux)}
.cd-line:last-of-type{border-bottom:none}
.cd-ic{font-size:1.0625rem;flex:0 0 auto;line-height:1.4}
.cd-line.cd-good{color:var(--texte-deux)}
.cd-line strong{color:var(--texte)}
.cd-foot{font-size:.7rem;color:var(--texte-trois);line-height:1.5;padding-top:12px;border-top:1px dashed var(--gris-clair);font-style:italic}
/* ===== Panneau théorie & coaching (sheet par-dessus la fiche) ===== */
.theo-btn-rich{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#0f766e,#0d9488)}
.theo-btn-arr{transition:transform .2s}
.theo-btn-rich:hover .theo-btn-arr{transform:translateX(3px)}
.theo-overlay{position:fixed;inset:0;z-index:150;background:rgba(15,23,42,.6);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.theo-overlay.ouverte{opacity:1;pointer-events:all}
.theo-sheet{background:var(--gris-fond);width:100%;max-width:680px;max-height:94vh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.22,.68,0,1.1);overflow:hidden}
.theo-overlay.ouverte .theo-sheet{transform:translateY(0)}
.theo-sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 20px 16px;border-bottom:1px solid var(--gris-clair);background:var(--blanc)}
.theo-kicker{font-size:.66rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--bleu)}
.theo-sheet-titre{font-family:Georgia,serif;font-size:1.45rem;font-weight:700;color:var(--texte);margin-top:4px}
.theo-close{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:1px solid var(--gris-clair);background:var(--gris-fond);color:var(--texte-deux);font-size:1rem;cursor:pointer;line-height:1}
.theo-close:hover{border-color:var(--gris)}
.btn-close-round{flex:0 0 auto;width:36px;height:36px;border-radius:50%;border:1px solid var(--gris-clair);background:var(--blanc);color:var(--texte-deux);font-size:1rem;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s}
.btn-close-round:hover{background:var(--texte);color:var(--blanc);border-color:var(--texte)}
.theo-sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 20px 30px}
.theo-sec{margin-bottom:24px}
.theo-sec-h{display:flex;align-items:center;gap:10px;font-family:Georgia,serif;font-weight:700;font-size:1.0625rem;color:var(--texte);margin-bottom:10px;line-height:1.3}
.theo-sec-n{flex:0 0 auto;width:24px;height:24px;border-radius:50%;background:var(--bleu);color:#fff;font-family:system-ui,sans-serif;font-size:.75rem;font-weight:800;display:flex;align-items:center;justify-content:center}
.theo-sec-b p{font-size:.875rem;line-height:1.7;color:var(--texte-deux);margin:0 0 10px}
.theo-sec-b p:last-child{margin-bottom:0}
.theo-sec-b strong{color:var(--texte)}
.theo-sec-b em{color:var(--bleu);font-style:italic}
body.nuit .theo-sec-b em{color:#0d9488}
.theo-perso{background:#fef3c7;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:12px 12px!important;font-size:.875rem!important}
body.nuit .theo-perso{background:#7c2d1222}
.theo-svg{display:block;width:100%;max-width:340px;margin:12px auto;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:12px;padding:8px}
.theo-tab{width:100%;border-collapse:collapse;margin:6px 0 4px;font-size:.8125rem}
.theo-tab th{text-align:left;padding:8px 10px;background:var(--gris-clair);color:var(--texte-deux);font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
.theo-tab th:last-child{text-align:right}
.theo-tab td{padding:8px 10px;border-bottom:1px solid var(--gris-clair);color:var(--texte)}
.theo-tab td:last-child{text-align:right;font-weight:800;font-family:Georgia,serif}
.theo-coachbox{background:linear-gradient(135deg,#faf5ff,#f0f9ff);border:1px solid #99f6e4;border-radius:14px;padding:16px;margin-top:6px}
body.nuit .theo-coachbox{background:linear-gradient(135deg,#1e1b4b,#0f1f3d);border-color:#4c1d95}
.theo-coachbox-h{font-family:Georgia,serif;font-weight:700;font-size:1rem;color:#6d28d9;margin-bottom:8px}
body.nuit .theo-coachbox-h{color:#c4b5fd}
.theo-coachbox p{font-size:.875rem;line-height:1.7;color:var(--texte-deux);margin:0}
.theo-coachbox strong{color:var(--texte)}
.theo-end{text-align:center;font-size:.8125rem;color:var(--texte-trois);font-style:italic;margin-top:22px}
.theo-end em{color:var(--bleu)}
/* ===== Cap sur la semaine suivante (bilan) ===== */
.callout-cap{background:linear-gradient(135deg,#f0fdfa 0%,#ecfdf5 100%);border:1px solid #bbf7d0;border-left:4px solid #16a34a;border-radius:0 12px 12px 0;font-size:.875rem;line-height:1.7;color:var(--texte-deux)}
.callout-cap strong{color:var(--texte)}
body.nuit .callout-cap{background:linear-gradient(135deg,#0f1f3d 0%,#0c2a1e 100%);border-color:#14532d;border-left-color:#16a34a}
/* ===== Lecture vocale ===== */
.tts-bar{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--blanc);border-bottom:1px solid var(--gris-clair);flex-wrap:wrap}
.tts-btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:10px;font-weight:700;font-size:.8125rem;padding:8px 15px;cursor:pointer;background:var(--gris-clair);color:var(--texte-deux);transition:opacity .15s}
.tts-btn:active{opacity:.8}
.tts-btn.tts-play{background:linear-gradient(135deg,#6d28d9,#0d9488);color:#fff}
.tts-btn.tts-stop{background:#fee2e2;color:#b91c1c}
body.nuit .tts-btn{background:#1e293b;color:#cbd5e1}
body.nuit .tts-btn.tts-stop{background:#7f1d1d;color:#fecaca}
.tts-hint{font-size:.74rem;color:var(--texte-trois);font-style:italic}
.tts-state{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;font-weight:700;color:#6d28d9}
body.nuit .tts-state{color:#c4b5fd}
.tts-eq{display:inline-flex;align-items:flex-end;gap:2px;height:14px}
.tts-eq i{width:3px;background:#0d9488;border-radius:2px;display:inline-block;height:13px;transform-origin:bottom;animation:ttsEq .9s ease-in-out infinite}
.tts-eq i:nth-child(1){animation-delay:0s}
.tts-eq i:nth-child(2){animation-delay:.25s}
.tts-eq i:nth-child(3){animation-delay:.45s}
@keyframes ttsEq{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
.theo-sec.tts-reading,.theo-coachbox.tts-reading{box-shadow:0 0 0 2px #0d9488;transition:box-shadow .2s,background .2s}
.theo-sec.tts-reading{background:#faf5ff;border-radius:12px;padding:12px;margin:0 -12px}
body.nuit .theo-sec.tts-reading{background:#2e1065}
@media (prefers-reduced-motion:reduce){.tts-eq i{animation:none;transform:scaleY(.7)}}
/* barre vocale dans la fiche séance */
.tts-bar-seance{border-bottom:none;border:1px solid var(--gris-clair);border-radius:12px;margin-bottom:6px}
body.nuit .tts-bar-seance{background:var(--gris-fond)}
/* ===== Widget météo accueil ===== */
.meteo{display:flex;flex-direction:column;gap:8px;width:100%;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:14px;padding:12px 14px;margin-top:10px}
.meteo-row{display:flex;align-items:center;gap:12px}
.meteo-ico{font-size:1.5rem;flex:0 0 auto;line-height:1}
.meteo-temp{font-family:Georgia,serif;font-size:1.35rem;font-weight:800;color:var(--texte);line-height:1}
.meteo-temp small{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:.65rem;font-weight:700;color:var(--texte-trois);letter-spacing:.04em;margin-left:4px}
.meteo-metrics{display:flex;align-items:center;gap:14px;margin-left:auto}
.meteo-m{display:inline-flex;align-items:center;gap:4px;font-size:.8125rem;font-weight:700;color:var(--texte-deux);white-space:nowrap}
body.nuit .meteo{background:#1b2536;border-color:#334155}
/* ===== Badge countdown cliquable ===== */
.cds-clic{cursor:pointer;transition:transform .12s,box-shadow .15s}
.cds-clic:hover{box-shadow:0 3px 10px rgba(194,65,12,.22)}
.cds-clic:active{transform:scale(.98)}
.cds-go{font-weight:800;color:#c2410c;flex:0 0 auto;margin-left:1px}
body.nuit .cds-go{color:#f59e0b}

/* ===== Dossier de course (modale) ===== */
.dos{padding:6px 20px 26px;max-width:680px;margin:0 auto;color:var(--texte)}
.dos-head{text-align:center;padding:6px 0 18px;border-bottom:1px solid var(--gris-clair);margin-bottom:18px}
.dos-eyebrow{font-size:.66rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--ac)}
.dos-nom{font-family:Georgia,'Times New Roman',serif;font-size:2rem;font-weight:700;line-height:1.05;margin:8px 0 4px;letter-spacing:-.01em}
.dos-sous{font-size:1rem;color:var(--texte-deux);font-weight:600}
.dos-meta{font-size:.8125rem;color:var(--texte-trois);margin-top:8px;line-height:1.5}
.dos-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--ac);border-radius:14px;padding:12px 8px;margin-bottom:18px}
.dos-stat{text-align:center;color:#fff;min-width:0}
.dos-stat-v{font-family:Georgia,serif;font-size:1rem;font-weight:700;line-height:1.1}
.dos-stat-l{font-size:.56rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;opacity:.86;margin-top:4px}
.dos-intro{font-size:.875rem;line-height:1.6;color:var(--texte-deux);margin-bottom:14px}
.dos-intro strong,.dos-p strong,.dos-note strong,.dos-hydra strong{color:var(--texte);font-weight:700}
.dos-phrase{font-size:.875rem;line-height:1.55;background:var(--gris-fond);border-left:4px solid var(--ac);border-radius:0 12px 12px 0;padding:12px 15px;color:var(--texte-deux);margin-bottom:6px}
.dos-h3{font-family:Georgia,serif;font-size:1.18rem;font-weight:700;margin:26px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--ac)}
.dos-prof{width:100%;height:auto;display:block;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:12px}
.dos-prof-cap{font-size:.72rem;color:var(--texte-trois);font-style:italic;margin:8px 2px 0}
.dos-p{font-size:.875rem;line-height:1.6;color:var(--texte-deux);margin:12px 0}
.dos-note{font-size:.875rem;line-height:1.55;color:var(--texte-deux);margin:12px 0;font-style:italic}
.dos-seg{background:var(--blanc);border:1px solid var(--gris-clair);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.dos-seg-h{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px}
.dos-seg-t{font-weight:800;font-size:1rem}
.dos-seg-km{font-size:.72rem;font-weight:700;color:var(--ac);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.dos-seg-f{font-size:.875rem;line-height:1.5;color:var(--texte-deux)}
.dos-plan{background:var(--blanc);border:1px solid var(--gris-clair);border-left:4px solid var(--pc);border-radius:0 13px 13px 0;padding:12px 14px;margin-bottom:10px}
.dos-plan-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dos-plan-n{font-family:Georgia,serif;font-weight:700;font-size:1rem;color:var(--pc);flex:0 0 auto}
.dos-plan-titre{font-weight:800;font-size:1rem;flex:1;min-width:0}
.dos-plan-tag{font-size:.58rem;font-weight:800;letter-spacing:.05em;color:#fff;background:var(--pc);padding:4px 8px;border-radius:99px;white-space:nowrap}
.dos-plan-txt{font-size:.875rem;line-height:1.5;color:var(--texte-deux);margin-bottom:8px}
.dos-plan-fuel{font-size:.8125rem;font-weight:600;color:var(--texte);background:var(--gris-fond);border-radius:9px;padding:8px 10px;line-height:1.4}
.dos-nut{display:grid;grid-template-columns:1.4fr 1.3fr 1fr;gap:8px;align-items:center;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.dos-nut-n{font-weight:800;font-size:.8125rem}
.dos-nut-d{font-size:.75rem;color:var(--texte-deux)}
.dos-nut-r{font-size:.72rem;font-weight:700;color:var(--ac);text-align:right}
.dos-hydra{font-size:.875rem;line-height:1.55;background:#ecfeff;border:1px solid #a5f3fc;border-radius:12px;padding:12px 15px;margin:12px 0;color:#155e75}
body.nuit .dos-hydra{background:#0e3a4233;border-color:#155e75;color:#a5f3fc}
.dos-zone{display:grid;grid-template-columns:1fr auto;gap:4px 12px;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.dos-zone-n{font-weight:800;font-size:.875rem}
.dos-zone-fc{font-family:Georgia,serif;font-weight:700;font-size:.875rem;color:var(--ac);text-align:right}
.dos-zone-o{grid-column:1/-1;font-size:.75rem;color:var(--texte-deux);line-height:1.4}
.dos-prat{display:flex;gap:12px;padding:8px 2px;border-bottom:1px solid var(--gris-clair)}
.dos-prat-l{flex:0 0 38%;font-weight:700;font-size:.8125rem}
.dos-prat-v{flex:1;font-size:.8125rem;color:var(--texte-deux);line-height:1.45}
.dos-err{margin:6px 0 0;padding-left:20px}
.dos-err li{font-size:.875rem;line-height:1.5;color:var(--texte-deux);margin-bottom:8px}
.dos-err li::marker{color:#dc2626}
.dos-sources{font-size:.72rem;line-height:1.5;color:var(--texte-trois);font-style:italic;margin-top:22px;padding-top:14px;border-top:1px solid var(--gris-clair)}
@media(max-width:430px){.dos-stats{grid-template-columns:repeat(3,1fr);row-gap:10px}.dos-nut{grid-template-columns:1fr;gap:4px}.dos-nut-r{text-align:left}}
/* ===== Dossier : blocs avant/après course ===== */
.dos-bloc{display:flex;gap:12px;border-radius:13px;padding:12px 15px;margin:12px 0;font-size:.875rem;line-height:1.55;color:var(--texte-deux)}
.dos-av{background:#fef3c7;border:1px solid #fde68a}
.dos-ap{background:#f0fdf4;border:1px solid #bbf7d0}
body.nuit .dos-av{background:#45340433;border-color:#92400e;color:#fde68a}
body.nuit .dos-ap{background:#05260e33;border-color:#166534;color:#bbf7d0}
.dos-bloc-ico{font-size:1.0625rem;flex:0 0 auto;line-height:1.5}
.dos-bloc strong{color:var(--texte);font-weight:800;display:block;margin-bottom:4px}
/* ===== Séance réalisée — visuel vert fort ===== */
.seance-carte.sc-fait{background:#f0fdf4;border:2px solid #16a34a}
.seance-carte.sc-fait .seance-bande{background:#16a34a !important}
.seance-carte.sc-fait .seance-nom{color:#15803d}
.seance-carte.sc-fait .seance-fleche{color:#16a34a}
body.nuit .seance-carte.sc-fait{background:#052e16;border-color:#16a34a}
body.nuit .seance-carte.sc-fait .seance-bande{background:#16a34a !important}
body.nuit .seance-carte.sc-fait .seance-nom{color:#16a34a}
body.nuit .seance-carte.sc-fait .seance-fleche{color:#16a34a}
/* ===== Quick Log — bouton carte + bottom sheet ===== */
.ql-btn{width:34px;height:34px;border-radius:50%;border:2px solid #16a34a;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#16a34a;font-size:15px;flex:0 0 34px;transition:background .15s}
.ql-btn:hover,.ql-btn:active{background:#f0fdf4}
.ql-btn:active{transform:scale(.92)}
.sc-check{color:#16a34a;font-size:17px;font-weight:700}
#ql-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:flex-end}
#ql-overlay.open{display:flex}
#ql-sheet{background:#ffffff;border-radius:18px 18px 0 0;padding:20px 16px 28px;width:100%;animation:qlUp .22s ease}
@keyframes qlUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.ql-handle{width:36px;height:4px;background:var(--bord);border-radius:99px;margin:0 auto 16px}
.ql-titre{font-size:16px;font-weight:700;color:var(--texte);margin-bottom:4px}
.ql-sous{font-size:13px;color:var(--texte-deux);margin-bottom:16px}
.ql-fields{display:flex;flex-direction:column;gap:12px}
.ql-label{display:flex;flex-direction:column;gap:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--texte-deux)}
.ql-label input{padding:8px 12px;border-radius:8px;border:.5px solid var(--bord-card);background:var(--gris-fond);font-size:14px;color:var(--texte);font-family:inherit;-webkit-appearance:none}
.ql-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ql-allure-val{padding:8px 12px;background:var(--gris-fond);border-radius:8px;border:.5px solid var(--bord-card);font-size:14px;font-weight:700;color:var(--texte)}
.ql-submit{width:100%;padding:12px;border-radius:10px;background:#16a34a;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.ql-submit:active{background:#16a34a}
.ql-cancel{display:block;width:100%;padding:8px;border:none;background:transparent;color:var(--texte-deux);font-size:13px;cursor:pointer;margin-top:4px}
.ql-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#15803d;color:#fff;padding:8px 18px;border-radius:99px;font-size:13px;font-weight:700;display:none;z-index:1001;white-space:nowrap;pointer-events:none}
.ql-toast.ql-show{display:block;animation:qlFt 2.8s ease forwards}
@keyframes qlFt{0%{opacity:0;transform:translate(-50%,8px)}12%{opacity:1;transform:translate(-50%,0)}85%{opacity:1}100%{opacity:0}}
body.nuit #ql-sheet{background:#1e293b}
body.nuit .ql-label input,body.nuit .ql-allure-val{background:#0f172a;border-color:#334155;color:#f1f5f9}
/* ===== Météo — demain row + chip + créneaux sheet ===== */
.meteo-demain{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--texte-deux);margin:6px 0 8px}
.meteo-demain-t{font-size:12px;font-weight:700;color:var(--texte)}
.meteo-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px}
.meteo-badge.canicule{background:#fee2e2;color:#b91c1c}
.meteo-badge.chaud{background:#fef3c7;color:#c2410c}
.wx-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:#fef3c7;border:1px solid #fde68a;cursor:pointer;margin-top:0;transition:background .15s}
.wx-chip:hover{background:#fef3c7}.wx-chip:active{transform:scale(.98)}
.wx-chip-ico{font-size:18px;flex:0 0 auto}
.wx-chip-body{flex:1}
.wx-chip-title{font-size:13px;font-weight:700;color:#c2410c}
.wx-chip-sub{font-size:11px;color:#ea580c;margin-top:1px}
.wx-chip-arr{font-size:18px;color:#f59e0b}
body.nuit .wx-chip{background:#431407;border-color:#7c2d12}
body.nuit .wx-chip-title{color:#fde68a}
body.nuit .wx-chip-sub{color:#f59e0b}
#wx-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:flex-end}
#wx-ov.open{display:flex}
#wx-sheet{background:#ffffff;border-radius:18px 18px 0 0;width:100%;max-height:86vh;display:flex;flex-direction:column;animation:qlUp .22s ease;overflow:hidden}
.wx-head{padding:16px 16px 10px;flex:0 0 auto;background:#ffffff}
.wx-handle{width:36px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 14px}
.wx-sheet-title{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:12px}
.wx-tabs{display:flex;gap:6px;margin-bottom:10px}
.wx-tab{flex:1;padding:8px;border-radius:8px;border:.5px solid #e2e8f0;background:#f8fafc;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;text-align:center;transition:all .15s}
.wx-tab.active{background:#fef3c7;border-color:#fde68a;color:#c2410c}
.wx-reco{padding:10px 12px;border-radius:10px;background:#fef3c7;border:.5px solid #fde68a;font-size:12px;color:#9a3412;line-height:1.55;margin-bottom:8px}
.wx-strip{display:flex;gap:1.4px;border-radius:6px;overflow:hidden;height:7px}
.wx-strip-seg{flex:1}
.wx-hours{overflow-y:auto;flex:1;padding:4px 16px 0;background:#ffffff}
.wx-hr{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid #f1f5f9;background:#ffffff}
.wx-hr:last-child{border:none}
.wx-hr-hi{background:#f0fdf4!important;margin:0 -4px;padding:6px 4px;border-radius:7px;border:none}
.wx-hr-t{font-size:13px;font-weight:700;color:#0f172a;min-width:30px}
.wx-hr-bw{flex:1;height:5px;background:#f1f5f9;border-radius:99px;overflow:hidden}
.wx-hr-b{height:100%;border-radius:99px}
.wx-hr-temp{font-size:13px;font-weight:700;color:#0f172a;min-width:32px;text-align:right}
.wx-hr-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;min-width:72px;text-align:center}
.wx-ideal{background:#dcfce7;color:#15803d}.wx-ok{background:#fef9c3;color:#854d0e}
.wx-dur{background:#fef3c7;color:#c2410c}.wx-evit{background:#fee2e2;color:#b91c1c}
.wx-close{display:block;width:calc(100% - 32px);margin:10px 16px 16px;padding:12px;border-radius:10px;background:#f8fafc;border:.5px solid #e2e8f0;font-size:13px;color:#64748b;cursor:pointer;flex:0 0 auto}
body.nuit #wx-sheet,body.nuit .wx-head,body.nuit .wx-hours,body.nuit .wx-hr{background:#1e293b}
body.nuit .wx-hr-hi{background:#052e16!important}
body.nuit .wx-sheet-title,body.nuit .wx-hr-t,body.nuit .wx-hr-temp{color:#f1f5f9}
body.nuit .wx-reco{background:#431407;border-color:#7c2d12;color:#fde68a}
body.nuit .wx-tab{background:#0f172a;border-color:#334155;color:#94a3b8}
body.nuit .wx-tab.active{background:#431407;border-color:#7c2d12;color:#fde68a}
body.nuit .wx-close{background:#0f172a;border-color:#334155;color:#94a3b8}
body.nuit .wx-hr{border-color:#1e293b}
/* ===== Cockpit ===== */
.ck-card{background:var(--bg-card,#fff);border-radius:var(--rayon);padding:var(--sp-3);margin-bottom:var(--sp-2);border:.5px solid var(--bord-card,#e2e8f0)}
.ck-ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ck-ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--texte-deux)}
.ck-cs{font-size:10px;color:#94a3b8;margin-top:1px}
.ck-big{font-size:20px;font-weight:700;color:var(--texte)}
.ck-cw{position:relative;margin-top:8px;touch-action:none;user-select:none}
.ck-cw svg{display:block;width:100%;overflow:visible}
.ck-tt{position:absolute;background:#ffffff;border:.5px solid #cbd5e1;border-radius:8px;padding:4px 8px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .08s;white-space:nowrap;z-index:20;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ck-tt.show{opacity:1}
.ck-xl{display:flex;justify-content:space-between;font-size:8.5px;color:#94a3b8;margin-top:4px}
.ck-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#94a3b8;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.ck-sec::after{content:'';flex:1;height:.5px;background:#e2e8f0}
.ck-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.ck-kpi{background:var(--bg-card,#fff);border-radius:10px;padding:8px 8px;border:.5px solid var(--bord-card,#e2e8f0)}
.ck-kv{font-size:16px;font-weight:700;line-height:1;color:var(--texte)}
.ck-ku{font-size:10px;color:#94a3b8;margin-left:1px}
.ck-kl{font-size:8.5px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;margin-top:4px;line-height:1.2}
.ck-kd{font-size:9px;margin-top:4px;font-weight:600}
.ck-toggle{display:flex;gap:4px;margin-bottom:8px;position:sticky;top:52px;background:var(--gris-fond,#f1f5f9);padding:4px 0;z-index:5}
.ck-tg{flex:1;padding:6px 0;border-radius:7px;border:.5px solid var(--bord-card,#e2e8f0);background:var(--bg-card,#fff);font-size:12px;font-weight:600;color:var(--texte-deux);cursor:pointer;transition:all .15s;text-align:center}
.ck-tg.ck-on{background:#0d9488;border-color:#0d9488;color:#fff}
body.nuit .ck-card{background:#1e293b;border-color:#334155}
body.nuit .ck-kpi{background:#1e293b;border-color:#334155}
body.nuit .ck-tt{background:#0f172a;border-color:#334155;color:#f1f5f9}
body.nuit .ck-sec::after{background:#334155}
body.nuit .ck-toggle{background:#0f172a}
body.nuit .ck-tg{background:#1e293b;border-color:#334155;color:#94a3b8}
/* ===== Checklist J-7 ===== */
.ck-prog{background:var(--bg-card,#fff);border-radius:12px;padding:12px;margin-bottom:8px;border:.5px solid var(--bord-card,#e2e8f0)}
.ck-ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ck-ptit{font-size:14px;font-weight:700;color:var(--texte)}
.ck-pc{font-size:13px;font-weight:700;color:#0d9488}
.ck-pbw{height:7px;background:var(--gris-fond,#f1f5f9);border-radius:99px;overflow:hidden;margin-bottom:4px}
.ck-pb{height:100%;border-radius:99px;background:#0d9488;transition:width .3s}
.ck-ps{font-size:11px;color:#94a3b8}
.ck-done{background:#f0fdf4;border:.5px solid #bbf7d0;border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;color:#15803d;text-align:center}
.ck-sc{background:var(--bg-card,#fff);border-radius:12px;margin-bottom:6px;border:.5px solid var(--bord-card,#e2e8f0);overflow:hidden}
.ck-sh{display:flex;align-items:center;gap:8px;padding:12px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ck-si{font-size:16px;flex:0 0 auto}
.ck-st{font-size:13px;font-weight:700;color:var(--texte);flex:1}
.ck-sb{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--gris-fond,#f1f5f9);color:#64748b}
.ck-sbd{background:#dcfce7;color:#15803d}
.ck-sa{font-size:15px;color:#cbd5e1;transition:transform .2s}
.ck-sao{transform:rotate(90deg)}
.ck-is{padding:0 12px 10px}
.ck-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--gris-fond,#f8fafc);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ck-item:last-child{border-bottom:none}
.ck-item:active{opacity:.7}
.ck-chk{width:22px;height:22px;border-radius:6px;border:2px solid #cbd5e1;flex:0 0 22px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:transparent;transition:all .15s;margin-top:1px}
.ck-chk.ck-on{background:#0d9488;border-color:#0d9488;color:#fff}
.ck-itx{flex:1}
.ck-il{font-size:13px;color:var(--texte);line-height:1.35;transition:color .15s}
.ck-ild{color:#94a3b8;text-decoration:line-through}
.ck-in{font-size:11px;color:#94a3b8;margin-top:2px;line-height:1.3}
.ck-rst{display:block;width:100%;padding:10px;border-radius:10px;border:.5px solid var(--bord-card,#e2e8f0);background:transparent;font-size:12px;color:#94a3b8;cursor:pointer;text-align:center;margin-top:4px}
body.nuit .ck-prog,body.nuit .ck-sc{background:#1e293b;border-color:#334155}
body.nuit .ck-pbw{background:#0f172a}
body.nuit .ck-sb{background:#0f172a;color:#64748b}
body.nuit .ck-item{border-color:#1e293b}
/* ===== Move/Skip séance ===== */
.seance-fleche-wrap{display:flex;align-items:center;gap:4px;padding:0 12px 0 4px;flex:0 0 auto}
.sm-btn{width:28px;height:28px;border-radius:8px;border:.5px solid var(--bord-card,#e2e8f0);background:var(--gris-fond,#f8fafc);font-size:14px;font-weight:700;color:var(--texte-deux);cursor:pointer;display:flex;align-items:center;justify-content:center;letter-spacing:-.5px;flex:0 0 28px}
.sm-btn:active{opacity:.7}
.sc-skipped{background:#fef3c7!important;border:1.5px dashed #f59e0b!important;opacity:.8}
#sm-overlay,#sm-dp-ov,#sm-sk-ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;align-items:flex-end}
#sm-overlay.open,#sm-dp-ov.open,#sm-sk-ov.open{display:flex}
.sm-sheet{background:#ffffff;border-radius:18px 18px 0 0;padding:20px 16px 28px;width:100%;animation:qlUp .22s ease}
.sm-handle{width:36px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 14px}
.sm-stitle{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:4px}
.sm-ssub{font-size:12px;color:#64748b;margin-bottom:14px}

.sm-al{font-size:14px;font-weight:600;color:#0f172a}

/* ===== Feature 1 — iOS Install ===== */

/* ===== Version panel ===== */

/* ===== Sprint A — Score de forme composite ===== */
.forme-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card,#fff);border:.5px solid var(--bord-card,#e2e8f0);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color .2s}
.forme-bar:active{opacity:.85}
.fb-left{flex:1;min-width:0}
.fb-kicker{display:block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--texte-deux);margin-bottom:4px}
.fb-sig{display:block;font-size:12px;color:var(--texte);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-right{flex:0 0 auto;margin-left:12px}
.fb-score{font-size:2rem;font-weight:800;letter-spacing:-.04em;line-height:1;text-align:right}
.fb-trend{font-size:1rem;font-weight:600;margin-left:2px}
.forme-detail{display:none;background:var(--bg-card,#fff);border:.5px solid var(--bord-card,#e2e8f0);border-radius:12px;padding:12px 14px;margin-bottom:8px;margin-top:-4px}
.forme-detail.fd-open{display:block}
.fd-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid var(--gris-fond,#f8fafc)}
.fd-row:last-child{border-bottom:none}
.fd-lbl{font-size:11px;font-weight:700;color:var(--texte-deux);flex:0 0 72px}
.fd-track{flex:1;height:5px;background:var(--gris-fond,#f1f5f9);border-radius:99px;overflow:hidden}
.fd-fill{height:100%;border-radius:99px;transition:width .4s ease}
.fd-val{font-size:11px;color:var(--texte-deux);flex:0 0 auto;text-align:right;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
body.nuit .forme-bar,body.nuit .forme-detail{background:#1e293b;border-color:#334155}
/* ===== Forme score — aide (plein écran, scroll top) ===== */
.fb-help{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.2);border:.5px solid rgba(255,255,255,.3);font-size:10px;font-weight:700;color:var(--texte-deux);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:4px;vertical-align:middle;line-height:1;padding:0;-webkit-tap-highlight-color:transparent}

.fh-close-top{width:32px;height:32px;border-radius:50%;background:#f1f5f9;border:none;font-size:16px;color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 32px;-webkit-tap-highlight-color:transparent}

.fh-s-item strong{color:#0f172a}

.fh-c-txt{font-size:12px;color:#64748b;line-height:1.55}
.fh-note{font-size:12px;color:#475569;background:#f0fdfa;border-radius:8px;padding:10px 12px;margin-bottom:10px;line-height:1.55}
body.nuit #forme-help-ov{background:#0f172a}
body.nuit .fh-topbar{background:#0f172a;border-color:#1e293b}
body.nuit .fh-topbar-title{color:#f1f5f9}

body.nuit .fh-comp{background:#1e293b}
body.nuit .fh-c-head{color:#f1f5f9}
body.nuit .fh-c-txt{color:#94a3b8}
body.nuit .fh-s-item{color:#94a3b8}

/* ===== Cockpit — aide contextuelle ===== */
.ck-help{position:relative;width:16px;height:16px;border-radius:50%;background:var(--gris-fond,#f1f5f9);border:.5px solid var(--bord-card,#e2e8f0);font-size:10px;font-weight:700;color:var(--texte-deux,#64748b);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:6px;vertical-align:middle;line-height:1;padding:0;-webkit-tap-highlight-color:transparent}
.ck-help::after{content:"";position:absolute;top:-14px;left:-14px;right:-14px;bottom:-14px}
.ck-help:active{opacity:.7}
#ck-help-ov{display:none;position:fixed;inset:0;z-index:1005;background:#fff;overflow-y:auto;-webkit-overflow-scrolling:touch}
#ck-help-ov.open{display:block}
.ckh-topbar{position:sticky;top:0;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:.5px solid #f1f5f9;z-index:1}
.ckh-title{font-size:15px;font-weight:700;color:#0f172a;flex:1;padding-right:12px}
.ckh-close{width:32px;height:32px;border-radius:50%;background:#f1f5f9;border:none;font-size:16px;color:#475569;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 32px}
.ckh-close:active{background:#e2e8f0}
.ckh-body{padding:16px 16px 48px;font-size:13px;color:#475569;line-height:1.65}
.ckh-body p{margin-bottom:12px}
.ckh-body strong{color:#0f172a}
.ch-rule{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:#475569;line-height:1.5}
.ch-dot{width:11px;height:11px;border-radius:50%;flex:0 0 11px;margin-top:4px}
.ch-tip{font-size:12px;color:#475569;background:#f0fdf4;border-radius:8px;padding:10px 12px;margin-top:14px;line-height:1.55;border:.5px solid #dcfce7}
body.nuit #ck-help-ov{background:#0f172a}
body.nuit .ckh-topbar{background:#0f172a;border-color:#1e293b}

/* ===== Coach in-app + Auto-sync ===== */
.coach-fab{position:fixed;bottom:88px;right:16px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#0891b2);border:none;color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 18px rgba(13,148,136,.4);display:flex;align-items:center;justify-content:center;z-index:95;-webkit-tap-highlight-color:transparent}
.coach-fab:active{transform:scale(.93)}
#coach-ov{display:none;position:fixed;inset:0;z-index:300;flex-direction:column;background:#0f172a}
#coach-ov.open{display:flex}
.coach-topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:#0f172a;border-bottom:1px solid #1e293b;flex:0 0 auto}
.c-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#0891b2);display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 34px}
.c-head{flex:1}
.c-title{font-size:14px;font-weight:700;color:#f1f5f9}
.c-sub{font-size:11px;color:#0d9488;display:flex;align-items:center;gap:4px}
.c-live{width:6px;height:6px;border-radius:50%;background:#0d9488;animation:cPulse 2s infinite}
@keyframes cPulse{0%,100%{opacity:1}50%{opacity:.3}}
.c-close{width:32px;height:32px;border-radius:50%;background:#1e293b;border:none;color:#64748b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.coach-msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.coach-msg{display:flex;flex-direction:column;max-width:86%}
.coach-msg.coach{align-self:flex-start}
.coach-msg.user{align-self:flex-end}
.cmsg-bbl{padding:10px 12px;border-radius:14px;font-size:13px;line-height:1.6}
.coach-msg.coach .cmsg-bbl{background:#1e293b;color:#e2e8f0;border-bottom-left-radius:4px}
.coach-msg.user .cmsg-bbl{background:#0d9488;color:#fff;border-bottom-right-radius:4px}
.cmsg-t{font-size:10px;color:#334155;margin-top:4px;padding:0 4px}
.coach-msg.user .cmsg-t{text-align:right}
.c-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.c-dots span{width:7px;height:7px;border-radius:50%;background:#475569;animation:cDot 1.4s infinite}
.c-dots span:nth-child(2){animation-delay:.2s}
.c-dots span:nth-child(3){animation-delay:.4s}
@keyframes cDot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
.coach-chips{padding:8px 10px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;border-top:1px solid #1e293b;flex:0 0 auto}
.coach-chips::-webkit-scrollbar{display:none}
.c-chip{padding:8px 12px;border-radius:99px;border:.5px solid #334155;background:#1e293b;color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex:0 0 auto;-webkit-tap-highlight-color:transparent}
.c-chip:active{background:#0d9488;color:#fff;border-color:#0d9488}
.coach-inp-row{display:flex;align-items:center;gap:8px;padding:10px 12px 20px;border-top:1px solid #1e293b;flex:0 0 auto;background:#0f172a}
#coach-inp{flex:1;background:#1e293b;border:.5px solid #334155;border-radius:20px;padding:8px 14px;font-size:13px;color:#f1f5f9;outline:none;font-family:inherit}
#coach-inp::placeholder{color:#475569}
.c-send{width:36px;height:36px;border-radius:50%;background:#0d9488;border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 36px}
/* Auto-sync nudge */
.as-bar{display:flex;align-items:center;gap:8px;background:var(--warn-fond);border:1px solid var(--warn-clair);border-radius:99px;padding:8px 14px;margin:10px 0 0;font-size:.8125rem;color:var(--warn-deux)}
.as-ico{font-size:14px;flex:0 0 auto}
.as-txt{flex:1;min-width:0;font-size:.75rem;color:var(--warn-deux);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.as-txt strong{font-weight:700}
.as-btn{padding:4px 12px;background:var(--warn);border:none;border-radius:99px;color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;flex:0 0 auto}
.as-x{font-size:.8125rem;color:var(--warn-deux);background:none;border:none;cursor:pointer;padding:2px 4px;opacity:.55;flex:0 0 auto}

/* ===== Sprint 1 — Home qui respire ===== */
.vdj{padding:22px 22px 20px;border-radius:22px}
.vdj-lbl{color:#5eead4}
.vdj-t{font-size:1.5rem;line-height:1.12}
.hx-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin:var(--sp-3) 0}
.htile{display:block;text-align:left;background:var(--blanc);border:1px solid var(--gris-clair);border-radius:16px;padding:14px 15px;box-shadow:var(--ombre);position:relative;overflow:hidden;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.htile:active{transform:scale(.99)}
.ht-k{display:flex;align-items:center;gap:4px;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--texte-trois);margin-bottom:6px}
.ht-help{position:relative;color:var(--gris);font-weight:700;font-size:.72rem}
.ht-help::after{content:"";position:absolute;top:-14px;left:-14px;right:-14px;bottom:-14px}
.ht-v{display:block;font-size:1.5rem;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--texte)}
.ht-trend{font-size:.875rem;font-weight:700;color:var(--ok);margin-left:4px}
.ht-s{display:block;font-size:.7rem;color:var(--texte-trois);margin-top:4px;line-height:1.35}
.htile-forme .ht-v{color:var(--primary)}

.vo2-num #vo2-val{font-size:40px;font-weight:900;color:var(--texte);letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.vo2-unit{display:block;font-size:11px;color:var(--texte-trois);margin-top:2px;font-weight:600}
.vo2-foot{text-align:center;font-size:12.5px;font-weight:700;color:var(--primary);margin-top:var(--sp-2);min-height:16px}

.vo2-help{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--gris-fond,#f1f5f9);border:.5px solid var(--gris-clair);color:var(--texte-deux);font-size:10px;font-weight:800;cursor:pointer;margin-left:4px;padding:0;vertical-align:middle;position:relative}
.vo2-help::after{content:"";position:absolute;top:-12px;left:-12px;right:-12px;bottom:-12px}
.vo2-range{font-size:11px;color:var(--texte-trois);font-weight:600;margin-bottom:2px}

/* ═══════════ APPLE POLISH — POC ACCUEIL (fondations épurées) ═══════════ */
/* Fond global iOS */
body,.accueil{background:#f2f2f7}
/* Large Title */
.lt-wrap{padding:6px 4px 2px;margin-bottom:10px}

.vdj{background:#fff;color:var(--texte);border:none;border-radius:20px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.05);padding:20px 20px 18px}

/* Cartes de l'accueil : zéro bordure, ombre à peine perceptible, rayon généreux */
.htile,.cw-link,.coach-nudge,.timeline-wrap,.meteo,.hmini,.acc-annee,.forme-detail{border:none!important;border-radius:18px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);background:#fff}

.whats-new{background:#fff;border:none;border-left:3px solid #f59e0b;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04)}
.wn-txt{color:var(--texte-deux)}
/* Bannière canicule adoucie */
#canicule-banner{border:none!important;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}

/* Cartes des trois onglets : zéro bordure, ombre douce */
.sem-carte,.ck-card,.ck-kpi,.ck-summary,.vo2-card,.crs-card,.pal-card,.dash-card{border:none!important;box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04);border-radius:16px;background:#fff}

.ck-hero-sig{color:var(--texte-deux)!important}

.ck-toggle{background:#e9e9ee;border-radius:10px;padding:2px;top:0}
.ck-tg{border:none;background:transparent;border-radius:8px;font-weight:600;color:var(--texte-deux)}
.ck-tg.ck-on{background:#fff;color:var(--texte);box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:700}
/* Sections Cockpit repliables : plus aérées */
.ck-sec{color:var(--texte);letter-spacing:.02em}
/* Boutons wahoo dégraissés : sobres, blancs, chevron */
.wr-launch{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.04)}

.rpl-go{color:var(--primary)}
/* Fiche séance/semaine : boîte épurée */
#boite{border:none}
.sd-section{color:#6e6e73;font-weight:700}
/* ═══════════ APPLE POLISH — STRATE 3 (fiches séance/semaine) ═══════════ */
.sd-hero{border-bottom:none;padding:26px 24px 20px}
/* Callouts : fond neutre + liseré sémantique fin, fini les aplats colorés */
.callout{background:var(--gris-fond);border:none!important;border-radius:14px}
.callout-obj{border-left:3px solid var(--primary)!important}
.callout-ben{border-left:3px solid #16a34a!important}
.callout-vig{border-left:3px solid #f59e0b!important}
/* Chips neutres */

/* Modal : rayon généreux */
#boite{border-radius:22px 22px 0 0}
/* Sections de fiche : gris Apple */
.sd-section{letter-spacing:.05em}
/* Struct/légende/coach : cartes internes adoucies */
.struct>div,.coach-grille>div,.nutri{border:none;background:var(--gris-fond);border-radius:12px}
